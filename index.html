<!DOCTYPE html>
<html lang="es">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#333F48">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lucai">
<meta name="lucai-version" content="2026-06-11-87">
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
<script>
/* Comprobador de versión: si hay una versión más nueva publicada, recarga a la última.
   Evita que el móvil se quede con una versión vieja en caché. */
(function(){
  try{
    if(navigator.onLine===false) return;
    var cur=document.querySelector('meta[name=lucai-version]');
    cur=cur?cur.getAttribute('content'):'';
    var base=location.href.split('#')[0].split('?')[0];
    fetch(base+'?cb='+Date.now(),{cache:'no-store',headers:{'Range':'bytes=0-2047'}})
      .then(function(r){ return r.text(); })
      .then(function(t){
        var m=t.match(/name="lucai-version"\s+content="([^"]+)"/);
        var net=m?m[1]:'';
        if(net && cur && net!==cur){
          var sp=new URLSearchParams(location.search);
          if(sp.get('v')!==net){ sp.set('v',net); location.replace(location.pathname+'?'+sp.toString()+location.hash); }
        }
      }).catch(function(){});
  }catch(e){}
})();
</script>
<title>Lucai · Laura Fernández</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @keyframes lucaiPop{ 0%{opacity:0;transform:translateY(10px) scale(.92)} 60%{opacity:1;transform:translateY(-2px) scale(1.02)} 100%{opacity:1;transform:translateY(0) scale(1)} }
  :root{
    --arena-1:#F4F0E9; --arena-2:#EAE3D7; --white:#FFFFFF;
    --ink:#333F48; --ink-soft:#3d4a55; --grey:#6C757D; --grey-2:#8A949B;
    --madera:#B8A88F; --green:#A8B400; --alert:#C0563E; --alert-bg:#F7E9E4;
    --line:#E4DDD0; --ok:#5b7a4f;
    --serif:Georgia,"Times New Roman",serif;
    --sans:"Manrope",system-ui,-apple-system,sans-serif;
    --shadow:0 1px 2px rgba(51,63,72,.06),0 8px 24px rgba(51,63,72,.06);
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--arena-1);color:var(--ink);
    -webkit-font-smoothing:antialiased;font-size:16px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:16px}
  .serif{font-family:var(--serif)}
  #app{min-height:100%;display:flex;flex-direction:column}

  /* ---------- DEMO badge ---------- */
  .demo-tag{position:fixed;top:10px;right:10px;z-index:50;background:var(--ink);
    color:var(--arena-1);font-size:10px;font-weight:700;letter-spacing:.14em;
    padding:5px 10px;border-radius:20px;opacity:.85}

  /* ---------- LOGIN ---------- */
  .login{flex:1;display:flex;align-items:center;justify-content:center;padding:28px}
  .login2{flex:1;min-height:100vh;display:flex;align-items:stretch;background:var(--white)}
  .login2-form{flex:1;display:flex;align-items:center;justify-content:center;padding:40px clamp(22px,5vw,72px)}
  .login2-inner{width:100%;max-width:380px}
  .login2-lbl{display:block;font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;color:#8A949B;margin:0 0 7px}
  .login2-inp{width:100%;padding:13px 15px;border:1.5px solid #E2DACE;border-radius:11px;font-size:16px;font-family:inherit;background:#FCFAF7;margin-bottom:16px;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s}
  .login2-inp:focus{border-color:#A8B400;box-shadow:0 0 0 3px rgba(168,180,0,.14)}
  .login2-btn{width:100%;padding:14px;background:#333F48;color:#fff;border:none;border-radius:11px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .05s}
  .login2-btn:hover{opacity:.93}
  .login2-btn:active{transform:translateY(1px)}
  .login2-btn:disabled{opacity:.55;cursor:default}
  .login2-photo{flex:1.05;background-size:cover;background-position:center;min-height:100vh}
  @media(max-width:780px){
    .login2{flex-direction:column}
    .login2-photo{flex:none;height:170px;min-height:0;order:-1}
    .login2-form{padding:30px 22px 40px}
  }
  .login-card{width:100%;max-width:880px;background:var(--white);border-radius:22px;
    box-shadow:var(--shadow);overflow:hidden;display:grid;grid-template-columns:1fr 1fr}
  .login-left{padding:48px 44px;background:var(--arena-2);display:flex;flex-direction:column;
    justify-content:center;gap:22px}
  .login-left img{width:230px;max-width:80%}
  .login-left h1{font-family:var(--serif);font-weight:400;font-size:25px;line-height:1.25;color:var(--ink)}
  .login-left p{color:var(--grey);font-size:14px;line-height:1.6;max-width:300px}
  .login-right{padding:44px 40px;display:flex;flex-direction:column;gap:18px}
  .step-label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--grey-2);font-weight:700}
  .users{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .user-card{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1.5px solid var(--line);
    border-radius:12px;text-align:left;transition:.15s;background:var(--white)}
  .user-card:hover{border-color:var(--madera);transform:translateY(-1px)}
  .user-card.sel{border-color:var(--ink);background:var(--arena-1)}
  .avatar{width:40px;height:40px;border-radius:50%;background:var(--ink);color:var(--arena-1);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
  .user-card .nm{font-weight:700;font-size:14px;line-height:1.2}
  .user-card .rl{font-size:12px;color:var(--grey)}
  .pin-row{display:flex;gap:10px;justify-content:center;margin:6px 0}
  .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--grey-2)}
  .pin-dot.on{background:var(--ink);border-color:var(--ink)}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .key{padding:16px 0;border-radius:12px;background:var(--arena-1);font-size:22px;font-weight:600;
    transition:.12s}
  .key:hover{background:var(--arena-2)}
  .key:active{transform:scale(.97)}
  .key.wide{font-size:14px;font-weight:700;color:var(--grey)}
  .hint{font-size:12px;color:var(--grey-2);text-align:center;line-height:1.6}
  .err{color:var(--alert);font-size:13px;text-align:center;font-weight:600;min-height:18px}

  /* ---------- HEADER ---------- */
  header{background:var(--ink);color:var(--arena-1);padding:0 22px;height:64px;
    display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  header .brand{display:flex;align-items:center;gap:14px}
  header .brand img{height:38px}
  header .brand .t{font-family:var(--serif);font-size:16px;letter-spacing:.01em}
  header .brand .t small{display:block;font-family:var(--sans);font-size:10.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--grey-2);font-weight:600;margin-top:1px}
  .who{display:flex;align-items:center;gap:14px}
  .who .chip{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.07);
    padding:6px 12px 6px 6px;border-radius:30px}
  .who .chip .avatar{width:30px;height:30px;font-size:11px;background:var(--green);color:var(--ink)}
  .who .chip .nm{font-size:13px;font-weight:600}
  .logout{font-size:12.5px;color:var(--grey-2);font-weight:600;padding:6px 10px;border-radius:8px;white-space:nowrap}
  .logout:hover{color:var(--arena-1)}

  /* ---------- TABS ---------- */
  .tabs{display:flex;gap:4px;padding:14px 22px 0;background:var(--arena-1);flex-shrink:0}
  .tab{padding:11px 20px;border-radius:11px 11px 0 0;font-weight:700;font-size:14px;color:var(--grey);
    display:flex;align-items:center;gap:8px;position:relative}
  .tab.active{background:var(--white);color:var(--ink);box-shadow:0 -2px 8px rgba(51,63,72,.04)}
  .tab.locked{color:var(--grey-2)}
  .tab .lock{font-size:10px;border:1px solid var(--line);border-radius:20px;padding:2px 7px;
    color:var(--grey-2);font-weight:700;letter-spacing:.04em}
  .tab.active .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

  /* ---------- MAIN ---------- */
  main{flex:1;background:var(--white);padding:24px 22px 60px}
  .wrap{max-width:1120px;margin:0 auto}
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
  .seg{display:inline-flex;background:var(--arena-1);border-radius:11px;padding:4px}
  .seg button{padding:9px 16px;border-radius:8px;font-weight:600;font-size:13.5px;color:var(--grey)}
  .seg button.on{background:var(--white);color:var(--ink);box-shadow:var(--shadow)}
  .actions{display:flex;gap:10px;flex-wrap:wrap}
  .btn{padding:12px 18px;border-radius:11px;font-weight:700;font-size:14px;display:inline-flex;
    align-items:center;gap:8px;transition:.14s;border:1.5px solid transparent}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--ink);color:var(--arena-1)}
  .btn-primary:hover{background:var(--ink-soft)}
  .btn-ghost{background:var(--white);border-color:var(--line);color:var(--ink)}
  .btn-ghost:hover{border-color:var(--madera)}
  .btn[disabled]{opacity:.4;cursor:not-allowed;transform:none}

  .section-title{font-family:var(--serif);font-size:20px;font-weight:400;margin-bottom:3px}
  .section-sub{color:var(--grey);font-size:13px;margin-bottom:18px}

  /* stock matrix */
  .matrix{border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .mx-head,.mx-row{display:grid;grid-template-columns:1.4fr repeat(3,1fr)}
  .mx-head{background:var(--arena-2);font-size:12px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink);font-weight:700}
  .mx-head>div,.mx-row>div{padding:15px 18px}
  .mx-row{border-top:1px solid var(--line);align-items:center}
  .mx-row .mdl{font-weight:700;display:flex;align-items:center;gap:10px}
  .mx-row .mdl::before{content:"";width:4px;height:26px;background:var(--madera);border-radius:3px}
  .cell{display:flex;align-items:baseline;gap:8px}
  .cell .q{font-family:var(--serif);font-size:24px;font-weight:400}
  .cell .u{font-size:12px;color:var(--grey-2)}
  .pill{font-size:10.5px;font-weight:700;letter-spacing:.05em;padding:3px 8px;border-radius:20px;margin-left:auto}
  .pill.low{background:var(--alert-bg);color:var(--alert)}
  .cell.low .q{color:var(--alert)}
  .cell.out .q{color:var(--grey-2)}
  .legend{display:flex;gap:18px;margin-top:14px;font-size:12.5px;color:var(--grey)}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  .sw{width:11px;height:11px;border-radius:3px;display:inline-block}

  /* tables */
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey-2);
    font-weight:700;padding:11px 14px;border-bottom:1.5px solid var(--line)}
  td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:last-child td{border-bottom:none}
  .tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.03em}
  .tag.sal{background:#eef1ec;color:var(--ok)}
  .tag.ent{background:var(--arena-2);color:var(--ink)}
  .tag.adj{background:var(--alert-bg);color:var(--alert)}
  .mono{font-variant-numeric:tabular-nums}
  .pat{font-weight:700}
  .pat small{display:block;font-weight:500;color:var(--grey);font-size:12px}
  .muted{color:var(--grey-2)}
  .empty{padding:42px;text-align:center;color:var(--grey-2);font-size:14px}
  .note{background:var(--arena-1);border-left:4px solid var(--madera);padding:13px 16px;border-radius:0 10px 10px 0;
    font-size:13px;color:var(--ink-soft);line-height:1.6;margin-bottom:18px}

  /* coming soon */
  .soon{padding:70px 24px;text-align:center}
  .soon .ico{font-family:var(--serif);font-size:40px;color:var(--madera)}
  .soon h3{font-family:var(--serif);font-weight:400;font-size:22px;margin:10px 0 6px}
  .soon p{color:var(--grey);max-width:380px;margin:0 auto;line-height:1.6;font-size:14px}

  /* ---------- MODAL ---------- */
  .overlay{position:fixed;inset:0;background:rgba(51,63,72,.42);display:flex;align-items:flex-end;
    justify-content:center;z-index:40;backdrop-filter:blur(2px)}
  @media(min-width:720px){.overlay{align-items:center}}
  .modal{background:var(--white);width:100%;max-width:560px;border-radius:20px 20px 0 0;
    max-height:92vh;overflow:auto;box-shadow:0 -10px 40px rgba(51,63,72,.2)}
  @media(min-width:720px){.modal{border-radius:20px}}
  .modal-head{padding:22px 24px 6px;display:flex;justify-content:space-between;align-items:flex-start}
  .modal-head h2{font-family:var(--serif);font-weight:400;font-size:21px}
  .modal-head .x{font-size:24px;color:var(--grey-2);line-height:1;padding:4px}
  .modal-body{padding:8px 24px 24px}
  .tcompact .fld{margin-top:10px}
  .tcompact .fld>label{margin-bottom:4px;font-size:11px;letter-spacing:.04em}
  .tcompact .inp{padding:8px 10px}
  .tcompact textarea.inp{line-height:1.35}
  .fld{margin-top:18px}
  .fld>label{display:block;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--grey);font-weight:700;margin-bottom:9px}
  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip-sel{padding:11px 16px;border:1.5px solid var(--line);border-radius:11px;font-weight:600;
    font-size:14px;transition:.13s;background:var(--white);min-width:54px;text-align:center}
  .chip-sel:hover{border-color:var(--madera)}
  .chip-sel.on{border-color:var(--ink);background:var(--ink);color:var(--arena-1)}
  .chip-sel.dis{opacity:.4;cursor:not-allowed;text-decoration:line-through}
  .chip-sel small{display:block;font-weight:500;font-size:11px;opacity:.7;margin-top:2px}
  .stepper{display:inline-flex;align-items:center;border:1.5px solid var(--line);border-radius:11px;overflow:hidden}
  .stepper button{width:46px;height:46px;font-size:22px;font-weight:600;background:var(--arena-1)}
  .stepper button:hover{background:var(--arena-2)}
  .stepper .v{width:60px;text-align:center;font-family:var(--serif);font-size:22px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .inp{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;background:var(--white)}
  .inp:focus{outline:none;border-color:var(--ink)}
  select.inp{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%236C757D' stroke-width='1.6' fill='none'/%3E%3C/svg%3E");
    background-repeat:no-repeat;background-position:right 14px center}
  .req-note{font-size:12px;color:var(--alert);margin-top:14px;display:flex;align-items:center;gap:7px;font-weight:600}
  .req-note.okk{color:var(--ok)}
  .modal-foot{padding:18px 24px 24px;border-top:1px solid var(--line);display:flex;gap:12px}
  .modal-foot .btn{flex:1;justify-content:center;padding:14px}

  /* stock cards */
  .stock-group{margin-bottom:26px}
  .sg-head{display:flex;align-items:center;gap:11px;margin:0 0 13px 2px}
  .sg-head::before{content:"";width:5px;height:24px;background:var(--madera);border-radius:3px}
  .sg-head h4{font-family:var(--serif);font-weight:400;font-size:19px}
  .sg-head .sub{font-size:12px;color:var(--grey-2)}
  .stock-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
  .scard{border:1.5px solid var(--line);border-radius:var(--radius);padding:16px 18px;background:var(--white);
    transition:.15s;position:relative;overflow:hidden}
  .scard:hover{box-shadow:var(--shadow)}
  .scard .talla{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey-2);font-weight:700}
  .scard .big{display:flex;align-items:baseline;gap:6px;margin:6px 0 12px}
  .scard .big .n{font-family:var(--serif);font-size:44px;line-height:1;font-weight:400}
  .scard .big .u{font-size:13px;color:var(--grey-2)}
  .track{height:8px;background:var(--arena-2);border-radius:20px;position:relative}
  .fill{height:100%;border-radius:20px;background:var(--ink);min-width:0}
  .minmark{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--grey-2);opacity:.6}
  .scard .stat{margin-top:11px;font-size:12.5px;font-weight:600;color:var(--grey);display:flex;align-items:center;gap:7px}
  .scard.low{border-color:#e7c3b8;background:linear-gradient(180deg,#fdf6f3,var(--white))}
  .scard.low .big .n{color:var(--alert)}
  .scard.low .fill{background:var(--alert)}
  .scard.low .stat{color:var(--alert)}
  .scard.out .big .n{color:var(--grey-2)}
  .scard .flag{position:absolute;top:14px;right:14px;font-size:10px;font-weight:800;letter-spacing:.06em;
    padding:4px 9px;border-radius:20px;background:var(--alert-bg);color:var(--alert)}

  /* alert bell */
  .bell{position:relative;width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.08);
    display:flex;align-items:center;justify-content:center;color:var(--arena-1)}
  .bell:hover{background:rgba(255,255,255,.16)}
  .bell .badge{position:absolute;top:-6px;right:-6px;min-width:21px;height:21px;border-radius:20px;
    background:var(--alert);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;
    justify-content:center;padding:0 5px;border:2px solid var(--ink)}

  /* alert modal */
  .al-head{padding:26px 26px 4px;text-align:center}
  .al-head .ring{width:56px;height:56px;border-radius:50%;background:var(--alert-bg);color:var(--alert);
    display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;margin:0 auto 13px}
  .al-head h2{font-family:var(--serif);font-weight:400;font-size:23px}
  .al-head p{color:var(--grey);font-size:13.5px;margin-top:5px;line-height:1.5}
  .al-list{padding:18px 26px 6px;display:flex;flex-direction:column;gap:9px}
  .al-item{display:flex;align-items:center;gap:13px;padding:12px 15px;border:1.5px solid #ecd9d2;
    background:var(--alert-bg);border-radius:12px}
  .al-item .ai-ic{width:36px;height:36px;border-radius:10px;background:#fff;color:var(--alert);
    display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:18px;flex-shrink:0}
  .al-item .ai-t{font-weight:700;font-size:14px}
  .al-item .ai-s{font-size:12.5px;color:var(--alert);font-weight:600}
  .al-item .ai-q{margin-left:auto;text-align:right}
  .al-item .ai-q b{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--alert)}
  .al-item .ai-q span{display:block;font-size:11px;color:var(--grey)}

  /* cost KPI */
  .kpi{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;background:var(--ink);
    color:var(--arena-1);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
  .kpi .lbl{font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--grey-2);font-weight:700}
  .kpi .val{font-family:var(--serif);font-size:40px;line-height:1;margin-top:7px}
  .kpi .sub2{font-size:12.5px;color:var(--grey-2);line-height:1.7}

  .vhead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .btn-sm{padding:9px 14px;font-size:13px}

  /* multi-select combo */
  .combo{max-width:460px;margin-bottom:14px;position:relative}
  .combo-box{display:flex;flex-wrap:wrap;gap:7px;align-items:center;border:1.5px solid var(--line);
    border-radius:11px;padding:8px 10px;background:var(--white)}
  .combo-box:focus-within{border-color:var(--ink)}
  .combo-box input{border:none;outline:none;flex:1;min-width:120px;font-size:15px;padding:4px}
  .msel-chip{display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:var(--arena-1);
    border-radius:20px;padding:5px 6px 5px 12px;font-size:13px;font-weight:600}
  .msel-chip button{color:var(--arena-1);background:rgba(255,255,255,.18);width:18px;height:18px;border-radius:50%;

  .combo-list{border:1.5px solid var(--line);border-top:none;border-radius:0 0 11px 11px;background:var(--white);
    max-height:240px;overflow:auto;box-shadow:var(--shadow)}
  .combo-opt{padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;align-items:baseline;gap:8px}
  .combo-opt:last-child{border-bottom:none}
  .combo-opt:hover{background:var(--arena-1)}
  .combo-opt small{color:var(--grey-2);font-weight:600}
  .combo-empty{padding:12px 14px;color:var(--grey-2);font-size:13px}
  .combo-caret{margin-left:auto;color:var(--grey-2);font-size:12px;padding:4px 8px;flex-shrink:0}
  .combo-drop{position:absolute;left:0;right:0;top:100%;margin-top:5px;z-index:31;border:1.5px solid var(--line);
    border-radius:11px;background:var(--white);max-height:280px;overflow:auto;box-shadow:var(--shadow)}
  .combo-backdrop{position:fixed;inset:0;z-index:30}

  /* follow-up */
  .tag.okk2{background:#eef1ec;color:var(--ok)}
  .tag.inc{background:var(--alert-bg);color:var(--alert)}
  .tag.dev{background:#efe7da;color:#7a6a52}
  .filterrow th{padding:7px 10px;border-bottom:1.5px solid var(--line);background:var(--white)}
  .fh{width:100%;font-size:12.5px;padding:7px 9px;border:1.5px solid var(--line);border-radius:8px;
    background:var(--white);font-weight:500;color:var(--ink);font-family:inherit}
  .fh:focus{outline:none;border-color:var(--ink)}
  textarea.inp{min-height:84px;resize:vertical;line-height:1.5}

  /* ---------- MÓVIL ---------- */
  @media(max-width:720px){
    .login{padding:0}
    .login-card{grid-template-columns:1fr;border-radius:0;box-shadow:none;max-width:none;min-height:100vh}
    .login-left{padding:34px 24px 24px;gap:14px}
    .login-left img{width:175px}
    .login-left h1{font-size:21px}
    .login-left p{font-size:13px}
    .login-right{padding:26px 22px 38px}
    .users{grid-template-columns:1fr}

    header{padding:0 12px;height:58px;overflow:hidden}
    header .brand{gap:10px;min-width:0;flex-shrink:1}
    header .brand img{height:30px}
    header .brand .t{display:none}
    .who{gap:7px;flex-shrink:0}
    .who .chip .nm{display:none}
    .who .chip{padding:5px}
    .logout{font-size:11.5px;padding:6px 7px}

    .tabs{padding:12px 12px 0;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
    .tab{padding:10px 14px;font-size:13px;white-space:nowrap;flex-shrink:0}

    main{padding:18px 14px 56px}
    .toolbar{flex-direction:column;align-items:stretch}
    .seg{display:flex}.seg button{flex:1;text-align:center}
    .actions{display:flex;flex-wrap:wrap}
    .actions .btn{justify-content:center}
    .actions .btn-primary{flex:1 1 100%}
    .actions .btn-ghost{flex:1 1 0}
    .section-title{font-size:18px}

    .matrix table,.matrix thead,.matrix tbody,.matrix tr,.matrix th,.matrix td{display:block}
    .matrix thead tr:not(.filterrow){display:none}
    .matrix thead tr.filterrow{display:flex;flex-wrap:wrap;gap:8px;padding:2px 0 12px}
    .matrix thead tr.filterrow th{display:block;flex:1 1 44%;padding:0;border:none}
    .matrix thead tr.filterrow th:empty{display:none}
    .matrix tr{border:1px solid var(--line);border-radius:12px;margin:11px 0;background:var(--white);padding:2px 0}
    .matrix td{border:none;border-bottom:1px solid #f1ece3;padding:10px 16px;display:flex;
      justify-content:space-between;align-items:center;gap:14px;text-align:right}
    .matrix tr td:last-child{border-bottom:none}
    .matrix td::before{content:attr(data-label);font-size:11px;letter-spacing:.05em;text-transform:uppercase;
      color:var(--grey-2);font-weight:700;text-align:left;flex-shrink:0}
    .matrix td.empty{justify-content:center;border-bottom:none}
    .matrix td.empty::before{display:none}
    .pat,.pat small{text-align:right}

    .demo-tag{top:auto;bottom:12px;left:12px;right:auto;opacity:.72}
  }

  /* ---------- HUB HOME ---------- */
  .backbtn{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.08);color:var(--arena-1);
    font-size:26px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .backbtn:hover{background:rgba(255,255,255,.18)}

  .hello{font-family:var(--serif);font-size:25px;margin:6px 0 24px;color:var(--ink)}
  .modgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:16px}
  .modcard{text-align:left;background:var(--white);border:1.5px solid var(--line);border-radius:16px;
    padding:20px;transition:.15s;display:flex;flex-direction:column;gap:7px;min-height:176px}
  .modcard:hover{border-color:var(--madera);transform:translateY(-2px);box-shadow:var(--shadow)}
  .mc-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .mc-ic{width:48px;height:48px;border-radius:13px;background:var(--arena-2);color:var(--ink);
    font-family:var(--serif);font-size:23px;display:flex;align-items:center;justify-content:center}
  .modcard.soon-card .mc-ic{background:var(--arena-1);color:var(--grey-2)}

  .mc-desc{font-size:13px;color:var(--grey);line-height:1.55}
  .pill-ok{font-size:10.5px;font-weight:800;letter-spacing:.04em;color:var(--ok);background:#eef1ec;padding:4px 9px;border-radius:20px}
  .pill-soon{font-size:10.5px;font-weight:800;letter-spacing:.04em;color:var(--grey-2);background:var(--arena-2);padding:4px 9px;border-radius:20px}

  /* toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--arena-1);padding:14px 22px;border-radius:30px;font-weight:600;
    font-size:14px;box-shadow:var(--shadow);opacity:0;transition:.3s;z-index:60;display:flex;align-items:center;gap:10px}

  .toast .d{width:8px;height:8px;border-radius:50%;background:var(--green)}

/* === ajuste movil anadido por Lucai: cabe en pantalla, sin franja derecha === */
@media(max-width:720px){
  html,body{max-width:100%;overflow-x:hidden}
  #app{width:100%;max-width:100%;overflow-x:hidden}
  .tabs{width:100%;max-width:100vw;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  main,.wrap{width:100%;max-width:100%}
}

/* === movil: la tabla SIGUE siendo tabla y se desliza de lado con el dedo (no tarjetas) === */
@media(max-width:720px){
  .matrix{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:100%}
  .matrix table{display:table;width:100%;min-width:680px}
  .matrix thead{display:table-header-group}
  .matrix tbody{display:table-row-group}
  .matrix tr{display:table-row;border:none;border-radius:0;margin:0;background:transparent;padding:0}
  .matrix thead tr:not(.filterrow){display:table-row}
  .matrix thead tr.filterrow{display:table-row}
  .matrix thead tr.filterrow th{display:table-cell;flex:none}
  .matrix th,.matrix td{display:table-cell;border:none;border-bottom:1px solid #f1ece3;
    padding:9px 12px;text-align:left;justify-content:flex-start;white-space:nowrap}
  .matrix td::before{display:none}
  .matrix td.empty{text-align:center}
}

.inc-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.inc-cat{font-size:12px;font-weight:700;letter-spacing:.02em;color:#333F48;background:#EAE3D7;padding:3px 10px;border-radius:20px}
.inc-imp{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;color:#fff}
.imp-Alta{background:#C0392B}.imp-Media{background:#B8860B}.imp-Baja{background:#8A949B}
.inc-rev{font-size:11px;font-weight:700;color:#6E8E00;border:1px solid #6E8E00;padding:2px 9px;border-radius:20px}
.inc-detalle{font-size:14px;line-height:1.55;color:#333F48;white-space:pre-wrap}
.inc-sug{font-size:13px;color:#5A6770;margin-top:6px;font-style:italic}
.inc-meta{font-size:12px;color:#8A949B;margin-top:8px}
.inc-nota{font-size:13px;color:#333F48;background:#F4F0E9;border-radius:8px;padding:8px 10px;margin-top:8px}

.incbar-track{flex:1;background:#EAE3D7;border-radius:6px;overflow:hidden;height:20px;min-width:60px}

.incbar-val{width:34px;text-align:right;color:#5A6770;flex:none;font-weight:600}

/* === Incidencias · tabla === */
.inctable-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:12px;background:var(--white)}
.inctable{width:100%;border-collapse:collapse;font-size:13.5px;min-width:680px}
.inctable thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#8A949B;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;background:#FAF8F3}
.inctable tbody td{padding:10px 12px;border-bottom:1px solid #f1ece3;vertical-align:middle}

.inctable tbody tr:hover{background:#FAF8F3}
.inc-c-fecha{white-space:nowrap;color:#5A6770}
.inc-c-det{color:#333F48;max-width:360px;overflow:hidden;text-overflow:ellipsis}
.inc-pend{font-size:11px;font-weight:700;color:#C0392B;border:1px solid #e3b6af;padding:2px 9px;border-radius:20px;white-space:nowrap;display:inline-block}

/* === candado de módulos sin acceso === */
.pill-lock{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:#8A949B;background:#EAE3D7;padding:3px 9px;border-radius:20px}
.locked-card{opacity:.55}
.locked-card:hover{transform:none;box-shadow:none}

/* ---- STOCK (lista compacta) ---- */
function stockMatch(a){
  const q=(S.stockQuery||'').toLowerCase();
  if(q && !((a.nombre+' '+a.cod).toLowerCase().includes(q))) return false;
  if(S.stockCat && a.categoria!==S.stockCat) return false;
  if(S.stockPedir && !(a.aviso!==false && a.stock<=a.min)) return false;
  return true;
}
function setStockQuery(v){ S.stockQuery=v; const e=el('stkQ'); render(); const n=el('stkQ'); if(n){ n.focus(); const val=n.value; n.value=''; n.value=val; } }
function setStockCat(v){ S.stockCat=v; render(); }
function toggleStockPedir(){ S.stockPedir=!S.stockPedir; render(); }
function stockView(){
  const cats=[...new Set(activeArts().map(a=>a.categoria))];
  const list=activeArts().filter(stockMatch).sort((a,b)=> a.categoria.localeCompare(b.categoria)||a.nombre.localeCompare(b.nombre));
  const totalArt=activeArts().length;
  const pedir=lowItems().length;
  const valor=activeArts().reduce((s,a)=>s+a.stock*(a.cost||0),0);
  const catSel=`<select class="fh" onchange="setStockCat(this.value)"><option value="">Todas las categorías</option>${cats.map(c=>`<option ${S.stockCat===c?'selected':''}>${c}</option>`).join('')}</select>`;
  const rows = list.length ? list.map(a=>{
    const est=estadoOf(a);
    const cls = est==='SIN STOCK'?'inc':est==='PEDIR'?'adj':est==='OK'?'sal':'';
    const cad=cadEstado(a);
    const cadCell = !a.caduca ? '<span class="muted">—</span>'
      : cad==='caducado' ? `<span class="tag inc">Caducado ${fmtFecha(a.caduca)}</span>`
      : cad==='por_caducar' ? `<span class="tag adj">${fmtFecha(a.caduca)} · ${diasHasta(a.caduca)} d</span>`
      : `<span class="mono muted">${fmtFecha(a.caduca)}</span>`;
    return `<tr>
      <td data-label="Artículo"><strong>${a.nombre}</strong> <span class="muted mono">${a.cod}</span>${a.trazable?' <span class="tag" style="background:#5A6770;color:#fff">paciente</span>':''}</td>
      <td data-label="Categoría">${a.categoria}</td>
      <td data-label="Proveedor">${a.proveedor||'<span class="muted">—</span>'}</td>
      <td data-label="Stock" class="mono" style="font-weight:700">${a.stock}</td>
      <td data-label="Mínimo" class="mono muted">${a.min}</td>
      <td data-label="Caduca">${cadCell}</td>
      <td data-label="Estado">${est==='Sin aviso'?'<span class="muted">Sin aviso</span>':`<span class="tag ${cls}">${est}</span>`}</td>
      <td data-label="Salida">${a.trazable
        ? `<button class="btn btn-ghost btn-sm" onclick="openSalida('${a.cod}')" ${a.stock<=0?'disabled':''}>Salida</button>`
        : `<button class="btn btn-ghost btn-sm" onclick="quickOut('${a.cod}')" ${a.stock<=0?'disabled':''} title="Descontar 1 (genérico)">−1</button>`}</td>
    </tr>`;
  }).join("") : `<tr><td colspan="8" class="empty">Ningún artículo coincide con el filtro.</td></tr>`;
  return `
    <div class="kpi" style="margin-bottom:14px">
      <div><div class="lbl">Artículos en el almacén</div><div class="val">${totalArt}</div></div>
      <div style="text-align:right"><div class="sub2">${pedir} por pedir</div><div class="sub2">${isAdmin()?'Valor: '+eur(valor):''}</div></div>
    </div>
    <div class="vhead">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <input id="stkQ" class="fh" style="min-width:200px" placeholder="Buscar artículo o código…" value="${S.stockQuery}" oninput="setStockQuery(this.value)">
        ${catSel}
        <button class="chip-sel ${S.stockPedir?'on':''}" onclick="toggleStockPedir()">Solo lo que hay que pedir</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="exportStock()">⤓ Exportar a Excel</button>
    </div>
    <div class="matrix"><table>
      <thead><tr><th>Artículo</th><th>Categoría</th><th>Proveedor</th><th>Stock</th><th>Mínimo</th><th>Caduca</th><th>Estado</th><th>Salida</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

/* ---- PEDIDOS ---- */
function pedidosView(){
  const ped=[...S.pedidos].sort((a,b)=>String(b.ts).localeCompare(String(a.ts)));
  const rows=ped.length?ped.map(p=>{
    const arts=p.lineas.map(l=>`${nombreOf(l.cod)} ×${l.cant}${l.precio>0?` · ${eur(l.precio)}/ud.`:''}`).join('<br>');
    const total=p.lineas.reduce((s,l)=>s+(l.precio||0)*l.cant,0);
    const cell=arts+(total>0?`<small style="display:block;color:var(--grey);margin-top:4px">Total: ${eur(total)}</small>`:'');
    const estado=p.estado==='recibido'
      ? `<span class="tag sal">Recibido</span><small style="display:block;color:var(--grey);margin-top:3px">Recepcionado por ${p.recUser||'—'} · ${fmtFecha(p.recTs)}</small>`
      : `<span class="tag inc">Pendiente</span>`;
    const accion=p.estado==='pendiente'
      ? `<button class="btn btn-ghost btn-sm" onclick="openPedidoEdit('${p.id}')">Editar</button> <button class="btn btn-primary btn-sm" onclick="openRecepcion('${p.id}')">Marcar recibido</button>` : '<span class="muted">—</span>';
    return `<tr>
      <td data-label="Nº" class="mono">#${String(p.id).slice(-4)}</td>
      <td data-label="Fecha pedido" class="mono muted">${fmtFecha(p.ts)}</td>
      <td data-label="Proveedor">${p.proveedor||'<span class="muted">—</span>'}</td>
      <td data-label="Pedido por">${p.user}</td>
      <td data-label="Artículos">${cell}</td>
      <td data-label="Estado">${estado}</td>
      <td data-label="Acción">${accion}</td>
    </tr>`;
  }).join("") : `<tr><td colspan="7" class="empty">Sin pedidos registrados.</td></tr>`;
  return `
   <div class="toolbar" style="margin:6px 0 14px">
     <div><div class="section-title">Pedidos</div>
     <div class="section-sub" style="margin:0">Qué se ha pedido, a qué proveedor y si está recibido. El stock sube al marcar un pedido como recibido.</div></div>
     <div class="actions"><button class="btn btn-primary" onclick="openModal('pedido')">＋ Nuevo pedido</button></div>
   </div>
   <div class="note">El precio del pedido es el <strong>precio acordado</strong>. Al recibir el albarán se confirma el <strong>precio real</strong> (obligatorio) y entonces sube el stock.</div>
   <div class="matrix"><table>
     <thead><tr><th>Nº</th><th>Fecha pedido</th><th>Proveedor</th><th>Pedido por</th><th>Artículos</th><th>Estado</th><th>Acción</th></tr></thead>
     <tbody>${rows}</tbody>
   </table></div>`;
}
function openRecepcion(id){
  const p=S.pedidos.find(x=>String(x.id)===String(id)); if(!p) return;
  S.alert="";
  F={type:'recepcion', pedidoId:id, recPrecios:p.lineas.map(l=>l.precio?String(l.precio):'')};
  S.modal='recepcion'; render();
}
function setRecPrecio(i,v){ F.recPrecios[i]=v; render(); const e=el('recP'+i); if(e){ e.focus(); const val=e.value; e.value=''; e.value=val; } }
function commitRecepcion(){
  const p=S.pedidos.find(x=>x.id===F.pedidoId); if(!p) return;
  if(p.lineas.some((l,i)=> !(parseFloat(String(F.recPrecios[i]).replace(',','.'))>0))){ toast('Introduce el precio de todas las líneas para poder recibir'); return; }
  const ts=todayStr();
  p.lineas.forEach((l,i)=>{
    const precio=parseFloat(String(F.recPrecios[i]).replace(',','.'))||0;
    l.precio=precio;
    const a=art(l.cod); if(!a) return;
    const oldQ=a.stock||0, oldC=a.cost||0, newQ=oldQ+l.cant;
    a.cost = newQ>0 ? (oldQ*oldC + l.cant*precio)/newQ : precio;
    a.stock = newQ;
    S.movimientos.unshift({id:uid(),ts:tsFrom(ts),tipo:"entrada",user:S.user.nombre,cod:l.cod,nombre:a.nombre,cant:l.cant,precio:precio,motivo:`Recepción pedido #${String(p.id).slice(-4)} · ${p.proveedor||''}`,pac:null});
  });
  p.estado='recibido'; p.recTs=ts; p.recUser=S.user.nombre;
  closeModal(); render(); toast('Pedido recibido · stock actualizado');
}

/* ---- MOVIMIENTOS ---- */
function movMatch(m){
  const f=S.movF;
  if(f.tipo){ if(f.tipo==='incidencia'){ if(!m.incidencia) return false; } else if(m.tipo!==f.tipo) return false; }
  if(f.user && m.user!==f.user) return false;
  if(f.doctor){ if(f.doctor==='__none'){ if(m.doctor) return false; } else if(m.doctor!==f.doctor) return false; }
  if(f.cat){ const a=art(m.cod); if(!a || a.categoria!==f.cat) return false; }
  if(f.art && !((m.nombre||'')+' '+(m.cod||'')).toLowerCase().includes(f.art.toLowerCase())) return false;
  if(f.fecha && !fmtFecha(m.ts).includes(f.fecha)) return false;
  if(f.pac){ const s=(m.tipo==='salida'&&m.pac)?`${m.pac.nombre} ${m.pac.apellido} ${m.pac.cod}`:(m.motivo||''); if(!s.toLowerCase().includes(f.pac.toLowerCase())) return false; }
  return true;
}
function setMovF(field,v){ S.movF[field]=v; render(); const ids={art:'mfArt',pac:'mfPac',fecha:'mfFecha'}; const e=el(ids[field]); if(e){ e.focus(); const val=e.value; e.value=''; e.value=val; } }
function clearMovF(){ S.movF={tipo:"",art:"",cat:"",user:"",doctor:"",pac:"",fecha:""}; render(); }
function movsView(){
  if(!S.movimientos.length) return `<div class="matrix"><div class="empty">Aún no hay movimientos registrados.</div></div>`;
  const f=S.movF;
  const anyF=f.tipo||f.art||f.cat||f.user||f.doctor||f.pac||f.fecha;
  const users=[...new Set(S.movimientos.map(m=>m.user).filter(Boolean))];
  const doctors=[...new Set(S.movimientos.map(m=>m.doctor).filter(Boolean))];
  const cats=[...new Set(S.articulos.map(a=>a.categoria))];
  const filtered=[...S.movimientos].filter(movMatch).sort((a,b)=>String(b.ts).localeCompare(String(a.ts)));
  const rows=filtered.map(m=>{ const neg=(m.tipo==='ajuste'||m.tipo==='merma'||m.tipo==='devolución');
    const tipoCls=m.tipo==='salida'?'sal':m.tipo==='merma'?'inc':(m.tipo==='ajuste'?'adj':m.tipo==='devolución'?'dev':'ent');
    const an=m.anulado;
    const accion = an ? `<span class="muted" style="font-size:12px">anulado por ${m.anuladoPor||'—'}</span>`
      : (m.tipo==='salida'||m.tipo==='merma') ? `<button class="btn btn-ghost btn-sm" onclick="anular('${m.id}')">Anular</button>` : '<span class="muted">—</span>';
    return `<tr ${an?'style="opacity:.55"':''}>
    <td data-label="Fecha" class="mono muted">${fmtFecha(m.ts)}</td>
    <td data-label="Tipo"><span class="tag ${tipoCls}" ${an?'style="text-decoration:line-through"':''}>${m.tipo}</span>${an?'<span class="tag" style="margin-left:5px;background:#6C757D;color:#fff">anulado</span>':(m.incidencia?'<span class="tag inc" style="margin-left:5px">incidencia</span>':'')}</td>
    <td data-label="Artículo"><strong>${m.nombre||m.cod}</strong> <span class="muted mono">${m.cod}</span></td>
    <td data-label="Ud." class="mono" ${neg&&!an?'style="color:var(--alert);font-weight:700"':''} ${an?'style="text-decoration:line-through"':''}>${neg?'−':''}${m.cant}</td>
    <td data-label="Registrado por">${m.user}</td>
    <td data-label="Doctor">${m.doctor?m.doctor:'<span class="muted">—</span>'}</td>
    <td data-label="Paciente / motivo">${m.tipo==='salida'&&m.pac ? `<span class="pat">${m.pac.nombre} ${m.pac.apellido}<small>Nº paciente ${m.pac.cod}</small>${m.incidencia?`<small style="color:var(--alert);font-weight:600">Incidencia${m.incidComentario?': '+m.incidComentario:''}</small>`:''}</span>` : m.tipo==='merma' ? `<span class="pat">${m.motivo||'Baja'}${m.ref?` · ${m.ref}`:''}<small style="color:var(--alert);font-weight:600">Pérdida ${eur(m.valorPerdido||0)}</small></span>` : m.motivo?`<span class="muted">${m.motivo}</span>`:'<span class="muted">—</span>'}</td>
    <td data-label="Acción">${accion}</td>
  </tr>`;}).join("");
  const tipoSel=`<select class="fh" onchange="setMovF('tipo',this.value)"><option value="">Todos</option>${['salida','entrada','merma','ajuste','devolución','incidencia'].map(t=>`<option value="${t}" ${f.tipo===t?'selected':''}>${t}</option>`).join('')}</select>`;
  const userSel=`<select class="fh" onchange="setMovF('user',this.value)"><option value="">Todos</option>${users.map(u=>`<option ${f.user===u?'selected':''}>${u}</option>`).join('')}</select>`;
  const docSel=`<select class="fh" onchange="setMovF('doctor',this.value)"><option value="">Todos</option><option value="__none" ${f.doctor==='__none'?'selected':''}>— (sin doctor)</option>${doctors.map(d=>`<option ${f.doctor===d?'selected':''}>${d}</option>`).join('')}</select>`;
  const catSel=`<select class="fh" onchange="setMovF('cat',this.value)"><option value="">Todas</option>${cats.map(c=>`<option ${f.cat===c?'selected':''}>${c}</option>`).join('')}</select>`;
  return `
    <div class="vhead">
      <div><div class="section-title">Movimientos</div>
      <div class="section-sub" style="margin:0">Rastro completo, ordenado por fecha. Filtra desde la cabecera de cada columna.</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <select class="fh" onchange="setMovF('cat',this.value)" title="Categoría"><option value="">Categoría: todas</option>${cats.map(c=>`<option ${f.cat===c?'selected':''}>${c}</option>`).join('')}</select>
        ${anyF?`<button class="btn btn-ghost btn-sm" onclick="clearMovF()">Quitar filtros</button>`:''}
        <button class="btn btn-ghost btn-sm" onclick="exportMovs()">⤓ Exportar a Excel</button>
      </div>
    </div>
    <div class="matrix"><table>
      <thead>
        <tr><th>Fecha</th><th>Tipo</th><th>Artículo</th><th>Ud.</th><th>Registrado por</th><th>Doctor</th><th>Paciente / motivo</th><th>Acción</th></tr>
        <tr class="filterrow">
          <th><input id="mfFecha" class="fh" placeholder="dd/mm/aaaa" value="${f.fecha}" oninput="setMovF('fecha',this.value)"></th>
          <th>${tipoSel}</th>
          <th><input id="mfArt" class="fh" placeholder="Artículo o código" value="${f.art}" oninput="setMovF('art',this.value)"></th>
          <th></th>
          <th>${userSel}</th>
          <th>${docSel}</th>
          <th><input id="mfPac" class="fh" placeholder="Paciente o motivo" value="${f.pac}" oninput="setMovF('pac',this.value)"></th>
          <th></th>
        </tr>
      </thead>
      <tbody>${rows || '<tr><td colspan="8" class="empty">Ningún movimiento coincide con el filtro.</td></tr>'}</tbody>
    </table></div>`;
}

/* ---- VALOR ALMACENADO ---- */
function valorView(){
  let totalVal=0, totalUnits=0;
  const cats={};
  activeArts().forEach(a=>{ const v=a.stock*(a.cost||0); totalVal+=v; totalUnits+=a.stock;
    if(!cats[a.categoria]) cats[a.categoria]={u:0,v:0,n:0,items:[]}; cats[a.categoria].u+=a.stock; cats[a.categoria].v+=v; cats[a.categoria].n++; cats[a.categoria].items.push(a); });
  const catList=Object.keys(cats).map(c=>({cat:c,...cats[c]})).sort((a,b)=>b.v-a.v);
  const palette=['#8FB800','#333F48','#5A6770','#B8A88F','#6E8E00','#A07850','#C8A96E','#6C757D','#A8B400'];
  const maxV=Math.max(...catList.map(c=>c.v),1);
  const bars=catList.map((c,i)=>{ const pct=totalVal?Math.round(c.v/totalVal*100):0; const col=palette[i%palette.length];
    return `<div style="margin-bottom:11px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:4px">
        <span><strong>${c.cat}</strong> <span class="muted">${c.n} art. · ${c.u} ud.</span></span>

      <div style="background:rgba(0,0,0,.06);border-radius:7px;height:16px;overflow:hidden">
        <div style="width:${Math.max(c.v/maxV*100,1.5)}%;height:100%;background:${col};border-radius:7px"></div></div>
    </div>`;}).join("");
  const detail=catList.map((c,i)=>{ const col=palette[i%palette.length];
    const arts=c.items.sort((a,b)=>(b.stock*(b.cost||0))-(a.stock*(a.cost||0))).map(a=>{ const v=a.stock*(a.cost||0);
      return `<tr>
        <td data-label="Artículo"><strong>${a.nombre}</strong> <span class="muted mono">${a.cod}</span></td>
        <td data-label="Precio medio" class="mono">${eur(a.cost||0)}/ud.</td>
        <td data-label="Uds." class="mono">${a.stock}</td>
        <td data-label="Valor" class="mono"><strong>${eur(v)}</strong></td>
      </tr>`;}).join("");
    return `<tr style="background:rgba(0,0,0,.04)">
        <td style="border-left:4px solid ${col}"><strong>${c.cat}</strong></td>
        <td class="mono muted"></td><td class="mono muted">${c.u} ud.</td>
        <td class="mono"><strong>${eur(c.v)}</strong></td></tr>${arts}`;}).join("");
  return `
    <div class="kpi"><div><div class="lbl">Valor del stock ahora mismo</div><div class="val">${eur(totalVal)}</div></div>
      <div style="text-align:right"><div class="sub2">${totalUnits} unidades</div><div class="sub2">${activeArts().length} artículos</div></div></div>
    <div class="note">El precio medio es el coste ponderado de las compras registradas (recepciones y entradas). Esta pestaña solo la ve dirección.</div>
    <div class="vhead"><div><strong style="font-size:15px">Valor por categoría</strong></div>
      <button class="btn btn-ghost btn-sm" onclick="exportValor()">⤓ Exportar valoración</button></div>
    <div style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:18px">${bars}</div>

    <div class="matrix"><table>
      <thead><tr><th>Artículo</th><th>Precio medio</th><th>Uds.</th><th>Valor</th></tr></thead>
      <tbody>${detail}</tbody>
    </table></div>`;
}

/* ---- ALERTAS / CAMPANAS (separadas) ---- */
function showCadPop(){
  const cad=cadItems(); const e=el('cadpop'); if(!e) return;
  if(!cad.length){ e.classList.remove('show'); return; }
  const venc=cad.filter(a=>diasHasta(a.caduca)<0).length;
  const prox=cad.length-venc;
  const partes=[]; if(venc) partes.push(`${venc} caducado${venc>1?'s':''}`); if(prox) partes.push(`${prox} próximo${prox>1?'s':''} a caducar`);
  e.innerHTML=`<button class="cp-x" onclick="hideCadPop()">×</button>
    <b>⏱ Caducidad — ${cad.length} artículo${cad.length>1?'s':''}</b>
    ${partes.join(' · ')}
    <span class="cp-link" onclick="hideCadPop();openAlert('cad')">Ver detalle</span>`;
  e.classList.add('show');
  clearTimeout(window._cadtt); window._cadtt=setTimeout(()=>{ const x=el('cadpop'); if(x)x.classList.remove('show'); }, 7000);
}
function hideCadPop(){ const e=el('cadpop'); if(e)e.classList.remove('show'); clearTimeout(window._cadtt); }
function openAlert(kind){ S.alert=kind; render(); }
function closeAlert(){ S.alert=""; render(); }

function pedirModal(){
  const items=lowItems();
  const cats=[...new Set(items.map(a=>a.categoria))].sort((a,b)=>a.localeCompare(b));
  const grupo=c=>{
    const its=items.filter(a=>a.categoria===c);
    const rows=its.map(a=>`<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;font-size:14px">
      <span><strong>${a.nombre}</strong> <span class="muted mono">${a.cod}</span> · ${a.proveedor||'sin proveedor'}</span>
      <span class="tag ${a.stock===0?'inc':'adj'}">${a.stock} ud. (min ${a.min})</span></div>`).join("");
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px;letter-spacing:.3px;margin-bottom:6px">
        <span>${c}</span><span class="muted" style="font-weight:600">${its.length}</span></div>
      ${rows}</div>`;
  };
  const body=items.length? cats.map(grupo).join("") : '<div class="muted">Nada por debajo del mínimo. Todo en orden.</div>';
  return `<div class="overlay" onclick="if(event.target===this)closeAlert()"><div class="modal">
    <div class="modal-head"><h2>Pendiente de pedir (${items.length})</h2><button class="x" onclick="closeAlert()">×</button></div>
    <div class="modal-body">${body}</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeAlert()">Entendido</button><button class="btn btn-primary" onclick="closeAlert();setSub('pedidos')">Ir a pedidos</button></div>
  </div></div>`;
}

function cadModal(){
  const cad=cadItems();
  const venc=cad.filter(a=>diasHasta(a.caduca)<0);
  const prox=cad.filter(a=>diasHasta(a.caduca)>=0);
  const fila=a=>{ const dd=diasHasta(a.caduca); const e=dd<0;
    return `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;font-size:14px">
      <span><strong>${a.nombre}</strong> <span class="muted mono">${a.cod}</span> · ${a.stock} ud. · ${a.categoria}</span>
      <span class="tag ${e?'inc':'adj'}">${e?'Caducado '+fmtFecha(a.caduca):fmtFecha(a.caduca)+' · '+dd+' d'}</span></div>`;};
  const bloque=(titulo,arr)=>arr.length?`<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px;letter-spacing:.3px;margin-bottom:6px">
        <span>${titulo}</span><span class="muted" style="font-weight:600">${arr.length}</span></div>
      ${arr.map(fila).join("")}</div>`:'';
  const body=cad.length? bloque('Caducado', venc)+bloque('Próximo a caducar', prox) : '<div class="muted">Nada caducado ni próximo a caducar.</div>';
  return `<div class="overlay" onclick="if(event.target===this)closeAlert()"><div class="modal">
    <div class="modal-head"><h2>Caducidad (${cad.length})</h2><button class="x" onclick="closeAlert()">×</button></div>
    <div class="modal-body">${body}</div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeAlert()">Entendido</button><button class="btn btn-primary" onclick="closeAlert();setSub('stock')">Ver en stock</button></div>
  </div></div>`;
}

/* ===================== MODALES / FORMULARIOS ===================== */
let F={};
function openModal(type){
  S.alert="";
  if(type==='articulo') F={type, acod:"", anombre:"", adesc:"", acat:"", aprov:"", amin:3, aprecio:"", aprovNuevo:"", aviso:true, acaduca:"", atraz:false};
  else if(type==='seguimiento') F={type, scats:[], estado:"ok", comentario:""};
  else if(type==='pedido') F={type, pcod:"", pcant:1, pprecio:"", proveedor:"", proveedorNuevo:"", fecha:todayStr(), lineas:[]};
  else if(type==='salida') F={type, cod:"", cant:1, doctor:null, pcod:"", pnombre:"", papellido:"", incidencia:false, incidComentario:""};
  else if(type==='entrada') F={type, cod:"", cant:1, precio:"", fecha:todayStr()};
  else if(type==='merma') F={type, cod:"", cant:1, motivo:"Roto / defectuoso", ref:""};
  S.modal=type; render();
}
function closeModal(){ S.modal=null; const o=document.querySelector(".overlay"); if(o)o.remove(); }
function setSel(field,v){ F[field]=v; render(); }
function setInp(field,v){ F[field]=v; }
function setProv(v){ F.proveedor=v; if(v!=='__nuevo__') F.proveedorNuevo=''; render(); }
function setToggle(field,val){ F[field]=val; render(); }
function selDoctor(i){ F.doctor=DOCTORS[i]; render(); }
function openEdit(cod){ const a=art(cod); S.alert=""; F={type:'editart', cod, enombre:a.nombre, edesc:a.descripcion||'', ecat:a.categoria, eprov:a.proveedor||'', emin:a.min, eprecio:a.precioRef||'', eaviso:a.aviso!==false, eactivo:a.activo!==false, ecaduca:a.caduca||'', etraz:a.trazable===true}; S.modal='editart'; render(); }

function modalContent(){
  if(F.type==='articulo') return articleModalContent();
  if(F.type==='editart') return editArticleModalContent();
  if(F.type==='seguimiento') return seguiModalContent();
  if(F.type==='pedido') return pedidoModalContent();
  if(F.type==='recepcion') return recepcionModalContent();
  if(F.type==='salida'||F.type==='entrada'||F.type==='merma') return stockMoveModal();
  return '';
}

/* opciones de artículo activas */
function artOptions(sel, soloConStock){
  let list=activeArts();
  if(soloConStock) list=list.filter(a=>a.stock>0);
  list=list.sort((a,b)=>a.categoria.localeCompare(b.categoria)||a.nombre.localeCompare(b.nombre));
  return `<option value="">Elige artículo…</option>`+list.map(a=>`<option value="${a.cod}" ${sel===a.cod?'selected':''}>${a.nombre} · ${a.cod} (${a.categoria})${soloConStock?` — ${a.stock} ud.`:''}</option>`).join("");
}
function catOptions(sel){ return `<option value="">Elige categoría…</option>`+CATEGORIAS.map(c=>`<option ${sel===c?'selected':''}>${c}</option>`).join(""); }
function provOptions(sel){ return `<option value="">Sin proveedor habitual</option>`+S.proveedores.map(p=>`<option ${sel===p?'selected':''}>${p}</option>`).join(""); }

/* ---- NUEVO PEDIDO ---- */
function addPedidoLinea(){
  const cant=parseInt(F.pcant)||0;
  if(!F.pcod||cant<1){ toast('Elige artículo y cantidad'); return; }
  const precio=parseFloat(String(F.pprecio).replace(',','.'))||0;
  F.lineas.push({cod:F.pcod, cant:cant, precio:precio});
  F.pcod=''; F.pcant=1; F.pprecio=''; render();
}
function removePedidoLinea(i){ F.lineas.splice(i,1); render(); }
/* --- sugerir lo que falta (bajo mínimo) al crear un pedido --- */
function pedFaltan(){
  var en={}; (F.lineas||[]).forEach(function(l){ en[l.cod]=1; });
  var f=lowItems().filter(function(a){ return !en[a.cod]; });
  var prov=(F.proveedor && F.proveedor!=='__nuevo__')?F.proveedor:'';
  if(prov) f=f.filter(function(a){ return !a.proveedor || a.proveedor===prov; });
  return f;
}
function pedidoAddArt(cod){
  if(!Array.isArray(F.lineas)) F.lineas=[];
  if(F.lineas.some(function(l){ return l.cod===cod; })) return;
  var a=(typeof art==='function')?art(cod):null; if(!a) return;
  var sug=Math.max((Number(a.min)||0)-(Number(a.stock)||0),1);
  var precio=Number(a.precioRef)||Number(a.cost)||0;
  F.lineas.push({cod:cod, cant:sug, precio:precio});
  render();
}
function pedidoAddTodosFaltan(){ pedFaltan().forEach(function(a){ pedidoAddArt(a.cod); }); }
function setPedLineaCant(i,v){ if(!Array.isArray(F.lineas)) return; var n=parseInt(v)||0; if(n<1){ F.lineas.splice(i,1); } else { F.lineas[i].cant=n; } render(); }
function openPedidoEdit(id){
  var p=S.pedidos.find(function(x){ return String(x.id)===String(id); }); if(!p) return;
  if(p.estado==='recibido'){ toast('Un pedido ya recibido no se puede editar'); return; }
  F={ type:'pedido', editId:p.id, lineas:(p.lineas||[]).map(function(l){ return {cod:l.cod, cant:l.cant, precio:l.precio}; }),
      proveedor:p.proveedor||'', proveedorNuevo:'', fecha:p.ts||todayStr(), pcod:'', pcant:1, pprecio:'' };
  S.modal='pedido'; render();
}
function commitPedido(){
  if(!F.lineas.length) return;
  const prov=(F.proveedor==='__nuevo__'?(F.proveedorNuevo||''):(F.proveedor||'')).trim();
  if(!prov){ toast('Elige o escribe un proveedor'); return; }
  if(!S.proveedores.includes(prov)) S.proveedores.push(prov);
  S.pedidos.unshift({id:Date.now(), ts:F.fecha||todayStr(), proveedor:prov, user:S.user.nombre, lineas:F.lineas.map(l=>({...l})), estado:'pendiente'});
  closeModal(); S.sub='pedidos'; render(); toast('Pedido creado · pendiente de recibir');
}
function pedidoModalContent(){
  const total=F.lineas.reduce((s,l)=>s+(l.precio||0)*l.cant,0);
  const lineList=F.lineas.length
    ? F.lineas.map((l,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;font-size:14px"><span><strong>${nombreOf(l.cod)}</strong> · ×<input type="number" min="1" value="${l.cant}" onchange="setPedLineaCant(${i},this.value)" onclick="event.stopPropagation()" style="width:54px;padding:2px 5px;font-size:13px;border:1px solid var(--line);border-radius:6px;margin:0 2px">${l.precio>0?` · <span class="mono">${eur(l.precio)}/ud.</span>`:' · <span class="muted">sin precio</span>'}</span><button class="btn btn-ghost btn-sm" onclick="removePedidoLinea(${i})">Quitar</button></div>`).join("")
    : '<div class="muted" style="font-size:13px">Aún no has añadido ninguna línea.</div>';
  const totalRow=total>0?`<div style="text-align:right;font-size:14px;margin-top:8px">Coste estimado: <strong class="mono">${eur(total)}</strong></div>`:'';
  const provOk=F.proveedor && (F.proveedor!=='__nuevo__' || (F.proveedorNuevo||'').trim());
  const valid=F.lineas.length>0;
  const hint=!valid?'! Añade al menos una línea.':(!provOk?'! Elige el proveedor.':'✓ Listo para crear el pedido.');
  return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:600px">
    <div class="modal-head"><h2>${F.editId?'Editar pedido':'Nuevo pedido'}</h2><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="note" style="margin-top:0">Añade los artículos que vas a pedir. Si conoces el precio acordado, mételo aquí; lo confirmarás con el albarán al recibir.</div>
      <div class="fld" style="margin-top:0"><label>Proveedor</label>
        <select class="inp" onchange="setProv(this.value)">
          <option value="">Elige proveedor…</option>
          ${S.proveedores.map(pr=>`<option value="${pr}" ${F.proveedor===pr?'selected':''}>${pr}</option>`).join("")}
          <option value="__nuevo__" ${F.proveedor==='__nuevo__'?'selected':''}>＋ Otro proveedor (escribir)…</option>
        </select></div>
      ${F.proveedor==='__nuevo__'?`<div class="fld" style="margin-top:8px"><label>Nombre del proveedor nuevo</label>
        <input class="inp" type="text" placeholder="Ej. Ormco Ibérica" value="${F.proveedorNuevo||''}" oninput="F.proveedorNuevo=this.value" onchange="render()"></div>`:''}
      ${(function(){ var f=pedFaltan(); if(!f.length) return ''; return `<div style="background:#F7F4EE;border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-top:18px">
        <div style="font-size:12.5px;font-weight:700;color:#46525B;margin-bottom:9px">Lo que falta · ${f.length} bajo mínimo <span style="font-weight:400;color:#8A949B">· toca para añadirlo</span></div>
        <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px">
          ${f.map(function(a){ return `<button type="button" class="btn btn-ghost btn-sm" onclick="pedidoAddArt('${a.cod}')" title="stock ${a.stock} / mín ${a.min}${a.proveedor?' · '+incEsc(a.proveedor):''}">＋ ${incEsc(a.nombre)} <span class="muted">(${a.stock}/${a.min})</span></button>`; }).join('')}
        </div>
        <button type="button" class="btn btn-ghost btn-sm" style="font-weight:700" onclick="pedidoAddTodosFaltan()">＋ Añadir todos (${f.length})</button></div>`; })()}
      <div class="fld"><label>Artículo</label>
        <select class="inp" onchange="setInp('pcod',this.value)">${artOptions(F.pcod,false)}</select></div>
      <div class="grid2">
        <div class="fld" style="margin-top:0"><label>Cantidad</label>
          <input class="inp" type="number" min="1" value="${F.pcant}" oninput="setInp('pcant',this.value)"></div>
        <div class="fld" style="margin-top:0"><label>Precio acordado (€/ud.)</label>
          <input class="inp" type="number" min="0" step="0.01" inputmode="decimal" placeholder="opcional" value="${F.pprecio}" oninput="setInp('pprecio',this.value)"></div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="addPedidoLinea()">＋ Añadir línea</button>
      <div style="border-top:1px solid var(--line);margin:20px 0 0"></div>
      <div class="fld" style="margin-top:16px"><label>Líneas del pedido</label>${lineList}${totalRow}</div>
      <div class="fld"><label>Fecha del pedido</label>
        <input class="inp" type="date" value="${F.fecha||''}" oninput="setInp('fecha',this.value)" style="max-width:210px"></div>
      <div class="req-note ${valid&&provOk?'okk':''}">${hint}</div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" ${valid?'':'disabled'} onclick="commitPedido()">${F.editId?'Guardar cambios':'Crear pedido'}</button></div>
  </div></div>`;
}

/* ---- RECEPCIÓN ---- */
function recepcionModalContent(){
  const p=S.pedidos.find(x=>x.id===F.pedidoId); if(!p) return '';
  const allPriced=p.lineas.every((l,i)=>parseFloat(String(F.recPrecios[i]).replace(',','.'))>0);
  const lines=p.lineas.map((l,i)=>{ const a=art(l.cod);
    return `<div class="grid2" style="align-items:end;margin-bottom:6px">
      <div class="fld" style="margin:0"><label>${nombreOf(l.cod)} · ×${l.cant}</label>
        <div class="hint" style="text-align:left">En stock ahora: ${a?a.stock:0} ud.</div></div>
      <div class="fld" style="margin:0"><label>Precio compra (€/ud.)</label>
        <input id="recP${i}" class="inp" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00" value="${F.recPrecios[i]}" oninput="setRecPrecio(${i},this.value)"></div>
    </div>`;}).join("");

/* ---- MOVIMIENTOS DE STOCK: salida / entrada / merma ---- */
let _mid=0; function uid(){ return 'M'+Date.now().toString(36)+(++_mid); }
function quickOut(cod){
  const a=art(cod); if(!a) return;
  if(a.stock<=0){ toast('Sin stock'); return; }
  a.stock-=1;
  const mov={id:uid(),ts:tsFrom(todayStr()),tipo:"salida",user:S.user.nombre,cod:a.cod,nombre:a.nombre,cant:1,doctor:null,motivo:"Salida rápida (genérico)",pac:null};
  S.movimientos.unshift(mov);
  window._lastQuick=mov;
  render(); toastUndo(`−1 ${a.nombre} · como ${S.user.nombre} · quedan ${a.stock}`);
}
function undoQuick(){
  const mov=window._lastQuick; if(!mov){ toast('Nada que deshacer'); return; }
  const a=art(mov.cod); if(a) a.stock+=1;
  const i=S.movimientos.indexOf(mov); if(i>=0) S.movimientos.splice(i,1);
  window._lastQuick=null;
  render(); toast(`Deshecho · ${a?a.nombre:''} vuelve a ${a?a.stock:''}`);
}
function anular(id){
  const m=S.movimientos.find(x=>x.id===id); if(!m||m.anulado) return;
  if(!(m.tipo==='salida'||m.tipo==='merma')){ toast('Solo se anulan salidas y bajas'); return; }
  const a=art(m.cod); if(a) a.stock+=(m.cant||0);
  m.anulado=true; m.anuladoPor=S.user.nombre; m.anuladoTs=tsFrom(todayStr());
  if(window._lastQuick===m) window._lastQuick=null;
  render(); toast(`Movimiento anulado · ${a?a.nombre+' vuelve a '+a.stock:''}`);
}
function openSalida(cod){ openModal('salida'); F.cod=cod; render(); }
function commitMove(){
  const a=art(F.cod); if(!a){ toast('Elige un artículo'); return; }
  const cant=parseInt(F.cant)||0; if(cant<1){ toast('Cantidad no válida'); return; }
  const ts=tsFrom(F.fecha||todayStr());
  if(F.type==='salida'){
    if(!F.doctor){ toast('Selecciona el doctor'); return; }
    if(a.stock<cant){ toast('No hay stock suficiente'); return; }
    a.stock-=cant;
    S.movimientos.unshift({id:uid(),ts,tipo:"salida",user:S.user.nombre,cod:a.cod,nombre:a.nombre,cant,doctor:F.doctor,
      pac:{cod:(F.pcod||'').trim(),nombre:(F.pnombre||'').trim(),apellido:(F.papellido||'').trim()},
      incidencia:!!F.incidencia, incidComentario:(F.incidComentario||'').trim()});
    closeModal(); render(); toast('Salida registrada');
  } else if(F.type==='entrada'){
    const precio=parseFloat(String(F.precio).replace(',','.'))||0;
    const oldQ=a.stock||0, oldC=a.cost||0, newQ=oldQ+cant;
    a.cost = newQ>0 ? (oldQ*oldC + cant*(precio>0?precio:oldC))/newQ : precio;
    a.stock=newQ;
    S.movimientos.unshift({id:uid(),ts,tipo:"entrada",user:S.user.nombre,cod:a.cod,nombre:a.nombre,cant,precio,motivo:"Entrada directa",pac:null});
    closeModal(); render(); toast('Entrada registrada · stock actualizado');
  } else if(F.type==='merma'){
    if(a.stock<cant){ toast('No hay stock suficiente para la baja'); return; }
    a.stock-=cant;
    const valorPerdido=cant*(a.cost||0);
    S.movimientos.unshift({id:uid(),ts,tipo:"merma",user:S.user.nombre,cod:a.cod,nombre:a.nombre,cant,motivo:F.motivo||"Pérdida",ref:(F.ref||'').trim(),valorPerdido,pac:null});
    closeModal(); render(); toast('Baja registrada · '+eur(valorPerdido)+' de pérdida');
  }
}

/* ---- PÉRDIDAS / MERMA ---- */
function mermaList(){ return S.movimientos.filter(m=>m.tipo==='merma' && !m.anulado); }
function perdidasView(){
  const list=mermaList();
  const total=list.reduce((s,m)=>s+(m.valorPerdido||0),0);
  const uds=list.reduce((s,m)=>s+(m.cant||0),0);
  const mot={};
  list.forEach(m=>{ const k=m.motivo||'Otros'; if(!mot[k])mot[k]={v:0,n:0,u:0}; mot[k].v+=(m.valorPerdido||0); mot[k].n++; mot[k].u+=(m.cant||0); });
  const motList=Object.keys(mot).map(k=>({mot:k,...mot[k]})).sort((a,b)=>b.v-a.v);
  const palette=['#C0392B','#A07850','#6E8E00','#5A6770','#B8A88F','#8FB800','#6C757D'];
  const maxV=Math.max(...motList.map(m=>m.v),1);
  const bars=motList.map((m,i)=>{ const pct=total?Math.round(m.v/total*100):0; const col=palette[i%palette.length];
    return `<div style="margin-bottom:11px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:4px">
        <span><strong>${m.mot}</strong> <span class="muted">${m.n} baja${m.n>1?'s':''} · ${m.u} ud.</span></span>
        <span class="mono"><strong>${eur(m.v)}</strong> · ${pct}%</span></div>
      <div style="background:rgba(0,0,0,.06);border-radius:7px;height:16px;overflow:hidden">
        <div style="width:${Math.max(m.v/maxV*100,1.5)}%;height:100%;background:${col};border-radius:7px"></div></div>
    </div>`;}).join("");
  const rows=[...list].sort((a,b)=>String(b.ts).localeCompare(String(a.ts))).map(m=>`<tr>
      <td data-label="Fecha" class="mono muted">${fmtFecha(m.ts)}</td>
      <td data-label="Artículo"><strong>${m.nombre||m.cod}</strong> <span class="muted mono">${m.cod}</span></td>
      <td data-label="Motivo">${m.motivo||'—'}${m.ref?` <span class="muted">· ${m.ref}</span>`:''}</td>
      <td data-label="Ud." class="mono">${m.cant}</td>
      <td data-label="Valor perdido" class="mono" style="color:var(--alert);font-weight:700">${eur(m.valorPerdido||0)}</td>
      <td data-label="Registrado por">${m.user}</td>
    </tr>`).join("") || `<tr><td colspan="6" class="empty">Aún no hay bajas registradas.</td></tr>`;
  return `
    <div class="kpi"><div><div class="lbl">Dinero perdido (merma + garantía)</div><div class="val" style="color:var(--alert)">${eur(total)}</div></div>
      <div style="text-align:right"><div class="sub2">${uds} unidades</div><div class="sub2">${list.length} bajas</div></div></div>
    <div class="note">Cada baja se valora al coste medio del artículo en ese momento. Aquí ves cuánto y por qué se pierde. Solo lo ve dirección.</div>
    <div class="vhead"><div><strong style="font-size:15px">Pérdidas por motivo</strong></div>
      <button class="btn btn-ghost btn-sm" onclick="exportPerdidas()">⤓ Exportar pérdidas</button></div>
    <div style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:18px">${motList.length?bars:'<div class="muted">Sin pérdidas todavía.</div>'}</div>
    <div class="vhead"><div><strong style="font-size:15px">Detalle de bajas</strong></div></div>
    <div class="matrix"><table>
      <thead><tr><th>Fecha</th><th>Artículo</th><th>Motivo</th><th>Ud.</th><th>Valor perdido</th><th>Registrado por</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}
function exportPerdidas(){
  if(typeof XLSX==='undefined'){ toast('No se pudo cargar Excel'); return; }

  const mot={}; let total=0;
  list.forEach(m=>{ total+=(m.valorPerdido||0); const k=m.motivo||'Otros'; if(!mot[k])mot[k]={v:0,n:0,u:0}; mot[k].v+=(m.valorPerdido||0); mot[k].n++; mot[k].u+=(m.cant||0); });
  const r1=[["Motivo","Bajas","Uds.","Valor perdido (€)","% del total"]];
  Object.keys(mot).sort((a,b)=>mot[b].v-mot[a].v).forEach(k=>r1.push([k,mot[k].n,mot[k].u,Number(mot[k].v.toFixed(2)),total?Math.round(mot[k].v/total*100):0]));
  r1.push([]); r1.push(["TOTAL","","",Number(total.toFixed(2)),100]);

  const ws1=XLSX.utils.aoa_to_sheet(r1); ws1['!cols']=[{wch:20},{wch:8},{wch:8},{wch:16},{wch:12}];
  const ws2=XLSX.utils.aoa_to_sheet(r2); ws2['!cols']=[{wch:11},{wch:10},{wch:30},{wch:18},{wch:24},{wch:7},{wch:16},{wch:16}];

}

/* ============================================================================
   LUCAI · CAPA ROBUSTA (multiusuario)
   Redefine por debajo las funciones de guardado para que cada acción pase por
   las tablas relacionales y el candado atómico del servidor. No toca las
   pantallas: solo cambia cómo se guarda y se sincroniza.
   ============================================================================ */

/* ---- LECTURA: construir S desde las tablas ---- */
async function loadFromDB(){
  try{
    const [arts, provs, movs, peds, segs] = await Promise.all([
      sbc.from('lucai_articulos').select('*').order('cod'),
      sbc.from('lucai_proveedores').select('nombre').order('nombre'),
      sbc.from('lucai_movimientos').select('*').order('created_at',{ascending:false}),
      sbc.from('lucai_pedidos').select('*').order('created_at',{ascending:false}),
      sbc.from('lucai_seguimientos').select('*').order('created_at',{ascending:false}),
    ]);
    if(arts.data) S.articulos = arts.data.map(r=>({
      cod:r.cod, nombre:r.nombre, descripcion:r.descripcion||'', categoria:r.categoria, proveedor:r.proveedor,
      min:Number(r.min)||0, precioRef:Number(r.precio_ref)||0, stock:Number(r.stock)||0,
      cost:Number(r.cost)||0, aviso:r.aviso!==false, activo:r.activo!==false,
      caduca:r.caduca||null, trazable:r.trazable===true }));
    if(provs.data) S.proveedores = provs.data.map(r=>r.nombre);
    if(movs.data) S.movimientos = movs.data.map(r=>({
      id:r.id, ts:r.ts, tipo:r.tipo, user:r.user_nombre, doctor:r.doctor, cod:r.cod,
      nombre:r.nombre, cant:Number(r.cant)||0,
      pac:(r.pac_cod||r.pac_nombre||r.pac_apellido)?{cod:r.pac_cod||'',nombre:r.pac_nombre||'',apellido:r.pac_apellido||''}:null,
      precio:r.precio==null?undefined:Number(r.precio), motivo:r.motivo,
      valorPerdido:r.valor_perdido==null?undefined:Number(r.valor_perdido),
      incidencia:r.incidencia===true, incidComentario:r.incid_comentario, ref:r.ref,
      anulado:r.anulado===true }));
    if(peds.data) S.pedidos = peds.data.map(r=>({
      id:r.id, ts:r.ts, proveedor:r.proveedor, user:r.user_nombre, estado:r.estado,
      recTs:r.rec_ts, recUser:r.rec_user, lineas:Array.isArray(r.lineas)?r.lineas:[] }));
    if(segs.data) S.seguimientos = segs.data.map(r=>({
      id:r.id, ts:r.ts, user:r.user_nombre, cod:r.cod, nombre:r.nombre, estado:r.estado, comentario:r.comentario,
      categorias:Array.isArray(r.categorias)?r.categorias:(function(){try{return r.categorias?JSON.parse(r.categorias):[];}catch(_){return [];}})() }));
    // restaurar (una vez) los campos que viven en lucai_estado: usuarios, doctores, áreas, grupos, categorías
    if(!window._estadoLoaded){
      try{
        const { data: estRow } = await sbc.from('lucai_estado').select('data').eq('clinica', CLINICA).maybeSingle();
        const d = estRow && estRow.data;
        if(d){ ['usuarios','doctores','tarAreas','grupos','comCategorias','accesos'].forEach(f=>{ if(d[f]!==undefined && d[f]!==null) S[f]=d[f]; }); }
      }catch(_){}
      window._estadoLoaded=true;
    }
    LOADED = true;
  }catch(e){ console.error('loadFromDB', e); toast('No se pudieron cargar los datos: '+(e.message||e)); }
}

/* ---- ESCRITURA: stock via candado atomico ---- */
async function _rpcMov(m){
  const precio = (m.precio && m.precio>0) ? m.precio : null;
  const { error } = await sbc.rpc('lucai_mov', {
    p_id:m.id, p_tipo:m.tipo, p_cod:m.cod, p_cant:Math.abs(m.cant),
    p_user:m.user||null, p_doctor:m.doctor||null, p_nombre:m.nombre||null,
    p_pac_cod:m.pac?(m.pac.cod||null):null, p_pac_nombre:m.pac?(m.pac.nombre||null):null,
    p_pac_apellido:m.pac?(m.pac.apellido||null):null,
    p_precio:precio, p_motivo:m.motivo||null,
    p_incidencia:!!m.incidencia, p_incid_comentario:m.incidComentario||null, p_ts:m.ts||null });
  if(error) throw error;
}
async function srvMov(m, okMsg, undo){
  try{ await _rpcMov(m); }
  catch(e){ console.error('srvMov', e); await syncAll(); toast('Error al guardar: '+(e.message||e)); return; }
  await loadFromDB(); render();
  if(undo) toastUndo(okMsg); else if(okMsg) toast(okMsg);
}

}

function quickOut(cod){
  const a=art(cod); if(!a) return;
  if(a.stock<=0){ toast('Sin stock'); return; }
  a.stock-=1;
  const mov={id:uid(),ts:tsFrom(todayStr()),tipo:"salida",user:S.user.nombre,cod:a.cod,nombre:a.nombre,cant:1,doctor:null,motivo:"Salida rápida (genérico)",pac:null};
  S.movimientos.unshift(mov);
  window._lastQuick=mov;
  render();
  srvMov(mov, `−1 ${a.nombre} · como ${S.user.nombre} · quedan ${a.stock}`, true);
}
function undoQuick(){
  const mov=window._lastQuick; if(!mov){ toast('Nada que deshacer'); return; }
  window._lastQuick=null;
  const a=art(mov.cod);
  srvAnular(mov.id, `Deshecho · ${a?a.nombre:''}`);
}
function anular(id){
  const m=S.movimientos.find(x=>x.id===id); if(!m||m.anulado) return;
  if(!(m.tipo==='salida'||m.tipo==='merma')){ toast('Solo se anulan salidas y bajas'); return; }
  if(window._lastQuick && window._lastQuick.id===id) window._lastQuick=null;
  srvAnular(id, 'Movimiento anulado');
}

function commitMove(){
  const a=art(F.cod); if(!a){ toast('Elige un artículo'); return; }
  const cant=parseInt(F.cant)||0; if(cant<1){ toast('Cantidad no válida'); return; }
  const ts=tsFrom(F.fecha||todayStr());
  if(F.type==='salida'){
    if(!F.doctor){ toast('Selecciona el doctor'); return; }
    if(a.stock<cant){ toast('No hay stock suficiente'); return; }
    a.stock-=cant;
    const mov={id:uid(),ts,tipo:"salida",user:S.user.nombre,cod:a.cod,nombre:a.nombre,cant,doctor:F.doctor,
      pac:{cod:(F.pcod||'').trim(),nombre:(F.pnombre||'').trim(),apellido:(F.papellido||'').trim()},
      incidencia:!!F.incidencia, incidComentario:(F.incidComentario||'').trim()};
    S.movimientos.unshift(mov);
    closeModal(); render(); srvMov(mov, 'Salida registrada');
  } else if(F.type==='entrada'){
    const precio=parseFloat(String(F.precio).replace(',','.'))||0;
    const oldQ=a.stock||0, oldC=a.cost||0, newQ=oldQ+cant;
    a.cost = newQ>0 ? (oldQ*oldC + cant*(precio>0?precio:oldC))/newQ : precio;
    a.stock=newQ;
    const mov={id:uid(),ts,tipo:"entrada",user:S.user.nombre,cod:a.cod,nombre:a.nombre,cant,precio,motivo:"Entrada directa",pac:null};
    S.movimientos.unshift(mov);
    closeModal(); render(); srvMov(mov, 'Entrada registrada · stock actualizado');
  } else if(F.type==='merma'){
    if(a.stock<cant){ toast('No hay stock suficiente para la baja'); return; }
    a.stock-=cant;
    const valorPerdido=cant*(a.cost||0);
    const mov={id:uid(),ts,tipo:"merma",user:S.user.nombre,cod:a.cod,nombre:a.nombre,cant,motivo:F.motivo||"Pérdida",ref:(F.ref||'').trim(),valorPerdido,pac:null};
    S.movimientos.unshift(mov);
    closeModal(); render(); srvMov(mov, 'Baja registrada · '+eur(valorPerdido)+' de pérdida');
  }
}

async function commitRecepcion(){
  const p=S.pedidos.find(x=>String(x.id)===String(F.pedidoId)); if(!p) return;
  if(p.lineas.some((l,i)=> !(parseFloat(String(F.recPrecios[i]).replace(',','.'))>0))){ toast('Introduce el precio de todas las líneas para poder recibir'); return; }
  const ts=todayStr();
  try{
    for(let i=0;i<p.lineas.length;i++){
      const l=p.lineas[i];
      const precio=parseFloat(String(F.recPrecios[i]).replace(',','.'))||0;
      l.precio=precio;
      const a=art(l.cod); if(!a) continue;
      const mov={id:uid(),ts:tsFrom(ts),tipo:"entrada",user:S.user.nombre,cod:l.cod,nombre:a.nombre,cant:l.cant,precio:precio,motivo:`Recepción pedido #${String(p.id).slice(-4)} · ${p.proveedor||''}`,pac:null};
      await _rpcMov(mov);
    }
    await sbc.from('lucai_pedidos').update({ estado:'recibido', rec_ts:ts, rec_user:S.user.nombre, lineas:p.lineas }).eq('id', String(p.id));
  }catch(e){ console.error('commitRecepcion', e); await syncAll(); toast('Error al recibir: '+(e.message||e)); return; }
  closeModal(); await loadFromDB(); render(); toast('Pedido recibido · stock actualizado');
}

function commitPedido(){
  if(!F.lineas.length) return;
  const prov=(F.proveedor==='__nuevo__'?(F.proveedorNuevo||''):(F.proveedor||'')).trim();
  if(!prov){ toast('Elige o escribe un proveedor'); return; }
  if(!S.proveedores.includes(prov)) S.proveedores.push(prov);
  if(F.editId){
    const p=S.pedidos.find(x=>String(x.id)===String(F.editId));
    if(p){
      p.ts=F.fecha||p.ts||todayStr(); p.proveedor=prov; p.lineas=F.lineas.map(l=>({...l}));
      closeModal(); S.sub='pedidos'; render();
      srvProveedor(prov); srvPedidoUpdate(p, 'Pedido actualizado');
    }
    return;
  }
  const ped={id:Date.now(), ts:F.fecha||todayStr(), proveedor:prov, user:S.user.nombre, lineas:F.lineas.map(l=>({...l})), estado:'pendiente'};
  S.pedidos.unshift(ped);
  closeModal(); S.sub='pedidos'; render();
  srvProveedor(prov); srvPedidoInsert(ped, 'Pedido creado · pendiente de recibir');
}

function commitArticulo(){
  const cod=(F.acod||'').trim().toUpperCase();
  const nombre=(F.anombre||'').trim();
  if(!cod||!nombre||!F.acat){ toast('Código, nombre y categoría son obligatorios'); return; }
  if(art(cod)){ toast('Ese código ya existe'); return; }
  const prov=(F.aprov==='__nuevo__'?(F.aprovNuevo||''):(F.aprov||'')).trim();
  if(prov && !S.proveedores.includes(prov)) S.proveedores.push(prov);
  const precio=parseFloat(String(F.aprecio).replace(',','.'))||0;
  const nuevo={cod,nombre,descripcion:(F.adesc||'').trim(),categoria:F.acat,proveedor:prov,min:parseInt(F.amin)||0,precioRef:precio,stock:0,cost:precio,aviso:F.aviso!==false,activo:true,caduca:(F.acaduca||'').trim()||null,trazable:F.atraz===true};
  S.articulos.push(nuevo);
  closeModal(); S.sub='arts'; render();
  srvProveedor(prov); srvArticulo(nuevo, 'Artículo creado');
}

function commitEdit(){

/* ---- refresco automatico: al volver a la app + sondeo suave cada 5s (robusto en iOS) ---- */
let _lastSig='';
function _canSync(){
  if(!(DEVICE && LOADED && S.user)) return false;
  if(S.modal) return false;
  if(document.visibilityState && document.visibilityState!=='visible') return false;
  const ae=document.activeElement;
  if(ae && /^(INPUT|TEXTAREA|SELECT)$/.test(ae.tagName)) return false;
  return true;
}
async function _autoSync(){
  if(!_canSync()) return;
  await loadFromDB();
  const sig=JSON.stringify([S.articulos.length,S.movimientos.length,S.pedidos.length,S.seguimientos.length,
    S.articulos.reduce((s,a)=>s+(Number(a.stock)||0),0),(S.movimientos[0]||{}).id,
    (S.tareas||[]).map(t=>t.id+':'+(t.estado||'')+':'+(t.fechaLimite||'')+':'+(t.prioridad||'')+':'+((t.mensajes||[]).length)+':'+((t.tiempos||[]).length)).join('|'),
    (S.incidencias||[]).map(i=>i.id+':'+(i.revisada?1:0)).join('|'),
    (S.comunicaciones||[]).map(c=>c.id+':'+Object.keys(c.leidos||{}).length+':'+((c.comentarios||[]).length)).join('|'),
    (S.presupuestos||[]).length,(S.equipos||[]).length]);
  if(sig!==_lastSig){ _lastSig=sig; render(); }
}
document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='visible') _autoSync(); });
window.addEventListener('focus', function(){ _autoSync(); });
window.addEventListener('pageshow', function(){ _autoSync(); });
setInterval(function(){ _autoSync(); }, 8000);
