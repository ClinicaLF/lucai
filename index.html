const DEFAULT_PERMS = ['incidencias','tareas','asistente','comunicaciones','accesos'];

/* --- credenciales: usuario + contraseña (con hash) --- */
function _slug(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'').slice(0,20); }
function userLoginName(u){ return (u && u.usuario) ? u.usuario : _slug((u&&u.nombre||'').split(' ')[0]); }
async function lucaiHash(pass, salt){
  try{
    const enc=new TextEncoder().encode((salt||'')+'::'+(pass||''));
    const buf=await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(_){ return null; }
}
function _newSalt(){ return Math.random().toString(36).slice(2)+Date.now().toString(36); }
/* migración: a cada usuario sin 'usuario' se lo deducimos del nombre; sin contraseña, su PIN actual.
   Así nadie se queda fuera al cambiar de PIN a usuario+contraseña. */
async function lucaiMigrarUsuarios(){
  if(!Array.isArray(S.usuarios)||!S.usuarios.length) return;
  let cambios=false;
  for(const u of S.usuarios){
    if(!u.usuario){ u.usuario=userLoginName(u); cambios=true; }
    if(!u.passHash && u.pin){ u.passSalt=_newSalt(); u.passHash=await lucaiHash(u.pin, u.passSalt); cambios=true; }
  }
  // resolver colisiones de usuario duplicado
  const vistos={};
  for(const u of S.usuarios){ let n=u.usuario||'user'; let k=n,i=2; while(vistos[k]){ k=n+i; i++; } if(k!==u.usuario){ u.usuario=k; cambios=true; } vistos[k]=1; }
  if(cambios){ try{ if(typeof persistNow==='function') await persistNow(); }catch(_){ } }
}

if(!Array.isArray(S.usuarios) || !S.usuarios.length){
  S.usuarios = USERS.map(u=>({
    id:u.id, nombre:u.nombre, rol:u.rol, pin:u.pin, usuario:_slug(u.nombre.split(' ')[0]),
    admin: ["Director","Directora"].includes(u.rol),
    permisos: ["Director","Directora"].includes(u.rol) ? [] : DEFAULT_PERMS.slice()
  }));
}
function appUsers(){ return (Array.isArray(S.usuarios)&&S.usuarios.length) ? S.usuarios : USERS; }
function _usuariosPersist(){ try{ if(typeof persistNow==='function') persistNow(); }catch(_){ } }
/* --- doctores (editable por Dirección) --- */
if(!Array.isArray(S.doctores) || !S.doctores.length){ S.doctores = DOCTORS.slice(); }
function appDoctores(){ return (Array.isArray(S.doctores)&&S.doctores.length) ? S.doctores : DOCTORS; }

/* permisos: autoridad final (gana la última) */
canAccess = function(id){

  if(isAdmin()) return true;

  return perms.includes(id);
};

async function commitUsuario(){
  const nombre=(F.nombre||'').trim(); const rol=(F.rol||'').trim();
  const usuario=(F.usuario||'').trim().toLowerCase();
  const pass=(F.pass||'');
  if(!nombre){ toast('Pon el nombre'); return; }
  if(!usuario){ toast('Pon el usuario para entrar'); return; }
  const otros=appUsers().filter(u=>u.id!==F.id);
  if(otros.some(u=>(u.usuario||userLoginName(u)).toLowerCase()===usuario)){ toast('Ese usuario ya lo tiene otra persona'); return; }
  if(otros.some(u=>(u.nombre||'').toLowerCase()===nombre.toLowerCase())){ toast('Ya hay un usuario con ese nombre'); return; }
  if(F.id==null && !pass){ toast('Pon una contraseña'); return; }
  if(pass && pass.length<4){ toast('La contraseña debe tener al menos 4 caracteres'); return; }
  let passHash, passSalt;
  if(pass){ passSalt=_newSalt(); passHash=await lucaiHash(pass, passSalt); if(!passHash){ toast('No se pudo cifrar la contraseña'); return; } }
  let list=appUsers().slice();
  if(F.id!=null){
    list=list.map(u=> u.id===F.id ? {...u, nombre, rol, usuario, admin:!!F.admin, permisos: F.admin?[]:(F.permisos||[]).slice(), ...(pass?{passHash, passSalt, pin:undefined}:{}) } : u);
  } else {
    list.push({ id:_nextUserId(), nombre, rol, usuario, admin:!!F.admin, permisos: F.admin?[]:(F.permisos||[]).slice(), passHash, passSalt });
  }
  S.usuarios=list; _usuariosPersist();
  if(S.user && S.user.id===F.id){ const me=list.find(u=>u.id===F.id); if(me) S.user=me; }
  openUsuarios(); toast('Usuario guardado');
}
function usuarioDelete(id){
  if(!isAdmin()) return;
  if(S.user && S.user.id===id){ toast('No puedes borrar tu propio usuario mientras estás dentro'); return; }
  if(appUsers().length<=1){ toast('Debe quedar al menos un usuario'); return; }
  S.usuarios=appUsers().filter(u=>u.id!==id); _usuariosPersist(); openUsuarios(); toast('Usuario borrado');
}

async function commitCambiarPin(){

/* ---- comprobador de versión en vivo (mientras la app está abierta) ---- */
var _lucaiNewVer = null;
var _lucaiVerSig = null;   // firma de la versión que tengo cargada (se fija en la 1ª comprobación)
/* Firma del archivo realmente desplegado. Usa ETag/Last-Modified (cambian en CADA subida,
   sin tener que tocar ningún número a mano). Si el host no los diera, cae al meta o al tamaño. */
async function _lucaiFetchSig(){
  const base=location.href.split('#')[0].split('?')[0];
  try{
    const r=await fetch(base+'?cb='+Date.now(),{method:'HEAD',cache:'no-store'});
    const sig=(r.headers.get('etag')||'')+'|'+(r.headers.get('last-modified')||'')+'|'+(r.headers.get('content-length')||'');
    if(sig.replace(/\|/g,'')) return sig;   // hay al menos uno de los tres
  }catch(_){}
  // respaldo: descargar el archivo y usar su tamaño (cambia en casi cualquier edición)
  const r2=await fetch(base+'?cb='+Date.now(),{cache:'no-store'});
  const t=await r2.text();
  return 'len'+t.length;
}
/* Sella en el pie la versión que ESTE equipo está ejecutando, leída de la fecha real del archivo
   subido (Last-Modified). Se llama una sola vez al cargar y NO se vuelve a tocar mientras la app
   esté abierta: así el pie refleja lo que corre este equipo, y comparando pies entre ordenadores
   ves quién va con una versión vieja. Fecha en UTC para que el texto sea idéntico en todas las máquinas. */
async function lucaiStampVersion(){
  try{
    const base=location.href.split('#')[0].split('?')[0];
    const r=await fetch(base+'?cb='+Date.now(),{method:'HEAD',cache:'no-store'});
    const lm=r.headers.get('last-modified'), et=r.headers.get('etag'), cl=r.headers.get('content-length');
    let label='';
    if(lm){ const d=new Date(lm); if(!isNaN(d.getTime())){ const p=n=>String(n).padStart(2,'0'); label='v'+d.getUTCFullYear()+'.'+p(d.getUTCMonth()+1)+'.'+p(d.getUTCDate())+'-'+p(d.getUTCHours())+p(d.getUTCMinutes()); } }
    if(!label && et){ label='build '+et.replace(/[^a-zA-Z0-9]/g,'').slice(-6); }
    if(!label && cl){ label='build '+cl; }
    if(label){ _lucaiVerLabel=label; const el=document.getElementById('lucaiVerLabel'); if(el) el.textContent='Lucai · '+label; }
  }catch(_){}
}
async function lucaiCheckUpdate(){
  try{
    if(navigator.onLine===false) return;
    if(document.getElementById('lucaiUpd')) return;          // ya está avisado
    const sig = await _lucaiFetchSig();
    if(!sig) return;
    if(_lucaiVerSig===null){ _lucaiVerSig=sig; return; }      // 1ª vez: guardo la versión que tengo
    if(sig!==_lucaiVerSig){ _lucaiNewVer=sig; lucaiUpdateBanner(); }   // ha cambiado el archivo subido -> aviso
  }catch(_){}
}

/* ===== IMÁGENES EN TAREAS (Supabase Storage) ===== */
const TAR_BUCKET = 'tareas';
window._tarImgUrls = window._tarImgUrls || {};

function tarComprimirImagen(file){
  return new Promise((resolve,reject)=>{
    if(!file || !/^image\//.test(file.type||'')){ reject(new Error('No es una imagen')); return; }
    const fr=new FileReader();
    fr.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        try{
          const MAX=1600;
          let w=img.width, h=img.height;
          if(w>MAX || h>MAX){ const r=Math.min(MAX/w, MAX/h); w=Math.round(w*r); h=Math.round(h*r); }
          const c=document.createElement('canvas'); c.width=w; c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h);
          c.toBlob(b=>{ b ? resolve(b) : reject(new Error('No se pudo procesar la imagen')); }, 'image/jpeg', 0.72);
        }catch(err){ reject(err); }
      };
      img.onerror=()=>reject(new Error('Imagen no válida'));
      img.src=fr.result;
    };
    fr.onerror=()=>reject(new Error('No se pudo leer el archivo'));
    fr.readAsDataURL(file);
  });
}

function tarSubirImagen(file, tareaId){
  return tarComprimirImagen(file).then(blob=>{
    const path = `${tareaId}/${uid()}.jpg`;
    return sbc.storage.from(TAR_BUCKET).upload(path, blob, {contentType:'image/jpeg', upsert:false}).then(res=>{
      if(res && res.error) throw res.error;
      return { path, name:(file.name||'imagen.jpg'), ts:now(), quien:S.user.nombre };
    });
  });
}

function tarPickImagen(cb){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{ const f=inp.files && inp.files[0]; if(f) cb(f); };
  inp.click();
}

/* ===== ARCHIVOS (cualquier tipo, sin comprimir) ===== */
const TAR_MAX_FILE = 25 * 1024 * 1024; // 25 MB de cortesía (el bucket no limita)
function tarPickArchivo(cb){
  const inp=document.createElement('input');
  inp.type='file'; // sin accept: admite cualquier tipo
  inp.onchange=()=>{ const f=inp.files && inp.files[0]; if(f) cb(f); };
  inp.click();
}
function tarExt(name){ const m=String(name||'').match(/\.([a-z0-9]+)$/i); return m?m[1].toLowerCase():'bin'; }
function tarSubirArchivo(file, tareaId){
  return new Promise((resolve,reject)=>{
    if(!file){ reject(new Error('Archivo no válido')); return; }
    if(file.size > TAR_MAX_FILE){ reject(new Error('El archivo supera 25 MB')); return; }
    const ext=tarExt(file.name);
    const path=`${tareaId}/${uid()}.${ext}`;
    const mime=file.type||'application/octet-stream';
    sbc.storage.from(TAR_BUCKET).upload(path, file, {contentType:mime, upsert:false}).then(res=>{
      if(res && res.error){ reject(res.error); return; }
      resolve({ path, name:(file.name||'archivo.'+ext), ts:now(), quien:S.user.nombre, tipo:'file', mime, size:file.size });
    }).catch(reject);
  });
}
function tarAdjEsImagen(adj){
  if(!adj) return false;
  if(adj.tipo==='file'){ return /^image\//.test(adj.mime||''); }
  return true; // los adjuntos antiguos (sin tipo) siempre fueron imágenes
}
function tarFmtSize(b){ b=Number(b)||0; if(b<1024) return b+' B'; if(b<1048576) return (b/1024).toFixed(0)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
function tarFileIcon(adj){
  const e=tarExt(adj&&adj.name);
  if(['pdf'].includes(e)) return '📕';
  if(['doc','docx','odt'].includes(e)) return '📘';
  if(['xls','xlsx','csv','ods'].includes(e)) return '📗';
  if(['ppt','pptx','odp'].includes(e)) return '📙';
  if(['zip','rar','7z'].includes(e)) return '🗜️';
  if(['mp4','mov','avi','mkv','webm'].includes(e)) return '🎬';
  if(['mp3','wav','m4a','ogg'].includes(e)) return '🎵';
  return '📄';
}
function tarAbrirArchivo(path){
  if(window._tarImgUrls[path]){ window.open(window._tarImgUrls[path],'_blank'); return; }
  toast('Abriendo archivo…');
  sbc.storage.from(TAR_BUCKET).createSignedUrl(path, 3600).then(res=>{
    if(res && res.data && res.data.signedUrl){ window._tarImgUrls[path]=res.data.signedUrl; window.open(res.data.signedUrl,'_blank'); }
    else toast('No se pudo abrir el archivo');
  }).catch(()=>toast('No se pudo abrir el archivo'));
}
/* Render unificado de un adjunto: imagen -> miniatura/visor ; archivo -> ficha clicable.
   mode: 'thumb' (cuadrado en listados) | 'msg' (dentro de un mensaje) */
function tarAdjView(adj, mode){
  if(!adj || !adj.path) return '';
  if(tarAdjEsImagen(adj)){

      return `<img data-tarpath="${adj.path}" onclick="tarVerImg('${adj.path}')" alt="adjunto" style="width:74px;height:74px;object-fit:cover;border-radius:8px;cursor:pointer;background:#E8EAED;border:1px solid var(--line)">`;

  return `<div onclick="tarAbrirArchivo('${adj.path}')" title="Abrir / descargar" style="${mt}display:inline-flex;align-items:center;gap:8px;max-width:260px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 11px;cursor:pointer">

      <span style="min-width:0"><span style="display:block;font-size:13px;font-weight:600;color:#333F48;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${nombre}</span><span style="font-size:11px;color:#8A949B">Abrir${meta}</span></span>
    </div>`;
}

function tarHidratarImgs(){
  const imgs=document.querySelectorAll('img[data-tarpath]');
  imgs.forEach(im=>{
    const p=im.getAttribute('data-tarpath'); if(!p) return;
    const cached=window._tarImgUrls[p];
    if(cached){ if(im.src!==cached) im.src=cached; return; }
    if(im.getAttribute('data-loading')) return;
    im.setAttribute('data-loading','1');
    sbc.storage.from(TAR_BUCKET).createSignedUrl(p, 3600).then(res=>{
      if(res && res.data && res.data.signedUrl){
        window._tarImgUrls[p]=res.data.signedUrl;
        document.querySelectorAll('img[data-tarpath="'+p+'"]').forEach(x=>{ x.src=res.data.signedUrl; x.removeAttribute('data-loading'); });
      } else { im.removeAttribute('data-loading'); }
    }).catch(()=>im.removeAttribute('data-loading'));
  });
}

  else { list.push({ id:uid(), nombre, url, icono:F.icono||'🔗', color:F.color||'#EAE3D7' }); }
  S.accesos=list; _usuariosPersist(); closeModal(); render(); toast('Acceso guardado');
}
function accesoDel(id){

}

};
const _modalContent_acc = modalContent;
modalContent = function(){

/* ===== MÓDULO TEMAS (coordinación de equipo · sin datos de pacientes) ===== */
const TEMA_CATS = ['Coordinación','Organización','Agenda','Protocolos','General'];
S.temas = S.temas || [];

(function(){

  }
})();

const _canAccess_tema = canAccess;
canAccess = function(id){ if(id==='temas') return !!S.user; return _canAccess_tema(id); };

/* ---- persistencia (tabla propia lucai_temas) ---- */
const _loadFromDB_tema = loadFromDB;
loadFromDB = async function(){
  const _prev=_loadFromDB_tema();
  try{
    const r=await sbc.from('lucai_temas').select('*').order('created_at',{ascending:false});
    if(r.data){
      S.temas=r.data.map(x=>({
        id:x.id, titulo:x.titulo, descripcion:x.descripcion||'', autor:x.autor,
        participantes: Array.isArray(x.participantes)?x.participantes:(function(){ try{ return x.participantes?JSON.parse(x.participantes):[]; }catch(_){ return []; } })(),
        estado:x.estado||'abierto', ts:x.ts, fechaCierre:x.fecha_cierre||null, cerradoPor:x.cerrado_por||null,
        mensajes: Array.isArray(x.mensajes)?x.mensajes:(function(){ try{ return x.mensajes?JSON.parse(x.mensajes):[]; }catch(_){ return []; } })(),
        vistos: (x.vistos&&typeof x.vistos==='object'&&!Array.isArray(x.vistos))?x.vistos:{},
        fijadoPor: Array.isArray(x.fijado_por)?x.fijado_por:(function(){ try{ return x.fijado_por?JSON.parse(x.fijado_por):[]; }catch(_){ return []; } })()
      }));
    }
  }catch(e){ console.error('loadTemas', e); }
  await _prev;
};
async function srvTemaInsert(t, okMsg){
  try{
    const { error } = await sbc.from('lucai_temas').insert({
      id:t.id, titulo:t.titulo, descripcion:t.descripcion||null, autor:t.autor,
      participantes:(t.participantes||[]),
      estado:t.estado||'abierto', ts:t.ts, fecha_cierre:t.fechaCierre||null, cerrado_por:t.cerradoPor||null,
      mensajes:(t.mensajes||[]), vistos:(t.vistos||{}), fijado_por:(t.fijadoPor||[]) });
    if(error) throw error;
  }catch(e){ console.error('srvTemaInsert', e); await syncAll(); toast('Error al crear el tema: '+(e.message||e)); return; }
  await loadFromDB(); render(); if(okMsg) toast(okMsg);
}
async function srvTemaUpdate(id, t){
  try{
    const { error } = await sbc.from('lucai_temas').update({
      titulo:t.titulo, descripcion:t.descripcion||null, participantes:(t.participantes||[]), estado:t.estado||'abierto',
      fecha_cierre:t.fechaCierre||null, cerrado_por:t.cerradoPor||null,
      mensajes:(t.mensajes||[]), vistos:(t.vistos||{}), fijado_por:(t.fijadoPor||[]) }).eq('id', id);
    if(error) throw error;
  }catch(e){ console.error('srvTemaUpdate', e); await syncAll(); toast('Error al guardar: '+(e.message||e)); return; }
  await loadFromDB(); render();
}
async function srvTemaDelete(id){
  try{
    const { error } = await sbc.from('lucai_temas').delete().eq('id', id);
    if(error) throw error;
  }catch(e){ console.error('srvTemaDelete', e); await syncAll(); toast('Error al eliminar el tema: '+(e.message||e)); return; }
  await loadFromDB(); render();
}

/* ---- helpers ---- */
function temaById(id){ return (S.temas||[]).find(x=>String(x.id)===String(id)); }
function temaParticipa(t){ const me=S.user&&S.user.nombre; if(!me) return false; if(t.autor===me) return true; if(Array.isArray(t.participantes)&&t.participantes.length) return t.participantes.includes(me); return true; }
function temaVisible(t){ if(typeof isAdmin==='function' && isAdmin()) return true; return temaParticipa(t); }
function setTemaBuscar(v){ S.temaBuscar=v; render(); const e=el('temaBuscar'); if(e){ e.focus(); const val=e.value; e.value=''; e.value=val; } }
function temaToggleArchivados(){ S.temasVerArchivados=!S.temasVerArchivados; render(); }
function temaPinIcon(filled){ return `<svg width="15" height="15" viewBox="0 0 24 24" fill="${filled?'currentColor':'none'}" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>`; }
function temaFijado(t){ const me=S.user&&S.user.nombre; if(!me||!t) return false; return Array.isArray(t.fijadoPor) && t.fijadoPor.includes(me); }
function temaFijadosCount(){ const me=S.user&&S.user.nombre; if(!me) return 0; return (S.temas||[]).filter(t=>Array.isArray(t.fijadoPor)&&t.fijadoPor.includes(me)).length; }
function temaToggleFijar(id){
  const t=temaById(id); if(!t) return; const me=S.user.nombre;
  if(!Array.isArray(t.fijadoPor)) t.fijadoPor=[];
  const i=t.fijadoPor.indexOf(me);
  if(i>=0){ t.fijadoPor.splice(i,1); render(); srvTemaUpdate(id,t); }
  else{
    if(temaFijadosCount()>=3){ toast('Solo puedes fijar 3 temas arriba. Quita uno antes de fijar otro.'); return; }
    t.fijadoPor.push(me); render(); srvTemaUpdate(id,t); toast('Tema fijado arriba');
  }
}
function temaEliminar(id){
  if(!isAdmin()){ toast('Solo Dirección puede eliminar un tema'); return; }
  const t=temaById(id); if(!t) return;
  if(!confirm('¿Eliminar el tema "'+(t.titulo||'')+'" por completo?\n\nSe borrará el hilo entero con todos sus mensajes. Esta acción NO se puede deshacer.')) return;
  S.temas=(S.temas||[]).filter(x=>String(x.id)!==String(id));
  if(String(S.temaOpen)===String(id)) S.temaOpen=null;
  render(); srvTemaDelete(id); toast('Tema eliminado');
}
function temaDelMsg(id, idx){
  const t=temaById(id); if(!t) return;
  const m=(t.mensajes||[])[idx]; if(!m) return;
  const me=S.user.nombre;
  if(!(m.de===me || isAdmin())){ toast('Solo puedes borrar tus propios mensajes'); return; }
  if(!confirm('¿Eliminar este mensaje?')) return;
  t.mensajes.splice(idx,1); render(); srvTemaUpdate(id, t); toast('Mensaje eliminado');
}
function temaNoLeido(t){ const me=S.user&&S.user.nombre; if(!me) return false; const last=(t.vistos&&t.vistos[me])||''; const msgs=Array.isArray(t.mensajes)?t.mensajes:[]; return msgs.some(m=> m.de!==me && String(m.ts||'')>String(last)); }
function temasNoLeidosCount(){ return (S.temas||[]).filter(t=>t.estado!=='cerrado' && temaNoLeido(t)).length; }
function temaFmtTs(ts){ ts=String(ts||''); const d=ts.slice(0,10).split('-'); const hm=ts.slice(11,16); return (d.length===3?`${d[2]}/${d[1]}`:ts)+(hm?` ${hm}`:''); }

/* ---- navegación detalle ---- */
function abrirTema(id){ const t=temaById(id); if(!t) return; const me=S.user.nombre; if(!t.vistos) t.vistos={}; t.vistos[me]=now(); S.temaOpen=String(id); F.temaDraft=''; S.temaAdj=null; S.temaReply=null; render(); srvTemaUpdate(id, t); }
function volverTemas(){ S.temaOpen=null; S.temaReply=null; S.temaAdj=null; render(); }

/* ---- crear tema ---- */
function temaUsuarios(){ return appUsers().map(function(u){ return u.nombre; }).filter(Boolean); }
function temaToggleParte(n){ if(!Array.isArray(F.tparts)) F.tparts=[]; var i=F.tparts.indexOf(n); if(i>=0) F.tparts.splice(i,1); else F.tparts.push(n); render(); }
function temaAllPartes(){ var all=temaUsuarios(); F.tparts=(Array.isArray(F.tparts)&&F.tparts.length>=all.length)?[]:all.slice(); render(); }
function nuevoTema(){ F={type:'tema_nuevo', ttitulo:'', tdesc:'', tparts:[]}; S.modal='tema_nuevo'; render(); }
function commitTemaNuevo(){
  const titulo=(F.ttitulo||'').trim(); if(!titulo){ toast('Ponle un título al tema'); return; }
  const me=S.user.nombre;
  var partes=Array.isArray(F.tparts)?F.tparts.slice():[];
  if(partes.indexOf(me)<0) partes.unshift(me);
  const t={ id:'T'+Date.now().toString(36), titulo, descripcion:(F.tdesc||'').trim(), participantes:partes, autor:me, estado:'abierto', ts:now(), fechaCierre:null, cerradoPor:null, mensajes:[], vistos:{}, fijadoPor:[] };
  t.vistos[me]=now();
  S.temas.unshift(t); S.modal=null; S.module='temas'; S.temaOpen=String(t.id); render();
  srvTemaInsert(t, 'Tema creado');
  partes.filter(function(n){ return n && n!==me; }).forEach(function(n){ tgNotify(n, `🆕 Nuevo tema "${titulo}" creado por ${me} en Lucai → Temas.`); });
}

/* ---- mensajes ---- */
function temaSetReply(id, idx){ const t=temaById(id); if(!t) return; const m=(t.mensajes||[])[idx]; if(!m) return; S.temaReply={de:m.de, texto:(m.texto||'(imagen)').slice(0,120)}; render(); const e=el('temaInput'); if(e) e.focus(); }
function temaClearReply(){ S.temaReply=null; render(); }
function temaQuitarAdj(){ S.temaAdj=null; render(); }
function temaAddImg(id){
  const t=temaById(id); if(!t) return;
  tarPickImagen(function(f){
    toast('Subiendo imagen…');
    tarSubirImagen(f, 'tema_'+id).then(function(ref){ S.temaAdj=ref; render(); }).catch(function(e){ toast('No se pudo subir: '+(e.message||e)); });
  });
}
function temaAddArchivo(id){
  const t=temaById(id); if(!t) return;
  tarPickArchivo(function(f){
    toast('Subiendo archivo…');
    tarSubirArchivo(f, 'tema_'+id).then(function(ref){ S.temaAdj=ref; render(); }).catch(function(e){ toast('No se pudo subir: '+(e.message||e)); });
  });
}
function temaPostMsg(id){
  const t=temaById(id); if(!t) return;
  if(t.estado==='cerrado'){ toast('Este tema está cerrado. Reábrelo para escribir.'); return; }
  const txt=(F.temaDraft||'').trim();
  if(!txt && !S.temaAdj){ return; }
  const me=S.user.nombre;
  if(!Array.isArray(t.mensajes)) t.mensajes=[];
  const msg={ id:uid(), de:me, texto:txt, ts:now(), adj:S.temaAdj||null, reply:S.temaReply||null };
  t.mensajes.push(msg);
  if(!t.vistos) t.vistos={}; t.vistos[me]=now();
  F.temaDraft=''; S.temaAdj=null; S.temaReply=null; render();
  srvTemaUpdate(id, t);
}
function temaCerrar(id){ const t=temaById(id); if(!t) return; t.estado='cerrado'; t.fechaCierre=todayStr(); t.cerradoPor=S.user.nombre; render(); srvTemaUpdate(id, t); toast('Tema cerrado'); }
function temaReabrir(id){ const t=temaById(id); if(!t) return; t.estado='abierto'; t.fechaCierre=null; t.cerradoPor=null; render(); srvTemaUpdate(id, t); toast('Tema reabierto'); }

/* ---- vistas ---- */
function temasView(){
  let inner;
  if(S.temaOpen){
    const t=temaById(S.temaOpen);
    if(t){ inner=temaDetalleView(t); }
    else { S.temaOpen=null; inner=temasListView(); }
  } else { inner=temasListView(); }
  return `${moduleHeader('Temas de coordinación', false)}
  <main><div class="wrap">
    ${inner}
  </div></main>
  ${S.modal?modalContent():''}
  ${(typeof iaFloatHtml==='function')?iaFloatHtml():''}`;
}
function temasListView(){
  const me=S.user.nombre;
  const verArch=!!S.temasVerArchivados;
  const q=(S.temaBuscar||'').trim().toLowerCase();
  const visibles=[...(S.temas||[])].filter(temaVisible);
  const nArch=visibles.filter(t=>t.estado==='cerrado').length;
  let list=visibles;
  if(!verArch) list=list.filter(t=> t.estado!=='cerrado');
  if(q) list=list.filter(t=> [t.titulo,t.descripcion,t.autor,(t.participantes||[]).join(' ')].join(' ').toLowerCase().includes(q));
  list=list.sort((a,b)=>{
    const fa=temaFijado(a), fb=temaFijado(b);
    if(fa!==fb) return fa?-1:1;
    if((a.estado==='cerrado')!==(b.estado==='cerrado')) return a.estado==='cerrado'?1:-1;
    const la=(a.mensajes&&a.mensajes.length?a.mensajes[a.mensajes.length-1].ts:a.ts)||'';
    const lb=(b.mensajes&&b.mensajes.length?b.mensajes[b.mensajes.length-1].ts:b.ts)||'';
    return String(lb).localeCompare(String(la));
  });
  const rows=list.length? list.map(t=>{
    const nMsg=(t.mensajes||[]).length; const nuevo=t.estado!=='cerrado'&&temaParticipa(t)&&temaNoLeido(t);
    const soloDir=(typeof isAdmin==='function'&&isAdmin())&&!temaParticipa(t);
    const cerrado=t.estado==='cerrado';
    const fijado=temaFijado(t);
    return `<div onclick="abrirTema('${t.id}')" style="cursor:pointer;border:1px solid var(--line);${fijado?'border-left:3px solid #A8B400;':''}border-radius:12px;padding:12px 14px;margin-bottom:10px;background:${cerrado?'#F7F7F5':'#fff'};display:flex;justify-content:space-between;align-items:center;gap:12px">
      <div style="min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          ${nuevo?'<span style="width:8px;height:8px;border-radius:50%;background:#C0392B;display:inline-block;flex:0 0 auto"></span>':''}
          <strong style="font-size:15px;color:#333F48">${incEsc(t.titulo)}</strong>
          ${cerrado?'<span style="font-size:11px;font-weight:600;background:#E8EAED;color:#5A6770;border-radius:10px;padding:1px 8px">Cerrado</span>':''}
        </div>
        ${t.descripcion?`<div style="font-size:13px;color:#5A6770;margin-top:3px">${incEsc(t.descripcion)}</div>`:''}
        <div style="font-size:12px;color:#8A949B;margin-top:3px">${incEsc(t.autor||'—')} · ${nMsg} mensaje${nMsg===1?'':'s'} · ${(t.participantes||[]).length||1} participante${(((t.participantes||[]).length||1)===1)?'':'s'}${soloDir?' · <span style="color:#B8860B">ves esto como Dirección</span>':''}${cerrado&&t.fechaCierre?` · cerrado ${incEsc(fmtFecha(t.fechaCierre))}`:''}</div>
      </div>
      <div style="flex:0 0 auto;display:flex;align-items:center;gap:4px">
        <button onclick="event.stopPropagation();temaToggleFijar('${t.id}')" title="${fijado?'Quitar de fijados':'Fijar arriba'}" style="border:none;background:none;cursor:pointer;padding:6px;line-height:0;color:${fijado?'#A8B400':'#C2C7CC'}">${temaPinIcon(fijado)}</button>
        <span style="color:#B8A88F;font-size:22px">›</span>
      </div>
    </div>`;
  }).join('') : `<div class="muted" style="text-align:center;padding:32px">${q?'Ningún tema coincide con la búsqueda.':(verArch?'No hay temas archivados.':'Aún no tienes temas abiertos. Crea uno nuevo o pide que te añadan como participante.')}</div>`;
  return `<div class="toolbar" style="margin:6px 0 14px">
      <div><div class="section-title">Temas de coordinación</div>
      <div class="section-sub" style="margin:0">Hilos para tratar cosas en equipo. Se comenta, se adjuntan pantallazos y, cuando se resuelve, se cierra.</div></div>
      <div class="actions"><button class="btn btn-primary" onclick="nuevoTema()">＋ Nuevo tema</button></div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px">
      <input id="temaBuscar" class="inp" placeholder="Buscar tema…" value="${incEsc(S.temaBuscar||'')}" oninput="setTemaBuscar(this.value)" style="max-width:300px">
      <label style="display:flex;align-items:center;gap:7px;font-size:13px;color:#46525B;cursor:pointer;user-select:none"><input type="checkbox" ${verArch?'checked':''} onchange="temaToggleArchivados()" style="width:16px;height:16px;cursor:pointer"> Ver archivados${nArch?` (${nArch})`:''}</label>
    </div>
    ${rows}`;
}
function temaDetalleView(t){
  const me=S.user.nombre; const cerrado=t.estado==='cerrado';
  const msgs=Array.isArray(t.mensajes)?t.mensajes:[];
  const list = msgs.length ? msgs.map((mm,idx)=>{
    const mine=mm.de===me;
    return `<div style="margin-bottom:9px;display:flex;${mine?'justify-content:flex-end':''}">
      <div style="max-width:84%;background:${mine?'#EAF1D8':'#F4F0E9'};border:1px solid var(--line);border-radius:12px;padding:8px 11px">
        <div style="font-size:11px;color:#8A949B;margin-bottom:2px">${incEsc(mm.de||'—')} · ${incEsc(temaFmtTs(mm.ts))}</div>
        ${mm.reply?`<div style="border-left:3px solid #B8A88F;padding:2px 8px;margin:0 0 5px;background:#fff;border-radius:6px;font-size:12px;color:#6C757D"><strong>${incEsc(mm.reply.de||'')}</strong>: ${incEsc(mm.reply.texto||'')}</div>`:''}
        ${mm.texto?`<div style="font-size:14px;line-height:1.45;white-space:pre-wrap">${incEsc(mm.texto)}</div>`:''}
        ${tarAdjView(mm.adj,'msg')}
        ${!cerrado?`<div style="margin-top:4px;display:flex;gap:14px"><button onclick="temaSetReply('${t.id}',${idx})" style="border:none;background:none;color:#8A949B;font-size:11px;cursor:pointer;padding:0">↩ responder</button>${(mm.de===me||isAdmin())?`<button onclick="temaDelMsg('${t.id}',${idx})" style="border:none;background:none;color:#C0392B;font-size:11px;cursor:pointer;padding:0">eliminar</button>`:''}</div>`:''}
      </div></div>`;
  }).join('') : `<div class="muted" style="font-size:13px;padding:8px 0">Aún no hay mensajes. Escribe el primero.</div>`;
  const replyBar = (S.temaReply&&!cerrado) ? `<div style="display:flex;justify-content:space-between;align-items:center;background:#F7F4EE;border-radius:8px;padding:5px 10px;font-size:12px;color:#6C757D;border:1px solid var(--line);margin-bottom:6px"><span>Respondiendo a <strong>${incEsc(S.temaReply.de)}</strong>: ${incEsc(S.temaReply.texto)}</span><button onclick="temaClearReply()" style="border:none;background:none;cursor:pointer;color:#8A949B;font-size:15px">×</button></div>` : '';
  const adjBar = (S.temaAdj&&!cerrado) ? `<div style="background:#EAF1D8;border-radius:8px;padding:5px 10px;font-size:12px;color:#5A6E00;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center"><span>${tarAdjEsImagen(S.temaAdj)?'📷 Imagen':(tarFileIcon(S.temaAdj)+' '+incEsc(S.temaAdj.name||'Archivo'))} lista para enviar</span><button onclick="temaQuitarAdj()" style="border:none;background:none;cursor:pointer;color:#5A6E00;font-size:15px">×</button></div>` : '';
  const compose = cerrado
    ? `<div class="muted" style="text-align:center;font-size:13px;padding:12px;background:#F7F7F5;border-radius:10px">Tema cerrado por ${incEsc(t.cerradoPor||'—')}${t.fechaCierre?` · ${incEsc(fmtFecha(t.fechaCierre))}`:''}. <button class="btn btn-ghost btn-sm" onclick="temaReabrir('${t.id}')" style="margin-left:6px">Reabrir</button></div>`
    : `${adjBar}${replyBar}<div style="display:flex;gap:8px;align-items:flex-end">
        <button class="btn btn-ghost" onclick="temaAddImg('${t.id}')" title="Adjuntar pantallazo" style="flex:0 0 auto;padding:8px 11px">📷</button>
        <button class="btn btn-ghost" onclick="temaAddArchivo('${t.id}')" title="Adjuntar archivo" style="flex:0 0 auto;padding:8px 11px">📎</button>
        <textarea id="temaInput" class="inp" rows="2" placeholder="Escribe un mensaje… (Enter = salto de línea · Ctrl+Enter = enviar)" oninput="setInp('temaDraft',this.value)" onkeydown="if((event.ctrlKey||event.metaKey)&&event.key==='Enter'){event.preventDefault();temaPostMsg('${t.id}')}" style="resize:vertical;min-height:44px;font-family:inherit">${incEsc(F.temaDraft||'')}</textarea>
        <button class="btn btn-primary" onclick="temaPostMsg('${t.id}')" style="flex:0 0 auto">Enviar</button>
      </div>`;
  return `<div class="toolbar" style="margin:6px 0 12px">
      <div style="min-width:0"><button class="btn btn-ghost btn-sm" onclick="volverTemas()" style="margin-bottom:8px">‹ Temas</button>
        <div class="section-title" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${incEsc(t.titulo)}${cerrado?'<span style="font-size:11px;font-weight:600;background:#E8EAED;color:#5A6770;border-radius:10px;padding:1px 8px">Cerrado</span>':''}</div>
        <div class="section-sub" style="margin:0">Abierto por ${incEsc(t.autor||'—')} · ${incEsc(temaFmtTs(t.ts))}${(t.participantes&&t.participantes.length>1)?` · con ${incEsc(t.participantes.filter(n=>n!==t.autor).join(', '))}`:''}</div>
        ${t.descripcion?`<div style="font-size:13px;color:#5A6770;margin-top:7px;background:#F7F4EE;border-radius:8px;padding:8px 11px;max-width:640px">${incEsc(t.descripcion)}</div>`:''}</div>
      <div class="actions"><button class="btn btn-ghost" onclick="temaToggleFijar('${t.id}')" title="${temaFijado(t)?'Quitar de fijados':'Fijar arriba'}" style="display:inline-flex;align-items:center;gap:6px${temaFijado(t)?';color:#5A6E00':''}">${temaPinIcon(temaFijado(t))} ${temaFijado(t)?'Fijado':'Fijar'}</button>${(t.autor===me)?`<button class="btn btn-ghost" onclick="openTemaPartes('${t.id}')">Participantes</button>`:''}${!cerrado?`<button class="btn btn-ghost" onclick="temaCerrar('${t.id}')">Cerrar tema</button>`:''}${isAdmin()?`<button class="btn btn-ghost" onclick="temaEliminar('${t.id}')" style="color:#C0392B">Eliminar tema</button>`:''}</div>
    </div>
    <div style="margin-bottom:12px">${list}</div>
    ${compose}`;
}

/* ---- enrutado ---- */
const _appView_tema = appView;
appView = function(){
  if(S.module==='temas'){ if(!canAccess('temas')){ S.module=null; return homeView(); } return temasView(); }
  return _appView_tema();
};
const _modalContent_tema = modalContent;
modalContent = function(){
  if(F.type==='tema_nuevo') return temaNuevoModalContent();
  if(F.type==='tema_edit_partes') return temaPartesModalContent();
  return _modalContent_tema();
};
function openTemaPartes(id){
  const t=temaById(id); if(!t) return;
  const me=S.user.nombre;
  if(t.autor!==me){ toast('Solo quien creó el tema puede cambiar los participantes'); return; }
  F={type:'tema_edit_partes', editId:String(id), tparts:(t.participantes||[]).slice()};
  S.modal='tema_edit_partes'; render();
}
function commitTemaPartes(){
  const t=temaById(F.editId); if(!t) return;
  var partes=Array.isArray(F.tparts)?F.tparts.slice():[];
  if(partes.indexOf(t.autor)<0) partes.unshift(t.autor);
  t.participantes=partes; S.modal=null; render();
  srvTemaUpdate(t.id, t); toast('Participantes actualizados');
}
function temaPartesModalContent(){
  const t=temaById(F.editId); const all=temaUsuarios(); const autor=t?t.autor:'';
  return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:520px">
    <div class="modal-head"><h2>Participantes del tema</h2><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="note" style="margin-top:0">Añade o quita personas. Quien quede fuera dejará de ver el tema; quien entre verá todo el historial.</div>
      <div class="fld"><label>Participantes</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          <button type="button" class="chip-sel ${(F.tparts||[]).length>=all.length&&all.length?'on':''}" onclick="temaAllPartes()">Todo el equipo</button>
          ${all.map(n=>`<button type="button" class="chip-sel ${(n===autor||(F.tparts||[]).includes(n))?'on':''}" ${n===autor?'disabled style="opacity:.65;cursor:default"':''} onclick="temaToggleParte('${incEsc(n)}')">${incEsc(n)}${n===autor?' (creó)':''}</button>`).join('')}
        </div>
        <div class="hint" style="text-align:left;margin-top:5px">Quien creó el tema siempre queda dentro.</div></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="commitTemaPartes()">Guardar</button></div>
  </div></div>`;
}
function temaNuevoModalContent(){
  const me=S.user&&S.user.nombre; const all=temaUsuarios();
  return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:520px">
    <div class="modal-head"><h2>Nuevo tema</h2><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="note" style="margin-top:0">Un hilo para tratar algo en equipo. Solo lo verán los participantes. Cuando se resuelva, lo cierras.</div>
      <div class="fld"><label>Título</label><input class="inp" placeholder="Ej. Reorganizar la agenda de los viernes" value="${incEsc(F.ttitulo||'')}" oninput="setInp('ttitulo',this.value)"></div>
      <div class="fld"><label>Descripción (opcional)</label><textarea class="inp" placeholder="Para qué es este tema, qué hay que decidir…" oninput="setInp('tdesc',this.value)" style="min-height:60px;font-family:inherit">${incEsc(F.tdesc||'')}</textarea></div>
      <div class="fld"><label>Participantes</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          <button type="button" class="chip-sel ${(F.tparts||[]).length>=all.length&&all.length?'on':''}" onclick="temaAllPartes()">Todo el equipo</button>
          ${all.map(n=>`<button type="button" class="chip-sel ${(n===me||(F.tparts||[]).includes(n))?'on':''}" ${n===me?'disabled style="opacity:.65;cursor:default"':''} onclick="temaToggleParte('${incEsc(n)}')">${incEsc(n)}${n===me?' (tú)':''}</button>`).join('')}
        </div>
        <div class="hint" style="text-align:left;margin-top:5px">Tú siempre estás dentro. Elige con quién compartes el tema.</div></div>
    </div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="commitTemaNuevo()">Crear tema</button></div>
  </div></div>`;
}
/* ===== FIN MÓDULO TEMAS ===== */


boot();

</script>
</body>
</html>
