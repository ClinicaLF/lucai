    const persona = modo==='emitidas' ? t.paraQuien : t.deQuien;
    const quick = (modo==='recibidas' && tarActiva(t))
      ? `<button class="btn btn-ghost btn-sm" title="Marcar esta tarea como terminada" onclick="event.stopPropagation();tarMarcar('${t.id}','Hecha')">Marcar hecha</button>` : '';
    return `<tr onclick="openTarDet('${t.id}')" ${tarVencida(t)?'style="background:#FBEEEA"':''}>
      <td>${tarPrioChip(t.prioridad)}</td>
      <td style="font-weight:600">${incEsc(t.titulo)}${tarNvBadge(t)}${tarAreaChip(t.area)}</td>
      <td class="col-hide-m">${incEsc(persona||'—')}</td>
      <td>${tarLimiteCell(t)}</td>
      <td class="col-hide-m">${tarEstadoChip(t.estado)}</td>
      <td style="text-align:right;white-space:nowrap">${quick}</td>

  }).join('');
  return tarKpis(all)+toggle+`<div class="inctable-wrap"><table class="inctable">
    <thead><tr><th>Prior.</th><th>Tarea</th><th class="col-hide-m">${otro}</th><th>Entrega</th><th class="col-hide-m">Estado</th><th></th></tr></thead>

}

function tarTodasView(){
  const f=S.tarF, all=S.tareas||[];

    if(f.estado && t.estado!==f.estado) return false;

    ${(f.estado||f.prio||f.area||f.de||f.para)?`<button class="btn btn-ghost btn-sm" onclick="clearTarF()">Limpiar</button>`:''}

function tarSemanaView(){
  const me=S.user.nombre, admin=isAdmin();
  const mias=(S.tareas||[]).filter(t=> admin ? true : (t.paraQuien===me || t.deQuien===me));
  const mon=tarMonday(S.tarWeek);
  const dom=new Date(mon); dom.setDate(mon.getDate()+6);
  const rango=`${mon.getDate()}/${mon.getMonth()+1} – ${dom.getDate()}/${dom.getMonth()+1}`;
  const nav=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
    <button class="btn btn-ghost btn-sm" onclick="tarWeekNav(-1)">‹ Semana anterior</button>
    <div style="font-weight:700">${S.tarWeek===0?'Esta semana':rango} <span class="muted" style="font-weight:400;font-size:13px">(${rango})</span></div>
    <button class="btn btn-ghost btn-sm" onclick="tarWeekNav(1)">Semana siguiente ›</button>
    ${S.tarWeek!==0?`<button class="btn btn-ghost btn-sm" onclick="tarWeekNav(0,true)">Hoy</button>`:''}
    <span class="muted" style="font-size:12px">${admin?'Vista de todo el equipo':'Tus tareas (recibidas y emitidas)'}</span>
  </div>`;
  const cells=[];
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(mon.getDate()+i); const iso=tarIso(d);
    const esHoy=iso===todayStr();
    const dia=(S.tareas?mias:[]).filter(t=>t.fechaLimite===iso)
      .sort((a,b)=>TAR_PRIOS.indexOf(a.prioridad)-TAR_PRIOS.indexOf(b.prioridad));
    const chips=dia.map(t=>{
      const col = t.estado==='Hecha' ? '#6E8E00' : t.prioridad==='Alta' ? '#C0392B' : t.prioridad==='Media' ? '#B8860B' : '#8A949B';
      const tach = t.estado==='Hecha' ? 'text-decoration:line-through;opacity:.6' : '';
      const quien = admin ? (t.paraQuien||'') : (t.paraQuien===me?('→ yo'):('→ '+t.paraQuien));
      return `<div onclick="openTarDet('${t.id}')" title="${incEsc(t.titulo)}" style="cursor:pointer;border-left:3px solid ${col};background:#fff;border:1px solid var(--line);border-radius:7px;padding:6px 8px;margin-bottom:6px;font-size:12px;line-height:1.3;${tach}">
        <div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${tarNuevosPara(t,me)?'<span style="color:#6E8E00">● </span>':''}${incEsc(t.titulo)}</div>
        <div class="muted" style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${incEsc(quien)}</div>
      </div>`;
    }).join('') || '<div class="muted" style="font-size:11px;padding:4px 0">—</div>';
    cells.push(`<div style="background:${esHoy?'#F4F0E9':'#FAF8F3'};border:1px solid ${esHoy?'#B8A88F':'var(--line)'};border-radius:10px;padding:8px;min-height:120px">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:${esHoy?'#333F48':'#8A949B'};font-weight:700;margin-bottom:6px">${TAR_DOW[i]} ${d.getDate()}${esHoy?' · hoy':''}</div>
      ${chips}</div>`);
  }
  return nav+`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;min-width:760px">${cells.join('')}</div></div>`;
}

function toggleTarHechas(){ S.tarVerHechas=!S.tarVerHechas; render(); }
function setTarF(field,v){ S.tarF[field]=v; render(); }
function clearTarF(){ S.tarF={estado:'',prio:'',de:'',para:'',area:''}; render(); }
function tarWeekNav(delta,reset){ S.tarWeek = reset ? 0 : (S.tarWeek+delta); render(); }

function tarMarcar(id,estado){
  const t=(S.tareas||[]).find(x=>x.id===id); if(!t) return;
  t.estado=estado;
  t.fechaHecha = estado==='Hecha' ? todayStr() : null;
  render();
  srvTarUpdate(id, t, estado==='Hecha'?'Tarea terminada y archivada':'Tarea actualizada');
}
function tarEliminar(id){
  const t=(S.tareas||[]).find(x=>x.id===id); if(!t) return;
  if(!(isAdmin() || t.deQuien===S.user.nombre)){ toast('Solo puede eliminarla quien la creó o Dirección'); return; }
  S.tareas=S.tareas.filter(x=>x.id!==id); closeModal(); render();
  srvTarDelete(id, 'Tarea eliminada');
}

function tarValid(){

function commitTarea(){
  if(!tarValid()) return;
  const t={ id:uid(), titulo:(F.titulo||'').trim(), descripcion:(F.descripcion||'').trim(),
    prioridad:F.prioridad||'Media', area:F.area||'General', fechaLimite:F.fechaLimite, deQuien:S.user.nombre,
    paraQuien:F.paraQuien, estado:'Pendiente', ts:now(), fechaHecha:null, mensajes:[], vistos:{} };
  S.tareas.unshift(t); closeModal(); render();
  srvTarInsert(t, 'Tarea enviada');
  tgNotify(t.paraQuien, `📋 Nueva tarea de ${t.deQuien}: "${t.titulo}" · prioridad ${t.prioridad}${t.fechaLimite?` · entrega ${fmtFecha(t.fechaLimite)}`:''}`);
}

function openTarDet(id){
  const t=(S.tareas||[]).find(x=>x.id===id); if(!t) return;
  F={type:'tar_det', id}; S.modal='tar_det'; render();
  const me=S.user.nombre;
  const primera = !(t.vistos && t.vistos[me]);
  if(primera || tarNuevosPara(t,me)>0){ if(!t.vistos||typeof t.vistos!=='object'||Array.isArray(t.vistos)) t.vistos={}; t.vistos[me]=now(); srvTarUpdate(id, t); }
}
function tarDetModalContent(){
  const t=(S.tareas||[]).find(x=>x.id===F.id)||{};
  const me=S.user.nombre, admin=isAdmin();
  const soyPara=t.paraQuien===me, soyDe=t.deQuien===me;
  const d=tarDiasRest(t);
  const limTxt = !t.fechaLimite ? 'sin fecha' : (t.estado==='Hecha' ? fmtFecha(t.fechaLimite) : (d<0?`${fmtFecha(t.fechaLimite)} · vencida hace ${-d} d`:(d===0?`${fmtFecha(t.fechaLimite)} · hoy`:`${fmtFecha(t.fechaLimite)} · faltan ${d} d`)));

  }
  if((soyPara||soyDe||admin) && t.estado==='Hecha') acciones+=`<button class="btn btn-ghost" onclick="tarMarcar('${t.id}','Pendiente')">Reabrir</button>`;

  if(soyDe||admin) acciones+=`<button class="btn btn-ghost" style="color:#C0392B;border-color:#C0392B" onclick="tarEliminar('${t.id}')">Eliminar</button>`;
  return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">

      <div style="font-family:var(--serif);font-size:19px;margin-bottom:8px">${incEsc(t.titulo||'')}</div>
      <div class="inc-meta" style="margin:0 0 6px">De ${incEsc(t.deQuien||'—')} · Para ${incEsc(t.paraQuien||'—')}</div>
      <div class="inc-meta" style="margin:0 0 10px">Entrega: ${incEsc(limTxt)}${t.fechaHecha?` · Hecha el ${incEsc(fmtFecha(t.fechaHecha))}`:''}</div>
      ${t.descripcion?`<div class="inc-detalle" style="background:#F7F4EE;border-radius:8px;padding:12px 14px">${incEsc(t.descripcion)}</div>`:''}
      ${tarThreadHtml(t)}

function tarThreadHtml(t){
  const me=S.user.nombre, admin=isAdmin();
  const puede = admin || t.deQuien===me || t.paraQuien===me;
  const msgs=Array.isArray(t.mensajes)?t.mensajes:[];
  const list = msgs.length ? msgs.map(mm=>{
    const mine=mm.de===me;
    return `<div style="margin-bottom:8px;display:flex;${mine?'justify-content:flex-end':''}">
      <div style="max-width:82%;background:${mine?'#EAF1D8':'#F4F0E9'};border:1px solid var(--line);border-radius:12px;padding:8px 11px">
        <div style="font-size:11px;color:#8A949B;margin-bottom:2px">${incEsc(mm.de||'—')} · ${incEsc(tarMsgTime(mm.ts))}</div>
        <div style="font-size:14px;line-height:1.45;white-space:pre-wrap">${incEsc(mm.texto||'')}</div>
      </div></div>`;
  }).join('') : `<div class="muted" style="font-size:13px">Aún no hay mensajes. Escribe el primero para aclarar o comentar la tarea.</div>`;
  const compose = puede ? `<div style="display:flex;gap:8px;margin-top:10px">
      <input class="inp" placeholder="Escribe un mensaje…" value="${incEsc(F.msgDraft||'')}" oninput="setInp('msgDraft',this.value)" onkeydown="if(event.key==='Enter'){event.preventDefault();tarAddMsg('${t.id}')}">
      <button class="btn btn-primary" onclick="tarAddMsg('${t.id}')">Enviar</button>
    </div>` : '';
  return `<div style="margin-top:14px;border-top:1px solid var(--line);padding-top:12px">

    <div style="max-height:240px;overflow-y:auto">${list}</div>
    ${compose}</div>`;
}
function tarMsgTime(ts){ ts=String(ts||''); const d=ts.slice(0,10).split('-'); const hm=ts.slice(11,16); return (d.length===3?`${d[2]}/${d[1]}`:ts)+(hm?` ${hm}`:''); }
function tarAddMsg(id){
  const txt=(F.msgDraft||'').trim(); if(!txt) return;
  const t=(S.tareas||[]).find(x=>x.id===id); if(!t) return;

  if(!(isAdmin()||t.deQuien===me||t.paraQuien===me)){ toast('No puedes escribir en esta tarea'); return; }

  t.mensajes.push({de:me, texto:txt, ts:now()});

}

function exportTareas(){
  if(typeof XLSX==='undefined'){ toast('No se pudo cargar Excel'); return; }
  const f=S.tarF;
  const data=(S.tareas||[]).filter(t=>{
    if(f.estado && t.estado!==f.estado) return false;
    if(f.prio && t.prioridad!==f.prio) return false;
    if(f.area && (t.area||'General')!==f.area) return false;
    if(f.de && t.deQuien!==f.de) return false;
    if(f.para && t.paraQuien!==f.para) return false;
    return true;
  });
  if(!data.length){ toast('No hay tareas que exportar'); return; }
  const head=["Tarea","Área","Prioridad","Estado","De","Para","Fecha entrega","Hecha el","Detalle"];
  const rows=[head];
  data.forEach(t=>rows.push([t.titulo||"",t.area||"General",t.prioridad||"",t.estado||"",t.deQuien||"",t.paraQuien||"",fmtFecha(t.fechaLimite),t.fechaHecha?fmtFecha(t.fechaHecha):"",t.descripcion||""]));
  const ws=XLSX.utils.aoa_to_sheet(rows); ws['!cols']=[{wch:38},{wch:14},{wch:10},{wch:11},{wch:18},{wch:18},{wch:13},{wch:12},{wch:46}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Tareas");

}

/* Resumen al entrar (vencidas / hoy / mensajes nuevos) + contador en el hub. */

function tarNuevosPara(t, me){
  const v=((t.vistos&&typeof t.vistos==='object')?t.vistos[me]:'')||'';
  return (t.mensajes||[]).filter(mm=>mm.de!==me && String(mm.ts)>v).length;
}
function tarMisNuevos(me){
  return (S.tareas||[]).filter(t=>t.deQuien===me||t.paraQuien===me).reduce((s,t)=>s+tarNuevosPara(t,me),0);
}
function tarNvBadge(t){
  const me=S.user&&S.user.nombre; if(!me) return '';

  return ` <span style="background:#6E8E00;color:#fff;font-size:11px;font-weight:800;border-radius:20px;padding:1px 8px;margin-left:6px;white-space:nowrap">● ${nv} nuevo${nv>1?'s':''}</span>`;
}
function tarResumenBanner(){
  const me=S.user.nombre, first=me.split(' ')[0];
  const mias=(S.tareas||[]).filter(t=>t.paraQuien===me && tarActiva(t));
  const venc=mias.filter(tarVencida).length;
  const hoy=mias.filter(t=>t.fechaLimite===todayStr()).length;
  const pend=mias.length;
  const nuevos=tarMisNuevos(me);
  if(!pend && !nuevos) return `<div class="note" style="margin-top:0">${first}, no tienes tareas pendientes ni mensajes nuevos. Todo al día.</div>`;
  const partes=[];
  if(venc) partes.push(`<strong style="color:#C0392B">${venc} vencida${venc>1?'s':''}</strong>`);
  if(hoy) partes.push(`<strong style="color:#B8860B">${hoy} para hoy</strong>`);
  const resto=pend-venc-hoy;
  if(resto>0) partes.push(`${resto} por delante`);
  if(nuevos) partes.push(`<strong>${nuevos} mensaje${nuevos>1?'s':''} nuevo${nuevos>1?'s':''}</strong>`);
  const cierre = venc ? 'Empieza por lo vencido.' : (hoy ? 'Prioriza lo de hoy.' : (nuevos? 'Echa un ojo a los mensajes.':'Vas con margen.'));
  return `<div class="note" style="margin-top:0">${first}, tienes ${partes.join(' · ')}. ${cierre}</div>`;
}

/* construir el contexto que se le manda: las tareas activas del usuario */
function iaContexto(){
  const me = S.user.nombre;
  const admin = (typeof isAdmin==='function') ? isAdmin() : false;
  const hoy = (typeof todayStr==='function') ? todayStr() : new Date().toISOString().slice(0,10);
  const activa = t => (typeof tarActiva==='function' ? tarActiva(t) : t.estado!=='Hecha');
  const temp = f => !f ? 'sin fecha' : (f<hoy?'VENCIDA':(f===hoy?'VENCE HOY':'futura'));
  const out = [];
  out.push(`HOY es ${hoy}. Usa esta fecha para saber qué está VENCIDA (anterior a hoy), qué VENCE HOY y qué es futura. "Vencida", "pasada", "atrasada" o "sin terminar de antes" significan lo mismo.`);
  out.push(`Usuario: ${me}${admin?' (Dirección)':''}.`);

  // 1) Mis tareas pendientes (las que me han mandado)
  const recib = (S.tareas||[]).filter(t=> t.paraQuien===me && activa(t));
  out.push('\n[MIS TAREAS PENDIENTES]');
  if(!recib.length) out.push('(ninguna)');
  else recib.forEach(t=> out.push(`- ${t.titulo} | área: ${t.area||'General'} | prioridad: ${t.prioridad||'Media'} | vence: ${t.fechaLimite||'sin fecha'} (${temp(t.fechaLimite)}) | estado: ${t.estado||'Pendiente'} | me la mandó: ${t.deQuien||'—'}`));

  // 2) Tareas que YO he encargado a otros
  const emit = (S.tareas||[]).filter(t=> t.deQuien===me && t.paraQuien!==me && activa(t));
  out.push('\n[TAREAS QUE YO HE ENCARGADO A OTROS]');
  if(!emit.length) out.push('(ninguna)');
  else emit.forEach(t=> out.push(`- ${t.titulo} | área: ${t.area||'General'} | para: ${t.paraQuien||'—'} | vence: ${t.fechaLimite||'sin fecha'} (${temp(t.fechaLimite)}) | estado: ${t.estado||'Pendiente'}`));

  // 3) Incidencias sin revisar (sin datos de pacientes)
  const incs = (S.incidencias||[]).filter(i=> !i.revisada).slice(0,25);
  out.push('\n[INCIDENCIAS SIN REVISAR] (sin datos de pacientes)');
  if(!incs.length) out.push('(ninguna sin revisar)');
  else incs.forEach(i=> out.push(`- ${i.fecha||i.ts||'?'} | categoría: ${i.categoria||'—'} | importancia: ${i.importancia||'—'} | la reportó: ${i.reporta||'—'}`));

  // 4) Presupuestos rechazados — solo Dirección, sin datos de pacientes
  if(admin){
    const pres = (S.presupuestos||[]);
    out.push('\n[PRESUPUESTOS RECHAZADOS] (solo Dirección · sin datos de pacientes)');
    if(!pres.length) out.push('(ninguno registrado)');
    else {
      const total = pres.reduce((s,p)=> s + (Number(p.importe)||0), 0);
      out.push(`Total: ${pres.length} rechazos · importe perdido aprox. ${total} €.`);
      pres.slice(0,40).forEach(p=> out.push(`- ${p.fechaRechazo||p.fechaPresup||'?'} | área: ${p.area||'—'} | importe: ${Number(p.importe)||0} € | doctor: ${p.doctor||'—'} | coord.: ${p.coordinadora||'—'} | motivos: ${(p.motivos||[]).join('; ')||'—'}`));
      if(pres.length>40) out.push(`...y ${pres.length-40} más.`);
    }
  }

  return out.join('\n');
}

async function iaSend(textoFijo){
  const box = el('iaInput');
  const q = (textoFijo!=null ? textoFijo : (box ? box.value : '')).trim();
  if(!q || S.iaLoading) return;
  S.iaChat.push({ q:q, a:null });
  S.iaLoading = true;
  render();
  try{
    const r = await fetch(IA_FN, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ pregunta:q, contexto:iaContexto(), usuario:S.user.nombre })
    });
    const data = await r.json().catch(()=>({}));
    const last = S.iaChat[S.iaChat.length-1];
    last.a = (data && data.respuesta) ? data.respuesta : 'No he recibido respuesta.';
  }catch(e){
    const last = S.iaChat[S.iaChat.length-1];
    last.a = 'No he podido conectar con la IA. Revisa la conexión e inténtalo de nuevo.';
  }
  S.iaLoading = false;
  render();
  setTimeout(()=>{ const sc=el('iaScroll'); if(sc) sc.scrollTop=sc.scrollHeight; }, 30);
}
function iaSugerencia(t){ iaSend(t); }
function iaLimpiar(){ S.iaChat=[]; render(); }

function iaBurbujas(){
  if(!S.iaChat.length){
    return `<div class="muted" style="text-align:center;padding:26px 8px">Escribe tu pregunta abajo, o toca una sugerencia.</div>`;
  }
  let h='';
  S.iaChat.forEach(m=>{
    h += `<div style="display:flex;justify-content:flex-end;margin:8px 0"><div style="max-width:80%;background:#EAF1D8;border:1px solid #D4E3B0;border-radius:14px 14px 4px 14px;padding:9px 12px;font-size:14px;white-space:pre-wrap">${incEsc(m.q)}</div></div>`;
    if(m.a!=null){
      h += `<div style="display:flex;justify-content:flex-start;margin:8px 0"><div style="max-width:85%;background:#fff;border:1px solid var(--line);border-radius:14px 14px 14px 4px;padding:9px 12px;font-size:14px;white-space:pre-wrap">${incEsc(m.a)}</div></div>`;
    }
  });
  if(S.iaLoading){
    h += `<div style="display:flex;justify-content:flex-start;margin:8px 0"><div style="background:#fff;border:1px solid var(--line);border-radius:14px;padding:9px 12px;font-size:14px;color:var(--grey-2)">Pensando…</div></div>`;
  }
  return h;
}

function asistenteView(){
  const sugs = ['¿Qué tengo que hacer hoy?','¿Qué es lo más urgente?','¿Tengo algo vencido?','Resúmeme mis tareas'];
  return `${moduleHeader('Asistente de Lucai', false)}
  <main><div class="wrap">
    <div><div class="section-title">Pregúntale a Lucai</div>
      <div class="section-sub">Responde en lenguaje normal sobre tus tareas. Puede equivocarse: para algo importante, compruébalo.</div></div>

    <div style="display:flex;gap:7px;flex-wrap:wrap;margin:6px 0 12px">
      ${sugs.map(s=>`<button class="btn btn-ghost btn-sm" onclick="iaSugerencia('${s.replace(/'/g,"\\'")}')">${s}</button>`).join('')}
      ${S.iaChat.length?`<button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="iaLimpiar()">Limpiar</button>`:''}
    </div>

    <div id="iaScroll" style="background:var(--arena-1);border:1px solid var(--line);border-radius:14px;padding:12px;min-height:200px;max-height:48vh;overflow:auto">
      ${iaBurbujas()}
    </div>

    <div style="display:flex;gap:8px;margin-top:12px">
      <input id="iaInput" class="inp" style="flex:1" placeholder="Escribe tu pregunta…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();iaSend()}">
      <button class="btn btn-primary" onclick="iaSend()" ${S.iaLoading?'disabled':''}>Enviar</button>
    </div>
  </div></main>`;
}

/* enganche a appView (gana la última) */
const _appView_ia = appView;
appView = function(){
  if(S.module==='asistente'){ if(!canAccess('asistente')){ S.module=null; return homeView(); } return asistenteView(); }
  return _appView_ia();
};

/* ===== FIN ASISTENTE IA ===== */


boot();
