/* añadir la carga de incidencias a loadFromDB (envolviendo la versión robusta) */
const _loadFromDB_base = loadFromDB;
loadFromDB = async function(){
  const _prev = _loadFromDB_base();
  try{
    const inc = await sbc.from('inc_incidencias').select('*').order('created_at',{ascending:false});
    if(inc.data) S.incidencias = inc.data.map(r=>({
      id:r.id, ts:r.ts, fecha:r.fecha, reporta:r.reporta, categoria:r.categoria,
      importancia:r.importancia, detalle:r.detalle, sugerencia:r.sugerencia,
      pacCod:r.pac_cod, pacNombre:r.pac_nombre, revisada:r.revisada===true,
      notaDir:r.nota_dir, revPor:r.rev_por, revTs:r.rev_ts, origen:r.origen }));
  }catch(e){ console.error('loadIncidencias', e); }
  await _prev;
};

/* ---- guardado en servidor ---- */
async function srvIncidencia(o, okMsg){
  try{
    const { error } = await sbc.from('inc_incidencias').insert({
      id:o.id, ts:o.ts, fecha:o.fecha, reporta:o.reporta, categoria:o.categoria,
      importancia:o.importancia, detalle:o.detalle, sugerencia:o.sugerencia||null,
      pac_cod:o.pacCod||null, pac_nombre:o.pacNombre||null, origen:'app' });
    if(error) throw error;
  }catch(e){ console.error('srvIncidencia', e); await syncAll(); toast('Error al guardar: '+(e.message||e)); return; }
  await loadFromDB(); render(); if(okMsg) toast(okMsg);
}
async function incRevisar(id, nota){
  try{
    const { error } = await sbc.from('inc_incidencias').update({
      revisada:true, nota_dir:nota||null, rev_por:S.user.nombre, rev_ts:tsFrom(todayStr()) }).eq('id', id);
    if(error) throw error;
  }catch(e){ console.error('incRevisar', e); await syncAll(); toast('No se pudo guardar: '+(e.message||e)); return; }
  await loadFromDB(); render();
}

function incPreview(t){ t=(t||'').replace(/\s+/g,' ').trim(); return t.length>80?t.slice(0,80)+'…':t; }

function incFiltered(){
  let l=(S.incidencias||[]).slice();
  if(S.incCat) l=l.filter(x=>x.categoria===S.incCat);
  if(S.incImp) l=l.filter(x=>x.importancia===S.incImp);
  if(S.incRep) l=l.filter(x=>x.reporta===S.incRep);
  if(S.incEstado==='pend') l=l.filter(x=>!x.revisada);
  else if(S.incEstado==='rev') l=l.filter(x=>x.revisada);
  if(S.incDesde) l=l.filter(x=>(x.fecha||x.ts||'').slice(0,10) >= S.incDesde);
  if(S.incHasta) l=l.filter(x=>(x.fecha||x.ts||'').slice(0,10) <= S.incHasta);
  l.sort((a,b)=>{ const fa=(a.fecha||a.ts||'').slice(0,10), fb=(b.fecha||b.ts||'').slice(0,10); if(fa!==fb) return fb.localeCompare(fa); return String(b.ts||'').localeCompare(String(a.ts||'')); });
  return l;
}

async function incReabrir(id){
  try{

    if(error) throw error;
  }catch(e){ console.error('incReabrir', e); await syncAll(); toast('No se pudo cambiar: '+(e.message||e)); return; }
  await loadFromDB(); render();
}
function commitReabrir(){

}

function openIncEdit(id){
  const o=(S.incidencias||[]).find(x=>x.id===id); if(!o) return;
  if(!(isAdmin() || o.reporta===S.user.nombre)){ toast('Solo puedes editar tus incidencias'); return; }
  F={type:'inc_edit', id, categoria:o.categoria||'', importancia:o.importancia||'Media',
     detalle:o.detalle||'', sugerencia:o.sugerencia||'', pacCod:o.pacCod||'', pacNombre:o.pacNombre||''};
  S.modal='inc_edit'; render();
}
function commitIncEdit(){
  const id=F.id;
  if(!F.categoria){ toast('Elige de qué trata'); return; }
  if(!(F.detalle||'').trim()){ toast('Cuenta qué ha ocurrido'); return; }
  const o=(S.incidencias||[]).find(x=>x.id===id); if(!o) return;
  o.categoria=F.categoria; o.importancia=F.importancia||'Media'; o.detalle=(F.detalle||'').trim();
  o.sugerencia=(F.sugerencia||'').trim(); o.pacCod=(F.pacCod||'').trim(); o.pacNombre=(F.pacNombre||'').trim();
  closeModal(); render();
  srvIncidenciaUpdate(id, o, 'Incidencia actualizada');
}
async function srvIncidenciaUpdate(id, o, okMsg){
  try{
    const { error } = await sbc.from('inc_incidencias').update({
      categoria:o.categoria, importancia:o.importancia, detalle:o.detalle,
      sugerencia:o.sugerencia||null, pac_cod:o.pacCod||null, pac_nombre:o.pacNombre||null }).eq('id', id);
    if(error) throw error;
  }catch(e){ console.error('srvIncidenciaUpdate', e); await syncAll(); toast('Error al guardar: '+(e.message||e)); return; }
  await loadFromDB(); render(); if(okMsg) toast(okMsg);
}
function incEliminar(id){
  const o=(S.incidencias||[]).find(x=>x.id===id); if(!o) return;
  if(!(isAdmin() || o.reporta===S.user.nombre)){ toast('Solo Dirección o quien la creó puede eliminarla'); return; }
  if(!confirm('¿Eliminar esta incidencia por completo?\n\nSe borra para todos y no se puede deshacer.')) return;
  S.incidencias=(S.incidencias||[]).filter(x=>x.id!==id);
  closeModal(); render(); srvIncidenciaDelete(id); toast('Incidencia eliminada');
}
async function srvIncidenciaDelete(id){
  try{
    const { error } = await sbc.from('inc_incidencias').delete().eq('id', id);
    if(error) throw error;
  }catch(e){ console.error('srvIncidenciaDelete', e); await syncAll(); toast('Error al eliminar: '+(e.message||e)); return; }
  await loadFromDB(); render();
}

    documentos:'<path d="M7 3h7l4 4v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v4h4"/><path d="M9 13h6M9 16.5h6"/>',

    return `<button class="${cls}" ${click}>${badge}<span class="np-tile">${ic}</span><div class="np-title">${m.nombre}</div><div class="np-desc">${m.desc}</div></button>`;

  let sections='';

/* añadir equipos y partes a loadFromDB */
const _loadFromDB_eq = loadFromDB;
loadFromDB = async function(){
  const _prev = _loadFromDB_eq();
  try{
    const [eq, pa] = await Promise.all([
      sbc.from('eq_equipos').select('*').order('nombre'),
      sbc.from('eq_partes').select('*').order('created_at',{ascending:false})
    ]);
    if(eq.data) S.equipos = eq.data.map(r=>({ id:r.id, nombre:r.nombre, tipo:r.tipo, ubicacion:r.ubicacion,
      marcaModelo:r.marca_modelo, nserie:r.nserie, proveedor:r.proveedor, compra:r.compra,
      garantiaHasta:r.garantia_hasta, activo:r.activo!==false }));
    if(pa.data) S.partes = pa.data.map(r=>({ id:r.id, equipoId:r.equipo_id, equipoNombre:r.equipo_nombre,
      ts:r.ts, fechaApertura:r.fecha_apertura, abiertoPor:r.abierto_por, averia:r.averia, urgencia:r.urgencia,
      estado:r.estado, proveedor:r.proveedor, coste:(r.coste==null?null:Number(r.coste)), factura:r.factura,
      fechaCierre:r.fecha_cierre, fechaEstado:r.fecha_estado, notas:r.notas }));
  }catch(e){ console.error('loadEquipos', e); }
  await _prev;
};

/* ---- guardado ---- */
async function srvEquipoUpsert(e, okMsg){
  try{
    const { error } = await sbc.from('eq_equipos').upsert({
      id:e.id, nombre:e.nombre, tipo:e.tipo||null, ubicacion:e.ubicacion||null,
      marca_modelo:e.marcaModelo||null, nserie:e.nserie||null, proveedor:e.proveedor||null,
      compra:e.compra||null, garantia_hasta:e.garantiaHasta||null, activo:e.activo!==false }, { onConflict:'id' });
    if(error) throw error;
  }catch(err){ console.error('srvEquipoUpsert', err); toast('Error al guardar equipo: '+(err.message||err)); throw err; }
  if(okMsg){ await loadFromDB(); render(); toast(okMsg); }
}
async function srvParteInsert(p, okMsg){
  try{
    const { error } = await sbc.from('eq_partes').insert({
      id:p.id, equipo_id:p.equipoId, equipo_nombre:p.equipoNombre, ts:p.ts, fecha_apertura:p.fechaApertura,
      abierto_por:p.abiertoPor, averia:p.averia, urgencia:p.urgencia, estado:p.estado, proveedor:p.proveedor||null,
      coste:(p.coste==null?null:p.coste), factura:p.factura||null, fecha_cierre:p.fechaCierre||null, fecha_estado:p.fechaEstado||null, notas:p.notas||null });
    if(error) throw error;
  }catch(e){ console.error('srvParteInsert', e); await syncAll(); toast('Error al crear parte: '+(e.message||e)); return; }
  await loadFromDB(); render(); if(okMsg) toast(okMsg);
}
async function srvParteUpdate(id, p, okMsg){
  try{
    const { error } = await sbc.from('eq_partes').update({
      estado:p.estado, proveedor:p.proveedor||null, coste:(p.coste==null?null:p.coste),
      factura:p.factura||null, fecha_cierre:p.fechaCierre||null, fecha_estado:p.fechaEstado||null, notas:p.notas||null }).eq('id', id);
    if(error) throw error;
  }catch(e){ console.error('srvParteUpdate', e); await syncAll(); toast('Error al guardar: '+(e.message||e)); return; }
  await loadFromDB(); render(); if(okMsg) toast(okMsg);
}

/* ---- helpers ---- */
function eqAbierto(p){ return p.estado!=='Resuelto' && p.estado!=='No reparable'; }
function eqEstadoChip(e){
  const map={'Abierto':'#8A949B','Enviado a proveedor':'#E67E22','Esperando técnico':'#E0A800','Resuelto':'#6E8E00','No reparable':'#C0392B'};
  const c=map[e]||'#8A949B';
  return `<span style="font-size:11px;font-weight:700;color:#fff;background:${c};padding:2px 9px;border-radius:20px;white-space:nowrap;display:inline-block">${incEsc(e||'—')}</span>`;
}
function eqEquipoStats(id){
  const ps=(S.partes||[]).filter(p=>p.equipoId===id);
  return { n:ps.length, coste:ps.reduce((s,p)=>s+(Number(p.coste)||0),0), abiertos:ps.filter(eqAbierto).length };
}

async function commitParte(){
  let equipoId=F.equipoId, equipoNombre='', equipoNuevoObj=null;
  if(equipoId==='__nuevo__'){
    const nom=(F.equipoNuevo||'').trim();
    if(!nom){ toast('Pon el nombre del equipo nuevo'); return; }
    equipoId=uid(); equipoNombre=nom;
    equipoNuevoObj={ id:equipoId, nombre:nom, tipo:F.tipoNuevo||null, ubicacion:(F.ubicNuevo||'').trim()||null, activo:true };
  } else if(equipoId){
    const e=(S.equipos||[]).find(x=>x.id===equipoId); equipoNombre=e?e.nombre:'';
  } else { toast('Elige o crea un equipo'); return; }
  if(!(F.averia||'').trim()){ toast('Describe la avería'); return; }
  const cerrado=(F.estado==='Resuelto'||F.estado==='No reparable');
  const parte={ id:uid(), equipoId, equipoNombre, ts:tsFrom(F.fecha||todayStr()), fechaApertura:(F.fecha||todayStr()),
    abiertoPor:S.user.nombre, averia:(F.averia||'').trim(), urgencia:F.urgencia||'Media', estado:F.estado||'Abierto',
    proveedor:(F.proveedor||'').trim(), coste:(F.coste!==''&&F.coste!=null)?parseFloat(String(F.coste).replace(',','.')):null,
    factura:'', fechaCierre:(cerrado?(F.fecha||todayStr()):null), fechaEstado:(F.fecha||todayStr()), notas:(F.notas||'').trim() };
  if(equipoNuevoObj) S.equipos.push(equipoNuevoObj);
  S.partes.unshift(parte);
  closeModal(); S.sub='eq_partes'; render();
  try{ if(equipoNuevoObj) await srvEquipoUpsert(equipoNuevoObj); }catch(e){ return; }
  await srvParteInsert(parte, 'Parte creado');
}

/* ---- cálculos ---- */
function presDias(p){
  if(!p.fechaPresup || !p.fechaRechazo) return null;
  const d = Math.round((Date.parse(p.fechaRechazo)-Date.parse(p.fechaPresup))/86400000);
  return isNaN(d)?null:Math.max(0,d);
}
function presMatch(p){
  const f=S.presF;
  if(f.area && p.area!==f.area) return false;
  if(f.doctor && p.doctor!==f.doctor) return false;
  if(f.coord && p.coordinadora!==f.coord) return false;
  if(f.motivo && !(p.motivos||[]).includes(f.motivo)) return false;
  if(f.desde && (p.fechaRechazo||'') < f.desde) return false;
  if(f.hasta && (p.fechaRechazo||'') > f.hasta) return false;
  return true;
}
function presFiltered(){ return (S.presupuestos||[]).filter(presMatch).sort((a,b)=>String(b.fechaRechazo).localeCompare(String(a.fechaRechazo))); }

function presTally(arr,key){ const m={}; arr.forEach(x=>{const k=x[key]||'—'; m[k]=(m[k]||0)+1;}); return Object.entries(m).sort((a,b)=>b[1]-a[1]); }
function presSum(arr,key){ const m={}; arr.forEach(x=>{const k=x[key]||'—'; m[k]=(m[k]||0)+(Number(x.importe)||0);}); return Object.entries(m).sort((a,b)=>b[1]-a[1]); }
function presTallyMotivos(arr){ const m={}; arr.forEach(x=>(x.motivos||['—']).forEach(mo=>{ m[mo]=(m[mo]||0)+1; })); return Object.entries(m).sort((a,b)=>b[1]-a[1]); }
function presSumMotivos(arr){ const m={}; arr.forEach(x=>(x.motivos||['—']).forEach(mo=>{ m[mo]=(m[mo]||0)+(Number(x.importe)||0); })); return Object.entries(m).sort((a,b)=>b[1]-a[1]); }

function presBars(title, entries, isEur){
  if(!entries.length) return '';
  const max=Math.max(1,...entries.map(c=>c[1]));
  return `<div style="margin-bottom:22px"><div class="section-title" style="font-size:15px;margin-bottom:10px">${title}</div>`+
    entries.map(([l,n])=>`<div class="incbar-row"><div class="incbar-lbl" title="${incEsc(l)}">${incEsc(l)}</div><div class="incbar-track"><div class="incbar-fill" style="width:${Math.round(n/max*100)}%"></div></div><div class="incbar-val" style="white-space:nowrap">${isEur?eur(n):n}</div></div>`).join('')+
    `</div>`;
}

function presListView(){
  const all=S.presupuestos||[];
  if(!all.length) return `<div class="muted" style="padding:20px;text-align:center">Aún no hay presupuestos registrados. Usa “Registrar presupuesto rechazado” cuando se caiga uno.</div>`;
  const f=S.presF;
  const list=presFiltered();
  const docs=[...new Set(all.map(p=>p.doctor).filter(Boolean))];
  const coords=[...new Set(all.map(p=>p.coordinadora).filter(Boolean))];
  const filtros=`<div class="inc-filters">
    <select class="inp" onchange="setPresF('area',this.value)"><option value="">Todas las áreas</option>${PRES_AREAS.map(a=>`<option ${f.area===a?'selected':''}>${a}</option>`).join('')}</select>
    <select class="inp" onchange="setPresF('doctor',this.value)"><option value="">Todos los doctores</option>${docs.map(d=>`<option ${f.doctor===d?'selected':''}>${incEsc(d)}</option>`).join('')}</select>
    <select class="inp" onchange="setPresF('coord',this.value)"><option value="">Todas las coordinadoras</option>${coords.map(c=>`<option ${f.coord===c?'selected':''}>${incEsc(c)}</option>`).join('')}</select>
    <select class="inp" onchange="setPresF('motivo',this.value)"><option value="">Todos los motivos</option>${PRES_MOTIVOS.map(m=>`<option ${f.motivo===m?'selected':''}>${incEsc(m)}</option>`).join('')}</select>
    <input class="inp" type="date" value="${f.desde||''}" onchange="setPresF('desde',this.value)" title="Rechazado desde" style="max-width:160px">
    <input class="inp" type="date" value="${f.hasta||''}" onchange="setPresF('hasta',this.value)" title="Rechazado hasta" style="max-width:160px">
    ${(f.area||f.doctor||f.coord||f.motivo||f.desde||f.hasta)?`<button class="btn btn-ghost btn-sm" onclick="clearPresF()">Limpiar</button>`:''}
    <button class="btn btn-ghost btn-sm" onclick="exportPres()">Exportar Excel</button>
    <span class="muted" style="font-size:12px">${list.length} caso(s)</span>
  </div>`;
  if(!list.length) return filtros+`<div class="muted" style="padding:20px;text-align:center">No hay presupuestos con esos filtros.</div>`;
  const rows=list.map(p=>{
    const d=presDias(p);
    const dCol = d==null?'—':(d>30?`<span style="font-weight:700;color:#C0392B">${d} d</span>`:(d>14?`<span style="font-weight:700;color:#B8860B">${d} d</span>`:`${d} d`));
    const mot=(p.motivos||[]).join(' · ');
    const pac=p.pacNombre?`${incEsc(p.pacNombre)}${p.pacCod?` (${incEsc(p.pacCod)})`:''}`:(p.pacCod?incEsc(p.pacCod):'—');
    return `<tr onclick="openPresDet('${p.id}')">
      <td class="inc-c-fecha">${incEsc(fmtFecha(p.fechaPresup))}</td>
      <td class="inc-c-fecha col-hide-m">${incEsc(fmtFecha(p.fechaRechazo))}</td>
      <td><span class="inc-cat">${incEsc(p.area||'—')}</span></td>
      <td style="text-align:right;white-space:nowrap;font-weight:700">${eur(p.importe)}</td>
      <td class="col-hide-m">${incEsc(p.doctor||'—')}</td>
      <td class="col-hide-m">${incEsc(p.coordinadora||'—')}</td>
      <td style="text-align:right">${dCol}</td>
      <td class="col-hide-m">${pac}</td>
      <td class="inc-c-det col-hide-m">${incEsc(incPreview(mot))}</td>
    </tr>`;
  }).join('');
  return filtros+`<div class="inctable-wrap"><table class="inctable">
    <thead><tr><th>Presupuestado</th><th class="col-hide-m">Rechazado</th><th>Área</th><th style="text-align:right">Importe</th><th class="col-hide-m">Doctor</th><th class="col-hide-m">Coordinadora</th><th style="text-align:right">Días</th><th class="col-hide-m">Paciente</th><th class="col-hide-m">Motivos</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

function presValid(){
  if(!F.area){ toast('Elige el área'); return false; }
  if(!F.fechaPresup){ toast('Pon la fecha de presupuestado'); return false; }
  if(!F.fechaRechazo){ toast('Pon la fecha de rechazo'); return false; }
  if(F.fechaRechazo < F.fechaPresup){ toast('La fecha de rechazo no puede ser anterior a la de presupuestado'); return false; }
  const imp=parseFloat(String(F.importe).replace(',','.'));
  if(!(imp>0)){ toast('Pon el importe del presupuesto'); return false; }
  if(!(F.motivos||[]).length){ toast('Marca al menos un motivo de rechazo'); return false; }
  return true;
}

function commitPresEdit(){
  if(!presValid()) return;
  const p=(S.presupuestos||[]).find(x=>x.id===F.id); if(!p) return;
  p.fechaPresup=F.fechaPresup; p.fechaRechazo=F.fechaRechazo;
  p.importe=parseFloat(String(F.importe).replace(',','.')); p.area=F.area;
  p.pacCod=(F.pacCod||'').trim(); p.pacNombre=(F.pacNombre||'').trim();
  p.doctor=F.doctor||''; p.coordinadora=F.coordinadora||'';
  p.motivos=(F.motivos||[]).slice(); p.explicacion=(F.explicacion||'').trim();
  closeModal(); render();
  srvPresUpdate(p.id, p, 'Presupuesto actualizado');
}

/* ---- export ---- */
function exportPres(){
  if(typeof XLSX==='undefined'){ toast('No se pudo cargar Excel'); return; }
  const data=presFiltered();
  if(!data.length){ toast('No hay presupuestos que exportar'); return; }
  const head=["Presupuestado","Rechazado","Días","Área","Importe (€)","Doctor","Coordinadora","Nº paciente","Paciente","Motivos","Explicación","Registrado por"];
  const rows=[head];
  data.forEach(p=>rows.push([
    fmtFecha(p.fechaPresup), fmtFecha(p.fechaRechazo), presDias(p)??"", p.area||"",
    Number((Number(p.importe)||0).toFixed(2)), p.doctor||"", p.coordinadora||"",
    p.pacCod||"", p.pacNombre||"", (p.motivos||[]).join(" · "), p.explicacion||"", p.registradoPor||"" ]));
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:12},{wch:6},{wch:18},{wch:12},{wch:20},{wch:16},{wch:12},{wch:22},{wch:40},{wch:46},{wch:16}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Presupuestos rechazados");
  XLSX.writeFile(wb,`presupuestos_rechazados_${new Date().toISOString().slice(0,10)}.xlsx`); toast('Presupuestos exportados');
}

/* ---- cálculos / helpers ---- */
function tarDParse(s){ if(!s) return null; const p=String(s).slice(0,10).split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
function tarIso(d){ const p=x=>String(x).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }
function tarMonday(offset){ const t=tarDParse(todayStr()); const day=(t.getDay()+6)%7; const m=new Date(t); m.setDate(t.getDate()-day+(offset||0)*7); return m; }
function tarActiva(t){ return t.estado!=='Hecha'; }
function tarPorHacer(t){ return tarActiva(t) && t.estado!=='En espera'; }
function tarVencida(t){ return tarActiva(t) && t.fechaLimite && t.fechaLimite < todayStr(); }
function tarDiasRest(t){ if(!t.fechaLimite) return null; const d=Math.round((tarDParse(t.fechaLimite)-tarDParse(todayStr()))/86400000); return d; }
function tarPrioChip(p){ return `<span class="inc-imp imp-${p||'Media'}">${p||'Media'}</span>`; }
function tarEstadoLabel(e){ return e==='Hecha' ? 'Cerrada' : (e||'Pendiente'); }
function tarEstadoCss(e){
  if(e==='Hecha') return 'background:#6E8E00;color:#fff';
  if(e==='En curso') return 'background:#5A6770;color:#fff';
  if(e==='En espera') return 'background:#F3E2C0;color:#8A5A00';
  return 'background:#EAE3D7;color:#333F48';
}
function tarEstadoChip(e){

}

function tarLimiteCell(t){

/* ---- recurrencia (estilo Google Calendar: serie + instancias) ---- */
const TAR_RECUR_HORIZON = 90;   // días que se generan por adelantado en series sin fecha de fin
const TAR_DOW_FULL = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
function tarDow(iso){ const d=tarDParse(iso); return (d.getDay()+6)%7; } // 0=Lun … 6=Dom
function tarRecurLabel(r){
  if(!r||!r.tipo) return '';
  if(r.tipo==='diaria') return 'Cada día';
  if(r.tipo==='semanal'){ const ds=(r.dias||[]).slice().sort((a,b)=>a-b).map(i=>TAR_DOW[i]); return ds.length? ('Cada semana · '+ds.join(', ')) : 'Cada semana'; }
  if(r.tipo==='mensual') return 'Cada mes · día '+(r.diaMes||'?');
  return '';
}
/* genera las fechas (ISO) de una serie desde 'startISO' (incl.) hasta 'untilISO' (incl.), según la regla */
function tarSerieFechas(rule, startISO, untilISO){
  const out=[]; if(!rule||!rule.tipo||!startISO) return out;
  const start=tarDParse(startISO), until=tarDParse(untilISO);
  if(until<start) return [startISO];
  const cap=400;
  if(rule.tipo==='diaria'){
    let d=new Date(start);
    while(d<=until && out.length<cap){ out.push(tarIso(d)); d.setDate(d.getDate()+1); }
  } else if(rule.tipo==='semanal'){
    const dias=(rule.dias&&rule.dias.length)?rule.dias:[ (start.getDay()+6)%7 ];
    let d=new Date(start);
    while(d<=until && out.length<cap){ if(dias.includes((d.getDay()+6)%7)) out.push(tarIso(d)); d.setDate(d.getDate()+1); }
  } else if(rule.tipo==='mensual'){
    const dm=rule.diaMes||start.getDate();
    let y=start.getFullYear(), m=start.getMonth();
    while(out.length<cap){
      const ult=new Date(y,m+1,0).getDate();
      const dd=Math.min(dm,ult);
      const cand=new Date(y,m,dd);
      if(cand>until) break;
      if(cand>=start) out.push(tarIso(cand));
      m++; if(m>11){ m=0; y++; }
    }
  }
  return out;
}
function tarSerieHermanas(serieId){ return (S.tareas||[]).filter(t=>t.serieId && t.serieId===serieId); }
/* relleno automático de series abiertas (sin fecha de fin): una vez por sesión, solo el emisor */
function tarTopUpSeries(){
  try{
    const me=S.user&&S.user.nombre; if(!me) return;
    const hoy=todayStr();
    const horizonte=tarAddDias(hoy, TAR_RECUR_HORIZON);
    const series={};
    (S.tareas||[]).forEach(t=>{ if(t.serieId && t.recurrencia && !t.recurrencia.hasta && t.deQuien===me){ (series[t.serieId]=series[t.serieId]||[]).push(t); } });
    const nuevas=[];
    Object.keys(series).forEach(sid=>{
      const hs=series[sid];
      const fechas=new Set(hs.map(t=>t.fechaLimite));
      const base=hs[0];
      const maxF=hs.map(t=>t.fechaLimite).filter(Boolean).sort().slice(-1)[0]||hoy;
      if(maxF >= tarAddDias(hoy,30)) return; // aún hay colchón
      const desde=tarAddDias(maxF,1);
      const cand=tarSerieFechas(base.recurrencia, desde, horizonte);
      cand.forEach(f=>{
        if(fechas.has(f)) return;
        const id=sid+'_'+f;
        if((S.tareas||[]).some(x=>x.id===id)) return;
        nuevas.push({ id, titulo:base.titulo, descripcion:base.descripcion, prioridad:base.prioridad, area:base.area,
          fechaLimite:f, deQuien:base.deQuien, paraQuien:base.paraQuien, horaInicio:base.horaInicio||'', horaFin:base.horaFin||'',
          serieId:sid, recurrencia:base.recurrencia, estado:'Pendiente', ts:now(), fechaHecha:null, mensajes:[], vistos:{}, tiempos:[], adjuntos:[] });
      });
    });
    if(nuevas.length){ nuevas.forEach(t=>S.tareas.push(t)); srvTarInsertMany(nuevas); }
  }catch(e){ console.error('tarTopUpSeries', e); }
}

function tarKpis(arr){

  const porHacer=act.filter(t=>t.estado!=='En espera').length;
  const espera=act.filter(t=>t.estado==='En espera').length;
  const venc=act.filter(tarVencida).length;
  const hoy=act.filter(t=>t.estado!=='En espera' && t.fechaLimite===todayStr()).length;
  const sel=(S.tarBuzF&&S.tarBuzF.kpi)||'';
  const card=(key, label, val, color, dark)=>{
    const on=sel===key;
    const base = dark
      ? `background:#333F48;color:#fff`
      : `background:#fff;border:1px solid ${on?color:'var(--line)'}`;
    const ring = on ? `box-shadow:0 0 0 2px ${color}` : '';
    return `<button onclick="setTarKpi('${key}')" title="Filtrar por ${label.toLowerCase()}" style="text-align:left;cursor:pointer;${base};${ring};border-radius:12px;padding:14px 18px;min-width:110px;transition:box-shadow .15s">
      <div style="font-size:12px;${dark?'opacity:.7':'color:#8A949B'}">${label}${on?' ·':''}</div>
      <div style="font-size:28px;font-weight:700;${dark?'':`color:${color}`}">${val}</div>
    </button>`;
  };
  return `<div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px">
    ${card('porhacer','Por hacer', porHacer, '#333F48', true)}
    ${card('espera','En espera', espera, '#8A5A00', false)}

    ${card('hoy','Para hoy', hoy, '#B8860B', false)}

}
function setTarKpi(k){ if(!S.tarBuzF) S.tarBuzF={prio:'',cat:'',persona:'',estado:'',q:'',sortDir:'asc',desde:'',hasta:'',kpi:''}; S.tarBuzF.kpi = (S.tarBuzF.kpi===k?'':k); render(); }
function tarKpiMatch(t, kpi){
  if(!kpi) return true;
  if(kpi==='porhacer') return tarActiva(t) && t.estado!=='En espera';
  if(kpi==='espera') return tarActiva(t) && t.estado==='En espera';
  if(kpi==='vencidas') return tarVencida(t);
  if(kpi==='hoy') return tarActiva(t) && t.estado!=='En espera' && t.fechaLimite===todayStr();
  return true;
}

      enRango(t) &&

function tarSemanaView(){
  const me=S.user.nombre, admin=isAdmin();
  const mias=(S.tareas||[]).filter(t=> admin ? true : (t.paraQuien===me || t.deQuien===me));
  const mon=tarMonday(S.tarWeek);
  const dom=new Date(mon); dom.setDate(mon.getDate()+6);
  const rango=`${mon.getDate()}/${mon.getMonth()+1} – ${dom.getDate()}/${dom.getMonth()+1}`;
  const nav=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">
    <button class="btn btn-ghost btn-sm" onclick="tarWeekNav(-1)">‹ Semana anterior</button>
    <div style="font-weight:700">${S.tarWeek===0?'Esta semana':rango} <span class="muted" style="font-weight:400;font-size:13px">(${rango})</span></div>

  const tarjeta=(t)=>{
    const col = t.estado==='Hecha' ? '#6E8E00' : t.prioridad==='Alta' ? '#C0392B' : t.prioridad==='Media' ? '#B8860B' : '#8A949B';
    const tach = t.estado==='Hecha' ? 'text-decoration:line-through;opacity:.55' : '';
    const quien = admin ? (t.paraQuien||'') : (t.paraQuien===me?'para mí':('para '+t.paraQuien));
    const activa = tarActiva(t), recibida = t.paraQuien===me;
    let btns='';
    if(activa) btns += `<button class="btn btn-ghost btn-sm" title="Posponer un día" onclick="event.stopPropagation();tarPosponer('${t.id}',1)">+1d</button>`;
    if(activa && (recibida||admin)) btns += `<button class="btn btn-ghost btn-sm" title="Marcar hecha" onclick="event.stopPropagation();tarMarcar('${t.id}','Hecha')">Hecha</button>`;
    return `<div onclick="openTarDet('${t.id}')" style="cursor:pointer;display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-left:3px solid ${col};border-radius:8px;padding:7px 10px;${tach}">
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${tarNuevosPara(t,me)?'<span style="color:#6E8E00">● </span>':''}${t.horaInicio?`<span style="color:#5A6770;font-weight:700">${incEsc(t.horaInicio)} </span>`:''}${incEsc(t.titulo)}${(t.serieId||t.recurrencia)?' <span title="Recurrente" style="color:#8A949B">⟳</span>':''}</div>
        <div class="muted" style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${incEsc(quien)}${(t.area&&t.area!=='General')?' · '+incEsc(t.area):''}${t.estado==='En espera'?' · <span style="color:#8A5A00;font-weight:600">en espera</span>':''}</div>
      </div>
      <div onclick="event.stopPropagation()" style="display:flex;gap:6px;flex-shrink:0">${btns}</div>
    </div>`;
  };
  const bandas=[];
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(mon.getDate()+i); const iso=tarIso(d);
    const esHoy=iso===todayStr();
    const dia=mias.filter(t=>t.fechaLimite===iso).sort((a,b)=>TAR_PRIOS.indexOf(a.prioridad)-TAR_PRIOS.indexOf(b.prioridad));
    const tareas = dia.length ? dia.map(tarjeta).join('') : '<div class="muted" style="font-size:12px;padding:3px 0">Sin tareas</div>';
    bandas.push(`<div style="display:flex;gap:12px;align-items:flex-start;background:${esHoy?'#F4F0E9':'#FAF8F3'};border:1px solid ${esHoy?'#B8A88F':'var(--line)'};border-radius:10px;padding:10px 12px;margin-bottom:8px">
      <div style="flex:0 0 64px;font-size:12px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;color:${esHoy?'#333F48':'#8A949B'};padding-top:2px">
        ${TAR_DOW[i]} ${d.getDate()}${esHoy?'<div style="font-size:10px;color:#6E8E00;margin-top:1px">HOY</div>':''}
      </div>
      <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:6px">${tareas}</div>
    </div>`);
  }
  const sinFecha=mias.filter(t=>!t.fechaLimite && tarActiva(t)).sort((a,b)=>TAR_PRIOS.indexOf(a.prioridad)-TAR_PRIOS.indexOf(b.prioridad));
  const bloqueSinFecha = sinFecha.length ? `<div style="display:flex;gap:12px;align-items:flex-start;background:#FAF8F3;border:1px dashed var(--line);border-radius:10px;padding:10px 12px;margin-top:4px">
      <div style="flex:0 0 64px;font-size:12px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;color:#8A949B;padding-top:2px">Sin fecha</div>
      <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:6px">${sinFecha.map(tarjeta).join('')}</div>
    </div>` : '';
  return nav+bandas.join('')+bloqueSinFecha;
}

/* ---- resumen del día / panel de equipo ---- */
function setTarResPeriodo(p){ S.tarResPeriodo=p; render(); }
function tarSemRango(){ const mon=tarMonday(0); const dom=new Date(mon); dom.setDate(mon.getDate()+6); return [tarIso(mon), tarIso(dom)]; }
function tarTiemposDe(persona, desde, hasta){
  const out=[];
  (S.tareas||[]).forEach(t=>{ (Array.isArray(t.tiempos)?t.tiempos:[]).forEach(e=>{
    if(persona && e.quien!==persona) return;
    const f=e.fecha||'';
    if(desde && f<desde) return;
    if(hasta && f>hasta) return;
    out.push({min:Number(e.min)||0, fecha:f, area:t.area||'General', titulo:t.titulo, quien:e.quien});
  });});
  return out;
}
function tarBar(label, valueLabel, pct, color){
  return `<div style="margin-bottom:9px">
    <div style="display:flex;justify-content:space-between;gap:10px;font-size:13px;margin-bottom:3px"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${incEsc(label)}</span><span style="color:#5A6770;white-space:nowrap;font-weight:600">${valueLabel}</span></div>
    <div style="background:#EFEAE0;border-radius:6px;height:10px;overflow:hidden"><div style="width:${Math.max(pct,2)}%;height:100%;background:${color}"></div></div>
  </div>`;
}
function tarResKpi(label, value, color){ return `<div style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 16px;min-width:104px"><div style="font-size:12px;color:#8A949B">${label}</div><div style="font-size:24px;font-weight:700;${color?`color:${color}`:''}">${value}</div></div>`; }
function tarMiResumen(me, desde, hasta, perLabel){
  const ent=tarTiemposDe(me, desde, hasta);
  const total=ent.reduce((s,e)=>s+e.min,0);
  const porHacer=(S.tareas||[]).filter(t=>t.paraQuien===me && tarPorHacer(t)).length;
  const espera=(S.tareas||[]).filter(t=>t.paraQuien===me && t.estado==='En espera').length;
  const terminadas=(S.tareas||[]).filter(t=>t.paraQuien===me && t.estado==='Hecha' && t.fechaHecha && t.fechaHecha>=desde && t.fechaHecha<=hasta).length;
  const areaMap={}; ent.forEach(e=>{ areaMap[e.area]=(areaMap[e.area]||0)+e.min; });
  const areas=Object.entries(areaMap).sort((a,b)=>b[1]-a[1]);
  const maxA=areas.length?areas[0][1]:0;
  const areasHtml = areas.length? areas.map(([a,m])=>tarBar(a, tarFmtMin(m), maxA?Math.round(m/maxA*100):0, '#6E8E00')).join('') : '<div class="muted" style="font-size:13px">No has registrado tiempo en este periodo. Apúntalo desde el detalle de cada tarea.</div>';
  const kpis=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
    ${tarResKpi('Tiempo '+perLabel, tarFmtMin(total), '#6E8E00')}
    ${tarResKpi('Terminadas', terminadas, '#333F48')}
    ${tarResKpi('Por hacer', porHacer, '#333F48')}
    ${tarResKpi('En espera', espera, '#8A5A00')}
  </div>`;
  return `<div style="background:#FAF8F3;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:18px">
    <div style="font-family:var(--serif);font-size:18px;margin-bottom:12px">Tu resumen · ${perLabel}</div>
    ${kpis}
    <div style="font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:#8A949B;margin-bottom:10px">En qué has invertido el tiempo (por área)</div>
    ${areasHtml}
  </div>`;
}
function tarEquipoPanel(desde, hasta, perLabel){
  const people=[...new Set((S.tareas||[]).flatMap(t=>[t.paraQuien,t.deQuien]).filter(Boolean).concat(USERS.map(u=>u.nombre)))];
  const datos=people.map(p=>{
    const ent=tarTiemposDe(p, desde, hasta);
    const tiempo=ent.reduce((s,e)=>s+e.min,0);
    const porHacer=(S.tareas||[]).filter(t=>t.paraQuien===p && tarPorHacer(t)).length;
    const vencidas=(S.tareas||[]).filter(t=>t.paraQuien===p && tarVencida(t)).length;
    const espera=(S.tareas||[]).filter(t=>t.paraQuien===p && t.estado==='En espera').length;
    const terminadas=(S.tareas||[]).filter(t=>t.paraQuien===p && t.estado==='Hecha' && t.fechaHecha && t.fechaHecha>=desde && t.fechaHecha<=hasta).length;
    return {p,tiempo,porHacer,vencidas,espera,terminadas};
  });
  const porTiempo=[...datos].sort((a,b)=>b.tiempo-a.tiempo);
  const maxT=porTiempo.length?porTiempo[0].tiempo:0;
  const tiempoPersona = porTiempo.some(d=>d.tiempo>0)

/* ---- "% de estar al día" (privado, una sola métrica) ---- */
function tarAlDiaStats(){
  const me=S.user.nombre, hoy=todayStr();
  // universo: lo que es tuyo y puedes hacer (las hechas se archivan; la espera depende de otros)
  const universo=(S.tareas||[]).filter(t=> t.paraQuien===me && t.estado!=='Hecha' && t.estado!=='En espera');
  const vencidas=universo.filter(t=> t.fechaLimite && t.fechaLimite<hoy).length;   // de días anteriores
  const hoyN=universo.filter(t=> t.fechaLimite && t.fechaLimite===hoy).length;     // de hoy sin hacer
  const pendientes=vencidas+hoyN;   // lo que debería estar hecho a día de hoy
  const total=universo.length;
  const pct = total>0 ? Math.round((total-pendientes)/total*100) : 100;
  return {total, vencidas, hoy:hoyN, pendientes, pct};
}
function tarAlDiaCard(){
  const s=tarAlDiaStats();
  const v=s.vencidas, h=s.hoy;
  let label, sub, color;
  if(s.pendientes===0){
    color='#6E8E00';
    if(s.total){ label='¡Al día!'; sub='No te queda nada ni de antes ni de hoy. Así da gusto.'; }
    else { label='Todo despejado'; sub='No tienes tareas pendientes ahora mismo. Buen momento para adelantar algo.'; }
  } else if(v===0){
    // nada atrasado, solo queda lo de hoy: vas en hora, pero aún no al día
    color='#B8860B'; label='A por lo de hoy';
    sub=`Te queda${h===1?'':'n'} ${h} ${h===1?'tarea':'tareas'} para hoy. Ciérrala${h===1?'':'s'} y llegas al 100%.`;
  } else {
    // hay tareas atrasadas
    color = s.pct>=50 ? '#B8860B' : '#C0392B';
    label='A ponerse al día';
    sub = h>0
      ? `${v} ${v===1?'atrasada':'atrasadas'} y ${h} para hoy. Empieza por las atrasadas.`
      : `Tienes ${v} ${v===1?'tarea atrasada':'tareas atrasadas'} que ya deberían estar hechas. Empieza por una y ve restando.`;
  }
  const bar=`<div style="height:10px;background:#EAE3D7;border-radius:6px;overflow:hidden;margin:8px 0 4px"><div style="height:100%;width:${s.pct}%;background:${color};transition:width .4s"></div></div>`;
  return `<div style="background:#F7F4EE;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">
      <div style="font-size:15px;font-weight:800;color:${color}">${label}</div>
      <div style="font-size:24px;font-weight:800;color:${color}">${s.pct}%</div>
    </div>${bar}
    <div style="font-size:13px;color:#8A949B">${sub}</div>
  </div>`;
}

function tarDoDelete(id, scope){
  const t=(S.tareas||[]).find(x=>x.id===id); if(!t){ S.tarDelId=null; render(); return; }
  let ids=[id];
  if(t.serieId && scope!=='una'){
    ids = tarSerieHermanas(t.serieId).filter(x=> scope==='todas' || (x.fechaLimite||'') >= (t.fechaLimite||'') ).map(x=>x.id);
    if(!ids.includes(id)) ids.push(id);
  }
  const set=new Set(ids);
  S.tareas=S.tareas.filter(x=>!set.has(x.id));
  S.tarDelId=null; render();
  if(ids.length===1) srvTarDelete(ids[0], 'Tarea eliminada');
  else srvTarDeleteMany(ids, `${ids.length} tareas eliminadas`);
}
async function srvTarDeleteMany(ids, okMsg){
  if(!ids||!ids.length) return;
  try{
    const { error } = await sbc.from('tar_tareas').delete().in('id', ids);
    if(error) throw error;
  }catch(e){ console.error('srvTarDeleteMany', e); await syncAll(); toast('Error al eliminar: '+(e.message||e)); return; }
  await loadFromDB(); render(); if(okMsg) toast(okMsg);
}

function tarReglaDesdeForm(){
  const tipo=F.recurTipo||'no'; if(tipo==='no') return null;
  const r={tipo:tipo, hasta:(F.recurHasta||'')||null};
  if(tipo==='semanal'){ let dias=Array.isArray(F.recurDias)?F.recurDias.slice():[]; if(!dias.length && F.fechaLimite) dias=[tarDow(F.fechaLimite)]; r.dias=dias.sort((a,b)=>a-b); }
  if(tipo==='mensual'){ r.diaMes = F.fechaLimite?tarDParse(F.fechaLimite).getDate():1; }
  return r;
}
function commitTarea(){
  if(!tarValid()) return;
  const base={ titulo:(F.titulo||'').trim(), descripcion:(F.descripcion||'').trim(),
    prioridad:F.prioridad||'Media', area:F.area||'General', deQuien:S.user.nombre, paraQuien:F.paraQuien,
    horaInicio:F.horaInicio||'', horaFin:F.horaFin||'' };
  const rule=tarReglaDesdeForm();
  if(rule){
    const start=F.fechaLimite;
    const until = rule.hasta || tarAddDias(todayStr(), TAR_RECUR_HORIZON);
    const startGen = (start>=todayStr()) ? start : todayStr();
    let fechas=tarSerieFechas(rule, startGen, until);
    if(!fechas.length) fechas=[start];
    const serieId='S'+Date.now().toString(36)+Math.floor(Math.random()*1000);
    const nuevas=fechas.map(f=>Object.assign({}, base, { id:serieId+'_'+f, fechaLimite:f, serieId, recurrencia:rule, estado:'Pendiente', ts:now(), fechaHecha:null, mensajes:[], vistos:{}, tiempos:[], adjuntos:[] }));
    // los adjuntos del formulario van solo en la primera instancia
    if(Array.isArray(F.adjuntos)&&F.adjuntos.length) nuevas[0].adjuntos=F.adjuntos.slice();
    nuevas.forEach(t=>S.tareas.unshift(t)); closeModal(); render();
    srvTarInsertMany(nuevas, `Serie creada · ${nuevas.length} tareas`);
    const _primer = (base.paraQuien||'').split(' ')[0];
    const _emo = base.prioridad==='Alta'?'🔴':(base.prioridad==='Baja'?'🟢':'🟡');
    let _txt = `🔁 Hola ${_primer}, ${base.deQuien} te ha asignado una tarea que se repite:\n\n${base.titulo}\n${_emo} ${base.prioridad} · ${tarRecurLabel(rule)} · ${nuevas.length} fechas`;
    if(base.descripcion) _txt += `\n\n${base.descripcion}`;
    _txt += `\n\nLa tienes en Lucai, en Tareas.`;
    tgNotify(base.paraQuien, _txt);
    return;
  }
  const t=Object.assign({}, base, { id:F.id||uid(), fechaLimite:F.fechaLimite, serieId:null, recurrencia:null,
    estado:'Pendiente', ts:now(), fechaHecha:null, mensajes:[], vistos:{}, tiempos:[], adjuntos:Array.isArray(F.adjuntos)?F.adjuntos:[] });
  S.tareas.unshift(t); closeModal(); render();
  srvTarInsert(t, 'Tarea enviada');
  const _primer = (t.paraQuien||'').split(' ')[0];
  const _emo = t.prioridad==='Alta'?'🔴':(t.prioridad==='Baja'?'🟢':'🟡');
  const _meta = [`${_emo} ${t.prioridad||'Media'}`];
  if(t.area && t.area!=='General') _meta.push(t.area);
  if(t.fechaLimite) _meta.push(`📅 ${fmtFecha(t.fechaLimite)}`);
  if(t.horaInicio) _meta.push(`${t.horaInicio}${t.horaFin?'–'+t.horaFin:''}`);
  let _txt = `📋 Hola ${_primer}, ${t.deQuien} te ha asignado una tarea:\n\n${t.titulo}\n${_meta.join(' · ')}`;
  if(t.descripcion) _txt += `\n\n${t.descripcion}`;
  _txt += `\n\nLa tienes en Lucai, en Tareas.`;
  tgNotify(t.paraQuien, _txt);
}

async function srvTarUpdateMany(ids, fields, okMsg){
  if(!ids || !ids.length) return;
  try{
    const { error } = await sbc.from('tar_tareas').update(fields).in('id', ids);
    if(error) throw error;
  }catch(e){ console.error('srvTarUpdateMany', e); await syncAll(); toast('Error al guardar la serie: '+(e.message||e)); return; }
  await loadFromDB(); render(); if(okMsg) toast(okMsg);
}
function commitTarEdit(scope){
  scope=scope||'una';
  if(!tarValid()) return;
  const t=(S.tareas||[]).find(x=>x.id===F.id); if(!t) return;
  const cont={ titulo:(F.titulo||'').trim(), descripcion:(F.descripcion||'').trim(), prioridad:F.prioridad||'Media', area:F.area||'General', paraQuien:F.paraQuien, horaInicio:F.horaInicio||'', horaFin:F.horaFin||'' };
  // aplicar siempre a esta tarea (incluida su fecha, si soy el emisor)
  Object.assign(t, cont);
  if(t.deQuien===S.user.nombre) t.fechaLimite=F.fechaLimite;
  if(scope==='una' || !t.serieId){
    closeModal(); render();
    srvTarUpdate(t.id, t, 'Tarea actualizada');
    return;
  }
  // propagar a la serie (contenido, NO fecha/estado)
  const hermanas=tarSerieHermanas(t.serieId).filter(x=> x.id!==t.id && (scope==='todas' || (x.fechaLimite||'') >= (t.fechaLimite||'')) );
  hermanas.forEach(x=> Object.assign(x, cont));
  const ids=hermanas.map(x=>x.id);
  const fields={ titulo:cont.titulo, descripcion:cont.descripcion||null, prioridad:cont.prioridad, area:cont.area, para_quien:cont.paraQuien, hora_inicio:cont.horaInicio||null, hora_fin:cont.horaFin||null };
  closeModal(); render();
  // esta tarea por separado (puede llevar fecha distinta), y el resto en lote
  (async()=>{
    await srvTarUpdate(t.id, t);
    if(ids.length) await srvTarUpdateMany(ids, fields);
    toast(scope==='todas'?`Serie actualizada · ${ids.length+1} tareas`:`Actualizadas ${ids.length+1} tareas`);
  })();
}

function iaContexto(pregunta){
  const me = S.user.nombre;
  const admin = (typeof isAdmin==='function') ? isAdmin() : false;
  const pregLow = (pregunta||'').toLowerCase();
  const enMaterial = (S.module==='material');
  const quiereMaterial = enMaterial || /(material|almac|stock|inventar|pedir|pedido|provee|caduc|unidad|art[ií]culo|reponer|existencias|comprar|caja|valor almac)/i.test(pregLow);
  /* ¿La pregunta va de tareas HECHAS / cerradas o de una fecha pasada? Si sí, soltamos el
     historial completo (sin tope de 7 días); si no, solo un resumen reciente, para no inflar el prompt. */
  const quiereHistorial = /(hech|termin|complet|cerr|finaliz|acab|entreg|hist[oó]ri|el mes|mes pasado|semana pasada|ayer|anteayer|a[ñn]o pasado|desde el|entre el|\d{4})/i.test(pregLow);
  const hoy = (typeof todayStr==='function') ? todayStr() : new Date().toISOString().slice(0,10);
  const activa = t => (typeof tarActiva==='function' ? tarActiva(t) : t.estado!=='Hecha');
  const temp = f => !f ? 'sin fecha' : (f<hoy?'VENCIDA':(f===hoy?'VENCE HOY':'futura'));
  const dias = f => { if(!f) return null; return Math.round((new Date(f+'T00:00:00')-new Date(hoy+'T00:00:00'))/86400000); };
  const dsc = t => { const d=(t.descripcion||'').trim(); return d ? ` | nota: "${d.length>320?d.slice(0,320)+'…':d}"` : ''; };
  const out = [];

  out.push(`HOY es ${hoy}. Úsala para saber qué está VENCIDA (fecha anterior a hoy), qué VENCE HOY y qué es futura. "Vencida", "pasada" o "atrasada" significan lo mismo.`);
  out.push(`Usuario: ${me}${admin?' (Dirección)':''}.`);

  /* Módulos a los que ESTA persona tiene acceso ahora mismo. Se deriva de
     MODULES + canAccess, así Lucai orienta sin inventar y se mantiene al día
     solo si añades módulos nuevos. Complementa al system prompt, no lo repite. */
  const modList = (typeof MODULES!=='undefined' ? MODULES : [])
    .filter(m=> m.id!=='asistente')
    .map(m=>{
      const acc = (typeof canAccess==='function') ? canAccess(m.id) : true;
      const estado = m.estado==='pronto' ? 'en construcción' : 'activo';
      return `- ${m.nombre} [${estado}] -> ${acc ? 'tiene acceso' : 'sin acceso (lo lleva Dirección)'}`;
    });
  out.push('\n[MÓDULOS DE LA PLATAFORMA · acceso de esta persona ahora]');
  out.push(modList.length ? modList.join('\n') : '(no hay módulos cargados)');

  /* Comunicaciones (avisos del equipo) SIN LEER por esta persona.
     El system prompt pide avisar de esto; aquí le pasamos el dato real. */
  const comAll = (S.comunicaciones||[]).filter(c=> (c.para||[]).includes(me));
  const comNoLeidas = comAll.filter(c=> !(typeof comLeida==='function' ? comLeida(c,me) : (c.leidos&&c.leidos[me])));
  out.push(`\n[COMUNICACIONES] ${comNoLeidas.length} sin leer de ${comAll.length} dirigidas a ti.`);
  if(comNoLeidas.length){
    comNoLeidas.slice(0,15).forEach(c=> out.push(`- SIN LEER: "${c.titulo||'(sin título)'}" | de: ${c.deQuien||'—'} | ${c.categoria||'General'} · ${c.prioridad||'Normal'} | ${c.ts||'?'}`));
    if(comNoLeidas.length>15) out.push(`...y ${comNoLeidas.length-15} más sin leer.`);
  }

  /* TEMAS de coordinación visibles para esta persona (hilos de equipo, sin datos de pacientes).
     Respeta la privacidad: solo los temas en los que participa quien pregunta. */
  const temasVis = (S.temas||[]).filter(t=> (typeof temaVisible==='function')?temaVisible(t):true);
  const temasAb = temasVis.filter(t=> t.estado!=='cerrado');
  out.push(`\n[TEMAS DE COORDINACIÓN] ${temasAb.length} abiertos · ${temasVis.length} visibles para ti. Hilos del equipo (sin datos de pacientes). Si te piden un resumen de un tema, hazlo con lo de aquí.`);
  temasVis.slice(0,15).forEach(t=>{
    out.push(`\n• TEMA "${t.titulo||'(sin título)'}" [${t.estado||'abierto'}] | abrió: ${t.autor||'—'} | participantes: ${(t.participantes||[]).join(', ')||'—'}${t.descripcion?` | descripción: ${t.descripcion}`:''}`);
    const msgs=Array.isArray(t.mensajes)?t.mensajes:[];
    if(!msgs.length) out.push('  (sin mensajes todavía)');
    else msgs.slice(-20).forEach(m=>{ const tx=(m.texto||'').replace(/\s+/g,' ').trim(); out.push(`  - ${m.de||'—'}: ${tx.length>240?tx.slice(0,240)+'…':(tx||'(imagen)')}`); });
  });
  if(temasVis.length>15) out.push(`...y ${temasVis.length-15} temas más.`);

  const recib = (S.tareas||[]).filter(t=> t.paraQuien===me);
  const act = recib.filter(activa);
  const porHacer = act.filter(t=>t.estado!=='En espera');
  const espera = act.filter(t=>t.estado==='En espera');
  const venc = porHacer.filter(t=> t.fechaLimite && t.fechaLimite<hoy);
  const hoyT = porHacer.filter(t=> t.fechaLimite===hoy);
  out.push(`\n[RESUMEN] ${porHacer.length} por hacer · ${espera.length} en espera de otros · ${venc.length} vencidas · ${hoyT.length} para hoy.`);

  out.push('\n[MIS TAREAS POR HACER] (dependen de mí ahora)');
  if(!porHacer.length) out.push('(ninguna)');
  else porHacer.forEach(t=>{ const d=dias(t.fechaLimite); const det = d!=null ? (d<0?`, hace ${-d} d`:(d===0?', hoy':`, en ${d} d`)) : ''; out.push(`- ${t.titulo} | área: ${t.area||'General'} | prioridad: ${t.prioridad||'Media'} | vence: ${t.fechaLimite||'sin fecha'} (${temp(t.fechaLimite)}${det}) | estado: ${t.estado||'Pendiente'} | la mandó: ${t.deQuien||'—'} | tiempo ya dedicado: ${tarFmtMin(tarTotalMin(t))}${dsc(t)}`); });

  out.push('\n[EN ESPERA DE OTROS] (ya hice mi parte, espero respuesta)');
  if(!espera.length) out.push('(ninguna)');
  else espera.forEach(t=> out.push(`- ${t.titulo} | área: ${t.area||'General'} | vence: ${t.fechaLimite||'sin fecha'} (${temp(t.fechaLimite)})${dsc(t)}`));

  const d7=new Date(hoy+'T00:00:00'); d7.setDate(d7.getDate()-7); const hace7=d7.toISOString().slice(0,10);
  const hechasRec = recib.filter(t=> t.estado==='Hecha' && t.fechaHecha && t.fechaHecha>=hace7);
  if(quiereHistorial){
    const hechasAll = recib.filter(t=> t.estado==='Hecha' && t.fechaHecha).sort((a,b)=> String(b.fechaHecha).localeCompare(String(a.fechaHecha)));
    out.push('\n[MIS TAREAS TERMINADAS · historial completo]');
    out.push('(Me preguntas por tareas hechas: te paso TODAS las que has cerrado, con su fecha. Filtra tú por el periodo que necesites — cualquier día, mes o año.)');
    if(!hechasAll.length) out.push('(ninguna)');
    else { hechasAll.slice(0,300).forEach(t=> out.push(`- ${t.titulo} (${t.fechaHecha}) | área: ${t.area||'General'} | la mandó: ${t.deQuien||'—'}`)); if(hechasAll.length>300) out.push(`...y ${hechasAll.length-300} más antiguas no listadas.`); }
  } else {
    out.push('\n[TERMINADAS · últimos 7 días]');
    out.push('(Solo el resumen reciente. Si me preguntas por una fecha, "el mes pasado", etc., te saco todas.)');
    out.push(hechasRec.length ? hechasRec.map(t=>`- ${t.titulo} (${t.fechaHecha})`).join('\n') : '(ninguna)');
  }

  const emit = (S.tareas||[]).filter(t=> t.deQuien===me && t.paraQuien!==me && activa(t));
  out.push('\n[TAREAS QUE YO HE ENCARGADO A OTROS]');
  if(!emit.length) out.push('(ninguna)');
  else emit.forEach(t=> out.push(`- ${t.titulo} | área: ${t.area||'General'} | para: ${t.paraQuien||'—'} | vence: ${t.fechaLimite||'sin fecha'} (${temp(t.fechaLimite)}) | estado: ${t.estado||'Pendiente'}${dsc(t)}`));

  /* Encargadas que YA están hechas: solo cuando preguntan por historial (¿le mandé X y está hecho?, qué cerró tal mes…). */
  if(quiereHistorial){
    const emitHechas = (S.tareas||[]).filter(t=> t.deQuien===me && t.paraQuien!==me && t.estado==='Hecha' && t.fechaHecha).sort((a,b)=> String(b.fechaHecha).localeCompare(String(a.fechaHecha)));
    out.push('\n[ENCARGADAS QUE YA ESTÁN HECHAS] (las que mandaste y se completaron · cualquier fecha)');
    if(!emitHechas.length) out.push('(ninguna)');
    else { emitHechas.slice(0,200).forEach(t=> out.push(`- ${t.titulo} | para: ${t.paraQuien||'—'} | hecha: ${t.fechaHecha} | área: ${t.area||'General'}`)); if(emitHechas.length>200) out.push(`...y ${emitHechas.length-200} más.`); }
  }

  /* ===== CARGA DEL EQUIPO · SOLO DIRECCIÓN =====
     Mismo criterio de rol que [PRESUPUESTOS RECHAZADOS]: solo admin (Director/Directora).
     A un usuario normal NO se le añade nada: arriba sigue viendo solo lo suyo y lo que le han encargado.
     Resumen de contadores por persona siempre (barato); el detalle de tareas por persona solo se
     despliega cuando la pregunta lo pide (un nombre del equipo, palabras de carga, o historial),
     igual que el módulo de material. Sin datos de pacientes (las tareas no los llevan). */
  if(admin){
    const equipo = [...new Set(
      (typeof USERS!=='undefined' ? USERS.map(u=>u.nombre) : [])
        .concat((S.tareas||[]).flatMap(t=>[t.paraQuien, t.deQuien]))
        .filter(Boolean)
    )];
    const porHacerDe = t => (typeof tarPorHacer==='function') ? tarPorHacer(t) : (t.estado!=='Hecha' && t.estado!=='En espera');
    const vencidaDe  = t => (typeof tarVencida==='function')  ? tarVencida(t)  : (t.estado!=='Hecha' && t.fechaLimite && t.fechaLimite<hoy);
    const nombreEnPreg = equipo.some(p=>{
      if(!p) return false;
      if(pregLow.includes(p.toLowerCase())) return true;
      const n=(p.split(' ')[0]||'').toLowerCase();
      return n.length>=3 && new RegExp('\\b'+n.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).test(pregLow);
    });
    const quiereEquipo = /(equipo|carga|cargas|saturad|sobrecarg|reparto|cada persona|cada uno|por persona|qui[eé]n tiene|qui[eé]n lleva|qui[eé]n est[aá]|vencidas por|nadie|alguien|todos|m[aá]s ocupad|menos ocupad|cumpl|rinde|rendimiento|al d[ií]a|c[oó]mo va|c[oó]mo est|marcha|balance|van bien|van mal|se est[aá] cumpliendo)/i.test(pregLow);
    const detallar = nombreEnPreg || quiereEquipo || quiereHistorial;

    const filas = equipo.map(p=>{
      const suyas = (S.tareas||[]).filter(t=> t.paraQuien===p);
      return {
        p,
        ph: suyas.filter(porHacerDe).length,
        ve: suyas.filter(vencidaDe).length,
        es: suyas.filter(t=> t.estado==='En espera').length,
        he7: suyas.filter(t=> t.estado==='Hecha' && t.fechaHecha && t.fechaHecha>=hace7).length
      };
    }).sort((a,b)=> (b.ph-a.ph) || (b.ve-a.ve));

    out.push('\n[CÓMO RESPONDER A DIRECCIÓN] Cuando te pregunten en general cómo va la carga del equipo, si la gente cumple, quién va bien o mal, o un balance, responde con CONCLUSIONES y valoración (3-6 frases), NO con un listado de tareas: di si el reparto está equilibrado o hay cuellos de botella, quién está sobrecargado, quién acumula vencidas (señal de que no llega a tiempo), quién va al día, y cierra con una recomendación accionable si procede. Para juzgar el cumplimiento fíjate en las vencidas (retraso) y en la proporción de hechas frente a lo pendiente. Solo enumera tareas concretas si te las piden de forma explícita o si nombran a una persona.');
    out.push('\n[CARGA DEL EQUIPO · solo Dirección] (todas las tareas del equipo · sin datos de pacientes)');
    out.push('Resumen por persona, ordenado de más a menos cargado. "por hacer" = pendientes que dependen de esa persona · "vencidas" = ya pasadas de fecha · "en espera" = esperando a otro · "hechas7d" = cerradas en los últimos 7 días.');
    if(!filas.length) out.push('(no hay personas ni tareas registradas)');
    else filas.forEach(f=> out.push(`- ${f.p}: ${f.ph} por hacer · ${f.ve} vencidas · ${f.es} en espera · ${f.he7} hechas (7d)`));

    if(detallar){
      const TOPE_P = 25;
      out.push('\n[DETALLE POR PERSONA · solo Dirección]');
      out.push('(Tareas activas de cada persona — y las hechas si preguntas por ellas — para poder responder qué lleva cada uno, qué tiene vencido o qué cerró. Filtra tú por la persona o la fecha que te pidan.)');
      equipo.forEach(p=>{
        const suyas = (S.tareas||[]).filter(t=> t.paraQuien===p);
        const activasP = suyas.filter(t=> porHacerDe(t) || t.estado==='En espera').sort((a,b)=> String(a.fechaLimite||'9999').localeCompare(String(b.fechaLimite||'9999')));
        const hechasP = quiereHistorial ? suyas.filter(t=> t.estado==='Hecha' && t.fechaHecha).sort((a,b)=> String(b.fechaHecha).localeCompare(String(a.fechaHecha))) : [];
        if(!activasP.length && !hechasP.length){ out.push(`\n• ${p}: (sin tareas)`); return; }
        out.push(`\n• ${p}:`);
        activasP.slice(0,TOPE_P).forEach(t=>{ const d=dias(t.fechaLimite); const det = d!=null ? (d<0?`, hace ${-d} d`:(d===0?', hoy':`, en ${d} d`)) : ''; out.push(`  - ${t.titulo} | prioridad: ${t.prioridad||'Media'} | vence: ${t.fechaLimite||'sin fecha'} (${temp(t.fechaLimite)}${det}) | estado: ${t.estado||'Pendiente'} | se la mandó: ${t.deQuien||'—'}`); });
        if(activasP.length>TOPE_P) out.push(`  ...y ${activasP.length-TOPE_P} activas más.`);
        if(hechasP.length){
          out.push('  · Hechas:');
          hechasP.slice(0,TOPE_P).forEach(t=> out.push(`    - ${t.titulo} (${t.fechaHecha}) | se la mandó: ${t.deQuien||'—'}`));
          if(hechasP.length>TOPE_P) out.push(`    ...y ${hechasP.length-TOPE_P} hechas más.`);
        }
      });
    } else {
      out.push('(Para ver el detalle de una persona —qué lleva, qué tiene vencido, qué cerró— nómbrala o pregunta por la carga del equipo.)');
    }
  }

  const incsAll = (S.incidencias||[]);
  const incsPend = incsAll.filter(i=> !i.revisada);
  const incFecha = i => (i.fecha||i.ts||'').slice(0,10);
  const incsHoy = incsAll.filter(i=> incFecha(i)===hoy);
  const sobreInc = pregLow.includes('incidencia');
  const TOPE_INC = sobreInc ? 500 : 40;
  out.push(`\n[INCIDENCIAS] ${incsAll.length} en total · ${incsPend.length} sin revisar · ${incsHoy.length} registrada${incsHoy.length===1?'':'s'} HOY (${hoy}). El texto es interno del equipo; no incluye el código ni el nombre del paciente.`);
  out.push('IMPORTANTE sobre fechas de incidencias: cada incidencia lleva su propia fecha. NO asumas que una incidencia es de hoy: solo son "de hoy" las que aparecen contadas en el campo "registradas HOY". "Sin revisar" NO significa "de hoy" (una incidencia antigua puede seguir sin revisar). Si no hay ninguna registrada hoy, dilo claramente y, si procede, menciona la fecha real de las que comentes.');
  if(sobreInc) out.push('(El usuario pregunta por incidencias: te paso el detalle de TODAS las disponibles, no solo las recientes. Responde con confianza sobre cualquiera de ellas.)');
  if(!incsAll.length) out.push('(no hay incidencias registradas)');
  else {
    incsAll.slice(0,TOPE_INC).forEach(i=>{
      const est = i.revisada ? ('REVISADA'+(i.revPor?(' por '+i.revPor):'')) : 'SIN REVISAR';
      let li = `- [${est}] ${i.fecha||i.ts||'?'} | categoría: ${i.categoria||'—'} | importancia: ${i.importancia||'—'} | la reportó: ${i.reporta||'—'}`;
      if(i.detalle) li += `\n   Qué pasó: ${i.detalle}`;
      if(i.sugerencia) li += `\n   Sugerencia de quien la reportó: ${i.sugerencia}`;
      if(i.revisada && i.notaDir) li += `\n   Resolución (Dirección): ${i.notaDir}`;
      out.push(li);
    });
    if(incsAll.length>TOPE_INC) out.push(`...y ${incsAll.length-TOPE_INC} incidencias más antiguas no listadas aquí.`);
  }

  if(admin){
    const pres = (S.presupuestos||[]);
    out.push('\n[PRESUPUESTOS RECHAZADOS] (solo Dirección · sin datos de pacientes)');
    if(!pres.length) out.push('(ninguno registrado)');
    else {
      const total = pres.reduce((s,p)=> s + (Number(p.importe)||0), 0);
      out.push(`Total: ${pres.length} rechazos · importe perdido aprox. ${total} €.`);
      pres.slice(0,40).forEach(p=> out.push(`- ${p.fechaRechazo||p.fechaPresup||'?'} | área: ${p.area||'—'} | importe: ${Number(p.importe)||0} € | doctor: ${p.doctor||'—'} | coord.: ${p.coordinadora||'—'} | motivos: ${(p.motivos||[]).join('; ')||'—'}`));
      if(pres.length>40) out.push(`...y ${pres.length-40} más.`);
    }
  }

  const arts = (typeof activeArts==='function') ? activeArts() : (S.articulos||[]).filter(a=>a.activo!==false);
  out.push('\n[MATERIAL / ALMACÉN] (almacén único de la clínica · sin datos de pacientes)');
  if(!arts.length) out.push('(no hay artículos registrados)');
  else {
    const valor = arts.reduce((s,a)=> s + (Number(a.stock)||0)*(Number(a.cost)||0), 0);
    const pedir = (typeof lowItems==='function') ? lowItems() : arts.filter(a=>a.aviso!==false && a.stock<=a.min);
    const sinStock = arts.filter(a=> (Number(a.stock)||0)===0);
    const cad = (typeof cadItems==='function') ? cadItems() : [];
    const pedPend = (S.pedidos||[]).filter(p=> p.estado!=='recibido');
    out.push(`Resumen: ${arts.length} artículos activos · valor almacenado ≈ ${Math.round(valor)} € · ${pedir.length} para pedir · ${sinStock.length} sin stock · ${cad.length} por caducar/caducados · ${pedPend.length} pedidos sin recibir.`);

    if(!quiereMaterial){
      out.push('(Resumen de material. Si te preguntan algo más concreto del almacén — qué hay que pedir, qué caduca, stock de un artículo, pedidos, proveedores — pide que abran el módulo de Material o que lo pregunten con esas palabras para ver el detalle.)');
    } else {
      out.push('· PARA PEDIR (bajo mínimo):');
      if(!pedir.length) out.push('  (nada bajo mínimo)');
      else pedir.forEach(a=> out.push(`  - ${a.nombre} [${a.cod}] | ${a.categoria||'—'} | stock ${a.stock}/mín ${a.min} | proveedor: ${a.proveedor||'—'}`));

      if(cad.length){
        out.push('· CADUCIDAD (caducado o caduca pronto):');
        cad.forEach(a=>{ const dd=(typeof diasHasta==='function')?diasHasta(a.caduca):null; out.push(`  - ${a.nombre} [${a.cod}] | caduca ${a.caduca} (${dd==null?'?':(dd<0?`caducado hace ${-dd} d`:`en ${dd} d`)}) | stock ${a.stock}`); });
      }

      if(pedPend.length){
        out.push('· PEDIDOS SIN RECIBIR:');
        pedPend.forEach(p=>{ const lin=(p.lineas||[]).map(l=>{ const a=(typeof art==='function')?art(l.cod):null; return `${a?a.nombre:l.cod} x${l.cant}`; }).join(', '); out.push(`  - #${String(p.id).slice(-4)} | ${p.ts||'?'} | proveedor: ${p.proveedor||'—'} | ${lin||'—'}`); });
      }

      out.push('· INVENTARIO COMPLETO (artículo [cód] | categoría | stock/mín | estado | proveedor | precio ref | caduca):');
      arts.slice(0,250).forEach(a=>{ const est=(typeof estadoOf==='function')?estadoOf(a):''; out.push(`  - ${a.nombre} [${a.cod}] | ${a.categoria||'—'} | ${a.stock}/${a.min} | ${est} | ${a.proveedor||'—'} | ${Number(a.precioRef)||0} € | ${a.caduca||'sin caducidad'}`); });
      if(arts.length>250) out.push(`  ...y ${arts.length-250} artículos más (consulta la app para el resto).`);

      if((S.proveedores||[]).length) out.push(`· PROVEEDORES: ${(S.proveedores||[]).join(', ')}.`);

      const movs=(S.movimientos||[]).filter(m=>!m.anulado).slice(0,30);
      if(movs.length){
        out.push('· MOVIMIENTOS RECIENTES (entradas/salidas/mermas · sin datos de pacientes):');
        movs.forEach(m=> out.push(`  - ${m.ts||'?'} | ${m.tipo} | ${m.nombre||m.cod} x${m.cant} | motivo: ${m.motivo||'—'}${m.valorPerdido?` | pérdida ${Math.round(m.valorPerdido)} €`:''} | por: ${m.user||'—'}`));
      }
    }
  }

  return out.join('\n');
}

async function iaSend(textoFijo){
  const box = el('iaInput');
  const q = (textoFijo!=null ? textoFijo : (box ? box.value : '')).trim();
  if(!q || S.iaBusy) return;
  const scrollDown=(force)=>{ const sc=el('iaScroll'); if(!sc) return; const near=(sc.scrollHeight - sc.scrollTop - sc.clientHeight)<80; if(force||near) sc.scrollTop=sc.scrollHeight; };
  try{ if(S._iaCtrl){ S._iaCtrl.abort(); } }catch(_){}
  S.iaChat.forEach(m=>{ m._live=false; });           // nunca dejes una burbuja "en vivo" antigua
  S.iaChat.push({ q:q, a:null });
  S.iaBusy=true; S.iaLoading=true; render(); scrollDown(true); setTimeout(()=>scrollDown(true),30);
  const last = S.iaChat[S.iaChat.length-1];
  const ctrl = (typeof AbortController!=='undefined') ? new AbortController() : null;
  S._iaCtrl = ctrl;
  const killer = setTimeout(()=>{ try{ ctrl && ctrl.abort(); }catch(_){} }, 90000);
  try{
    const r = await fetch(IA_FN, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ pregunta:q, contexto:iaContexto(q), usuario:S.user.nombre }),
      signal: ctrl ? ctrl.signal : undefined
    });
    const ct = (r.headers.get('content-type')||'');
    if(!r.ok || ct.includes('application/json') || !r.body || !r.body.getReader){
      // respuesta entera (error, o función sin streaming): comportamiento clásico
      const data = await r.json().catch(()=>({}));
      clearTimeout(killer);
      last.a = (data && data.respuesta) ? data.respuesta
             : (data && data.error ? ('Vaya, ha habido un error: '+data.error) : 'No he recibido respuesta.');
      last._live=false; S.iaLoading=false; S.iaBusy=false; render(); setTimeout(scrollDown,30); return;
    }
    // streaming: mantenemos "Pensando…" hasta la PRIMERA palabra
    const reader=r.body.getReader(); const dec=new TextDecoder();
    let started=false;
    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      const chunk = dec.decode(value, {stream:true});
      if(!chunk) continue;
      if(!started){ started=true; last.a=''; last._live=true; S.iaLoading=false; render(); scrollDown(true); }
      last.a += chunk;
      const liveEl=document.getElementById('iaLiveMsg');
      if(liveEl){ liveEl.innerHTML=iaFormat(last.a); } else { render(); }
    }
    clearTimeout(killer);
    if(!started){ last.a = last.a || 'No he recibido respuesta.'; S.iaLoading=false; }
    last._live=false; S.iaBusy=false;
    const _kc=el('iaScroll'); const _kt=_kc?_kc.scrollTop:0;
    render();
    const _kc2=el('iaScroll'); if(_kc2) _kc2.scrollTop=_kt;
  }catch(e){
    clearTimeout(killer);
    const abort = e && (e.name==='AbortError');
    last.a = (last.a && last.a.length) ? last.a
           : (abort ? 'Ha tardado demasiado. Inténtalo de nuevo.' : 'No he podido conectar con la IA. Revisa la conexión e inténtalo de nuevo.');
    last._live=false; S.iaLoading=false; S.iaBusy=false; render(); setTimeout(scrollDown,30);
  }
}
function iaSugerencia(t){ iaSend(t); }
function iaLimpiar(){ S.iaChat=[]; render(); }

function iaFormat(t){
  let s = incEsc(t||'');
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');   // **negrita**
  s = s.replace(/(^|\n)\s*[-•]\s+/g, '$1• ');            // viñetas limpias
  s = s.replace(/([^\n])\n(\d+[.)]\s)/g, '$1\n\n$2');           // aire antes de 1. 2. 3.
  s = s.replace(/([^\n])\n(• )/g, '$1\n\n$2');               // aire antes de viñeta
  s = s.replace(/\n{3,}/g, '\n\n');                               // como mucho una linea en blanco
  return s;
}

    h += `<div style="display:flex;justify-content:flex-start;margin:8px 0"><div style="background:#fff;border:1px solid var(--line);border-radius:14px;padding:9px 12px;font-size:14px;color:var(--grey-2)">Pensando…</div></div>`;

function asistenteView(){
  const sugs = (typeof isAdmin==='function' && isAdmin())
    ? ['¿Por dónde empiezo hoy?','¿Qué hay que pedir?','¿Tengo avisos sin leer?','¿Qué puedes hacer por mí?']
    : ['¿Por dónde empiezo hoy?','¿Tengo avisos sin leer?','¿Tengo algo vencido?','¿Qué puedes hacer por mí?'];
  return `${moduleHeader('Asistente de Lucai', false)}
  <main><div class="wrap">

/* persistencia */
const _loadFromDB_com = loadFromDB;
loadFromDB = async function(){
  const _prev=_loadFromDB_com();
  try{
    const r=await sbc.from('comunicaciones').select('*').order('created_at',{ascending:false});
    if(r.data){
      S.comunicaciones=r.data.map(x=>({
        id:x.id, titulo:x.titulo, texto:x.texto, deQuien:x.de_quien,
        categoria:x.categoria||'General', prioridad:x.prioridad||'Normal',
        para: Array.isArray(x.para)?x.para:(function(){ try{ return x.para?JSON.parse(x.para):[]; }catch(_){ return []; } })(),
        leidos: (x.leidos&&typeof x.leidos==='object'&&!Array.isArray(x.leidos))?x.leidos:(function(){ try{ return x.leidos?JSON.parse(x.leidos):{}; }catch(_){ return {}; } })(),
        comentarios: Array.isArray(x.comentarios)?x.comentarios:(function(){ try{ return x.comentarios?JSON.parse(x.comentarios):[]; }catch(_){ return []; } })(),
        ts:x.ts
      }));
    }
  }catch(e){ console.error('loadComunicaciones', e); }
  await _prev;
};
async function srvComInsert(c, okMsg){
  try{
    const { error } = await sbc.from('comunicaciones').insert({
      id:c.id, titulo:c.titulo, texto:c.texto, de_quien:c.deQuien,
      categoria:c.categoria||'General', prioridad:c.prioridad||'Normal',
      para:(c.para||[]), leidos:(c.leidos||{}), comentarios:(c.comentarios||[]), ts:c.ts });
    if(error) throw error;
  }catch(e){ console.error('srvComInsert', e); await syncAll(); toast('Error al guardar: '+(e.message||e)); return; }
  await loadFromDB(); render(); if(okMsg) toast(okMsg);
}
async function srvComUpdate(id, c, okMsg){
  try{
    const { error } = await sbc.from('comunicaciones').update({
      titulo:c.titulo, texto:c.texto, categoria:c.categoria||'General', prioridad:c.prioridad||'Normal', para:(c.para||[]), leidos:(c.leidos||{}), comentarios:(c.comentarios||[]) }).eq('id', id);
    if(error) throw error;
  }catch(e){ console.error('srvComUpdate', e); await syncAll(); toast('Error al guardar: '+(e.message||e)); return; }
  await loadFromDB(); render(); if(okMsg) toast(okMsg);
}
async function srvComDelete(id, okMsg){
  try{ const { error } = await sbc.from('comunicaciones').delete().eq('id', id); if(error) throw error; }
  catch(e){ console.error('srvComDelete', e); await syncAll(); toast('No se pudo eliminar: '+(e.message||e)); return; }
  await loadFromDB(); render(); if(okMsg) toast(okMsg);
}

/* helpers */
function comGrupos(){ return Array.isArray(S.grupos)?S.grupos:[]; }
function _comPersistGrupos(){ try{ if(typeof _persistSoon==='function') _persistSoon(); else if(typeof persistNow==='function') persistNow(); }catch(_){ } }
function comLeida(c, n){ return !!(c.leidos && c.leidos[n]); }
function comNoLeidasDe(me){ return (S.comunicaciones||[]).filter(c=> (c.para||[]).includes(me) && !comLeida(c,me)).length; }
function comFmtTs(ts){ ts=String(ts||''); const d=ts.slice(0,10).split('-'); const hm=ts.slice(11,16); return (d.length===3?`${d[2]}/${d[1]}`:ts)+(hm?` ${hm}`:''); }
function setComSub(s){ S.comSub=s; render(); }
function comCategorias(){ return (Array.isArray(S.comCategorias)&&S.comCategorias.length)?S.comCategorias:COM_CATS_DEF; }
function comPrioChip(p){
  if(p==='Urgente')    return '<span style="display:inline-block;font-size:11px;font-weight:700;background:#C0392B;color:#fff;border-radius:10px;padding:1px 9px">Urgente</span>';
  if(p==='Importante') return '<span style="display:inline-block;font-size:11px;font-weight:700;background:#F3E2C0;color:#8A5A00;border-radius:10px;padding:1px 9px">Importante</span>';

}
function comPrioInline(p){ return (p&&p!=='Normal')?comPrioChip(p)+' ':''; }
function comCatChip(cat){ if(!cat||cat==='General') return ''; return `<span style="display:inline-block;font-size:11px;font-weight:500;background:#EAF1D8;color:#5A6E00;border-radius:10px;padding:1px 8px;margin-left:6px;vertical-align:middle">${incEsc(cat)}</span>`; }

function comRecibidasView(){
  const me=S.user.nombre;
  const list=(S.comunicaciones||[]).filter(c=>(c.para||[]).includes(me));
  if(!list.length) return `<div class="muted" style="padding:20px;text-align:center">No tienes comunicaciones.</div>`;
  const noleidas=list.filter(c=>!comLeida(c,me)).length;
  const head = noleidas?`<div class="note" style="margin-top:0">Tienes <strong>${noleidas}</strong> sin leer. Ábrelas y marca “leído”.</div>`:'';
  const rows=list.map(c=>{
    const leida=comLeida(c,me);
    const estado = leida?'<span class="muted" style="font-size:12px">Leído</span>':'<span style="display:inline-block;background:#C0392B;color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:1px 9px">Nuevo</span>';

function comEmitidasView(){
  const me=S.user.nombre;
  const list=(S.comunicaciones||[]).filter(c=>c.deQuien===me);
  if(!list.length) return `<div class="muted" style="padding:20px;text-align:center">No has enviado ninguna comunicación. Usa “Nueva comunicación”.</div>`;
  const rows=list.map(c=>{
    const total=(c.para||[]).length;

    return `<tr onclick="openComDet('${c.id}')">
      <td style="font-weight:600">${comPrioInline(c.prioridad)}${incEsc(c.titulo)}${comCatChip(c.categoria)}</td>
      <td>${incEsc(comFmtTs(c.ts))}</td>
      <td>Leído por ${leidos}/${total}${total?` (${pct}%)`:''}</td>
      <td class="col-hide-m">${(c.comentarios||[]).length} comentario(s)</td>
    </tr>`;
  }).join('');
  return `<div class="inctable-wrap"><table class="inctable"><thead><tr><th>Comunicación</th><th>Fecha</th><th>Lecturas</th><th class="col-hide-m">Comentarios</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function comTodasView(){
  const me=S.user.nombre;
  const list=(S.comunicaciones||[]).filter(c=>(c.para||[]).includes(me) || c.deQuien===me);
  if(!list.length) return `<div class="muted" style="padding:20px;text-align:center">No hay comunicaciones todavía.</div>`;
  const rows=list.map(c=>{
    const enviada = c.deQuien===me;
    const recibida = (c.para||[]).includes(me);
    const tipo = enviada
      ? '<span style="display:inline-block;font-size:11px;font-weight:600;background:#E8EAED;color:#5A6770;border-radius:10px;padding:1px 9px">Enviada</span>'
      : '<span style="display:inline-block;font-size:11px;font-weight:600;background:#EAF1D8;color:#5A6E00;border-radius:10px;padding:1px 9px">Recibida</span>';
    const conQuien = enviada ? `Para ${(c.para||[]).length}` : `De ${incEsc(c.deQuien||'—')}`;
    let estado;
    if(enviada){

      estado = comLeida(c,me)?'<span class="muted" style="font-size:12px">Leído</span>':'<span style="display:inline-block;background:#C0392B;color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:1px 9px">Nuevo</span>';
    }

      <td>${tipo}</td>
      <td style="font-weight:600">${comPrioInline(c.prioridad)}${incEsc(c.titulo)}${comCatChip(c.categoria)}</td>
      <td class="col-hide-m">${conQuien}</td>
      <td>${incEsc(comFmtTs(c.ts))}</td>
      <td class="col-hide-m">${estado}</td>
    </tr>`;
  }).join('');
  return `<div class="inctable-wrap"><table class="inctable"><thead><tr><th>Tipo</th><th>Comunicación</th><th class="col-hide-m">De / Para</th><th>Fecha</th><th class="col-hide-m">Estado</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* nueva comunicación */
function openComNuevo(){ F={type:'com_nuevo', titulo:'', texto:'', categoria:'General', prioridad:'Normal', comPara:[]}; S.modal='com_nuevo'; render(); }
function comTogglePersona(n){ if(!Array.isArray(F.comPara)) F.comPara=[]; const i=F.comPara.indexOf(n); if(i>=0) F.comPara.splice(i,1); else F.comPara.push(n); render(); }
function comToggleGrupo(gi){ const g=comGrupos()[gi]; if(!g) return; if(!Array.isArray(F.comPara)) F.comPara=[]; const all=g.miembros.length && g.miembros.every(n=>F.comPara.includes(n)); if(all){ F.comPara=F.comPara.filter(n=>!g.miembros.includes(n)); } else { g.miembros.forEach(n=>{ if(!F.comPara.includes(n)) F.comPara.push(n); }); } render(); }
function comTodos(){ if(!Array.isArray(F.comPara)) F.comPara=[]; const all=COM_USERS(); F.comPara = (F.comPara.length===all.length)?[]:all.slice(); render(); }
function comNuevoModalContent(){
  const people=COM_USERS();
  const sel=Array.isArray(F.comPara)?F.comPara:[];
  const grupos=comGrupos();
  const gruposHtml = grupos.length?`<div style="margin-bottom:8px"><div class="muted" style="font-size:12px;margin-bottom:4px">Grupos</div>${grupos.map((g,i)=>{const all=g.miembros.length&&g.miembros.every(n=>sel.includes(n)); return `<button type="button" class="btn btn-sm ${all?'btn-primary':'btn-ghost'}" style="margin:0 6px 6px 0" onclick="comToggleGrupo(${i})">${incEsc(g.nombre)} (${g.miembros.length})</button>`;}).join('')}</div>`:'';
  const personasHtml = `<div><div class="muted" style="font-size:12px;margin-bottom:4px">Personas <button type="button" class="btn btn-sm btn-ghost" style="margin-left:6px" onclick="comTodos()">${sel.length===people.length?'Quitar todos':'Todos'}</button></div>${people.map(n=>{const on=sel.includes(n); return `<button type="button" class="btn btn-sm ${on?'btn-primary':'btn-ghost'}" style="margin:0 6px 6px 0" onclick="comTogglePersona('${n.replace(/'/g,"\\'")}')">${incEsc(n)}</button>`;}).join('')}</div>`;
  const ready=(F.titulo||'').trim() && (F.texto||'').trim() && sel.length;
  return `<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">

    <div class="modal-body">
      <div class="note" style="margin-top:0">Un aviso o mejora para el equipo. Cada destinatario podrá marcarlo como leído y comentar.</div>
      <div class="fld" style="margin-top:10px"><label>Título</label>
        <input class="inp" value="${incEsc(F.titulo||'')}" oninput="setInp('titulo',this.value)" placeholder="De qué va, en una frase."></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div class="fld" style="flex:1;min-width:160px"><label>Categoría</label>

        <div class="fld" style="flex:1;min-width:200px"><label>Prioridad</label>
          <div class="seg">${['Normal','Importante','Urgente'].map(p=>`<button type="button" class="${(F.prioridad||'Normal')===p?'on':''}" onclick="setSel('prioridad','${p}')">${p}</button>`).join('')}</div></div>
      </div>
      <div class="fld"><label>Mensaje</label>
        <textarea class="inp" rows="5" oninput="setInp('texto',this.value)" placeholder="Escribe la comunicación.">${incEsc(F.texto||'')}</textarea></div>
      <div class="fld"><label>Para (${sel.length} seleccionados)</label>${gruposHtml}${personasHtml}</div>

}
function commitComunicacion(){
  const titulo=(F.titulo||'').trim(), texto=(F.texto||'').trim();
  const para=Array.isArray(F.comPara)?[...new Set(F.comPara)]:[];
  if(!titulo){ toast('Pon un título'); return; }
  if(!texto){ toast('Escribe el mensaje'); return; }
  if(!para.length){ toast('Elige al menos un destinatario'); return; }
  const c={ id:uid(), titulo, texto, categoria:(F.categoria||'General'), prioridad:(F.prioridad||'Normal'), deQuien:S.user.nombre, para, leidos:{}, comentarios:[], ts:now() };
  S.comunicaciones.unshift(c); closeModal(); render();
  srvComInsert(c, 'Comunicación enviada');
  para.forEach(n=>{ if(n!==S.user.nombre) tgNotify(n, `📣 Nueva comunicación de ${c.deQuien}: "${c.titulo}"`); });
}

/* detalle */
function openComDet(id){
  const c=(S.comunicaciones||[]).find(x=>x.id===id); if(!c) return;
  let thread='';
  if(c.deQuien===S.user.nombre){ const para=(c.para||[]); thread = (para.find(r=>comThreadList(c,r).length)||para[0]||''); }
  F={type:'com_det', id, comDraft:'', comThread:thread}; S.modal='com_det'; render();
}
function comMarcarLeido(id){
  const c=(S.comunicaciones||[]).find(x=>x.id===id); if(!c) return;
  const me=S.user.nombre;
  if(!(c.para||[]).includes(me)) return;
  if(!c.leidos||typeof c.leidos!=='object'||Array.isArray(c.leidos)) c.leidos={};
  if(c.leidos[me]) return;
  c.leidos[me]=now(); render(); srvComUpdate(id, c, 'Marcado como leído');
  if(c.deQuien && c.deQuien!==me) tgNotify(c.deQuien, `✅ ${me} ha leído tu comunicación: "${c.titulo}"`);
}
function comMarcarNoLeido(id){
  const c=(S.comunicaciones||[]).find(x=>x.id===id); if(!c) return;
  const me=S.user.nombre;
  if(!(c.para||[]).includes(me)) return;
  if(c.leidos && c.leidos[me]){ delete c.leidos[me]; render(); srvComUpdate(id, c, 'Marcada como no leída'); }
}
function comEffCon(c, cm){ return cm.con || (cm.de===c.deQuien ? '' : cm.de); }
function comThreadList(c, party){ if(!party) return []; return (Array.isArray(c.comentarios)?c.comentarios:[]).filter(cm=>comEffCon(c,cm)===party); }
function setComThread(v){ F.comThread=v; render(); }
function comAddComentario(id, con){
  const c=(S.comunicaciones||[]).find(x=>x.id===id); if(!c) return;
  const me=S.user.nombre;
  const esCreador=c.deQuien===me, esPara=(c.para||[]).includes(me);
  if(!(esCreador||esPara)){ toast('No puedes comentar esta comunicación'); return; }
  const party = esCreador ? (con||F.comThread||'') : me;
  if(esCreador && !party){ toast('Elige a quién respondes'); return; }
  const txt=(F.comDraft||'').trim(); if(!txt) return;
  if(!Array.isArray(c.comentarios)) c.comentarios=[];
  c.comentarios.push({de:me, con:party, texto:txt, ts:now()});
  F.comDraft=''; render(); srvComUpdate(id, c);
  const otro = esCreador ? party : c.deQuien;
  if(otro && otro!==me) tgNotify(otro, `💬 ${me} en "${c.titulo}": ${txt}`);
}
function comBurbujas(comList, me){
  return comList.length ? comList.map(cm=>{const mine=cm.de===me; return `<div style="margin-bottom:8px;display:flex;${mine?'justify-content:flex-end':''}"><div style="max-width:82%;background:${mine?'#EAF1D8':'#F4F0E9'};border:1px solid var(--line);border-radius:12px;padding:8px 11px"><div style="font-size:11px;color:#8A949B;margin-bottom:2px">${incEsc(cm.de||'—')} · ${incEsc(comFmtTs(cm.ts))}</div><div style="font-size:14px;line-height:1.45;white-space:pre-wrap">${incEsc(cm.texto||'')}</div></div></div>`;}).join('') : `<div class="muted" style="font-size:13px">Sin comentarios todavía.</div>`;
}
function comComentariosHtml(c){
  const me=S.user.nombre;
  const soyDe=c.deQuien===me, soyPara=(c.para||[]).includes(me);
  if(!soyDe && !soyPara) return '';
  if(soyDe){
    const para=(c.para||[]);
    const sel = para.includes(F.comThread)?F.comThread:(para.find(r=>comThreadList(c,r).length)||para[0]||'');
    const opciones = para.map(r=>{const n=comThreadList(c,r).length; return `<option value="${incEsc(r)}" ${r===sel?'selected':''}>${incEsc(r)}${n?` (${n})`:''}</option>`;}).join('');
